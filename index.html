<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MatchOps Planner</title>
<meta name="description" content="Tournament lineup and substitution planner.">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════ Design tokens (MatchOps family) ══════════════════ */
:root {
  --bg-base: #0f172a;
  --bg-panel: #1e293b;
  --bg-panel-soft: rgba(30,41,59,0.92);
  --bg-panel-strong: rgba(30,41,59,0.98);
  --bg-elev: rgba(51,65,85,0.7);
  --border-soft: rgba(71,85,105,0.4);
  --border: rgba(71,85,105,0.6);
  --border-strong: rgba(100,116,139,0.8);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-mute: #64748b;
  --heading: #facc15;      /* yellow-400 */
  --accent: #fbbf24;       /* amber-400 */
  --accent-strong: #f59e0b;/* amber-500 */
  --accent-deep: #d97706;  /* amber-600 */
  --primary-text-on-amber: #1e293b;
  --success: #22c55e;
  --warn: #fb923c;
  --danger: #ef4444;
  --info: #38bdf8;
  --info-strong: #0ea5e9;
  --glow-sky: rgba(56,189,248,0.08);
  --glow-indigo: rgba(99,102,241,0.08);
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-pill: 999px;
  --app-bar-h: 56px;
  --bottom-nav-h: 66px;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  background: var(--bg-base);
  overflow-x: hidden;
}
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  color: var(--text);
  background:
    radial-gradient(at 20% 10%, var(--glow-sky), transparent 55%),
    radial-gradient(at 85% 95%, var(--glow-indigo), transparent 55%),
    var(--bg-base);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font-family: inherit; }
button { border: none; background: none; color: inherit; cursor: pointer; }
* { scrollbar-width: thin; scrollbar-color: rgba(51,65,85,0.5) transparent; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background-color: rgba(51,65,85,0.5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background-color: rgba(71,85,105,0.8); }

/* ══════════════════ App shell ══════════════════ */
.app-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(var(--app-bar-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.03);
  z-index: 50;
}
.app-bar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to bottom, var(--glow-sky), transparent 50%);
}
.app-bar > * { position: relative; z-index: 1; }

.app-logo {
  width: 36px; height: 36px;
  flex-shrink: 0;
  object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.35));
}
.app-title {
  flex: 1 1 auto;
  min-width: 0;
  font-family: 'Rajdhani', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.4px;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.save-status {
  font-size: 10px; color: var(--success); font-weight: 600;
  flex-shrink: 0;
  transition: opacity 0.3s;
}
/* Plan name — plain text line under the ribbon, no pill/icon */
.plan-name {
  display: none;
  padding: 0 4px;
  margin: -4px 0 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  color: var(--text-mute);
  background: none; border: none;
  text-align: left;
  max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.plan-name.has-version { display: block; }
.plan-name:hover { color: var(--text-dim); }

/* Install-as-PWA prompt banner (browser-driven install + iOS hint) */
.install-banner {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 10px;
  padding: 10px 12px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.4);
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--text);
}
.install-banner[hidden] { display: none !important; }
.install-banner .install-text {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.install-banner .install-action {
  background: var(--accent); color: var(--primary-text-on-amber);
  border: 1px solid var(--accent);
  padding: 5px 12px; border-radius: 6px;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  cursor: pointer;
}
.install-banner .install-dismiss {
  background: transparent; color: var(--text-mute);
  padding: 2px 6px; border: none;
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  cursor: pointer;
}
@media (max-width: 420px) {
  .app-title { font-size: 17px; }
  .save-status { display: none; } /* reclaim space on narrow */
}
@media (max-width: 340px) {
  .app-title { font-size: 15px; }
}

.content {
  padding-top: calc(var(--app-bar-h) + env(safe-area-inset-top) + 12px);
  padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom) + 12px);
  padding-left: max(12px, env(safe-area-inset-left));
  padding-right: max(12px, env(safe-area-inset-right));
  min-height: 100vh; min-height: 100dvh;
}
.tab-panel { display: none; animation: fadeSlideIn 0.22s ease-out; }
.tab-panel.active { display: block; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Clip horizontal overflow only around the slide-animated panel so
   the ribbon above keeps room for its box-shadows. */
.game-detail-wrap {
  overflow: clip;
  overflow-x: clip;
  /* small side padding so shadows / outlines on inner cards aren't
     shaved by the clip box */
  padding: 0 2px;
  margin: 0 -2px;
}
#game-detail {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: translate3d(0, 0, 0);
}
/* Game-carousel slide animations (swipe or ribbon tap).
   Short, GPU-accelerated, small travel distance — no layout shift. */
#game-detail.slide-from-right {
  animation: gameSlideFromRight 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
#game-detail.slide-from-left {
  animation: gameSlideFromLeft 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
@keyframes gameSlideFromRight {
  from { opacity: 0.85; transform: translate3d(6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}
@keyframes gameSlideFromLeft {
  from { opacity: 0.85; transform: translate3d(-6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: max(6px, env(safe-area-inset-left));
  padding-right: max(6px, env(safe-area-inset-right));
  display: flex; align-items: stretch;
  background: linear-gradient(to top, rgba(15,23,42,0.98), rgba(30,41,59,0.95));
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.3);
}
.bottom-nav::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: rgba(99,102,241,0.06);
  mix-blend-mode: soft-light;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 6px 4px;
  color: var(--text-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color 0.15s, transform 0.15s;
  position: relative;
}
.nav-item .nav-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
}
.nav-item .nav-icon svg {
  width: 22px; height: 22px;
  stroke: currentColor; fill: none;
  stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
  content: ''; position: absolute; top: 0; left: 22%; right: 22%;
  height: 3px; border-radius: 0 0 3px 3px;
  background: linear-gradient(to right, var(--accent-strong), var(--accent));
  box-shadow: 0 0 10px var(--accent);
}
.nav-item:active { transform: scale(0.94); }

/* ══════════════════ Games tab ══════════════════ */
.ribbon {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 2px 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  margin: 0 -6px 12px;
  padding-left: 6px; padding-right: 6px;
}
.ribbon-game {
  flex: 0 0 auto; scroll-snap-align: start;
  padding: 11px 34px 11px 14px; border-radius: var(--r-md);
  background:
    linear-gradient(180deg, rgba(51,65,85,0.55) 0%, rgba(30,41,59,0.75) 55%, rgba(15,23,42,0.85) 100%);
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  display: flex; flex-direction: column; align-items: flex-start; gap: 3px;
  min-width: 144px;
  position: relative; overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 2px rgba(0,0,0,0.35);
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}
.ribbon-game::before {
  /* thin top accent bar — transparent by default, amber when active */
  content: ''; position: absolute; left: 0; right: 0; top: 0;
  height: 2px; background: transparent;
  transition: background 0.18s ease;
}
.ribbon-game::after {
  /* hairline divider between label and opp rows for a classic card look */
  content: ''; position: absolute; left: 14px; right: 34px;
  top: 28px; height: 1px;
  background: linear-gradient(to right, rgba(148,163,184,0.18), rgba(148,163,184,0.04));
  pointer-events: none;
}
.ribbon-game .ribbon-label {
  font-size: 10px; font-weight: 700; color: var(--text-mute);
  letter-spacing: 0.8px; text-transform: uppercase;
}
.ribbon-game .ribbon-opp {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-top: 4px;
}
.ribbon-game .ribbon-time {
  font-size: 10px; color: var(--text-mute); font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.ribbon-game.active {
  background:
    linear-gradient(180deg, rgba(51,65,85,0.92) 0%, rgba(30,41,59,0.95) 60%, rgba(15,23,42,0.95) 100%);
  border-color: rgba(251,191,36,0.6);
  color: var(--text);
  box-shadow:
    0 6px 18px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(251,191,36,0.18),
    inset 0 0 0 1px rgba(251,191,36,0.08);
}
.ribbon-game.active::before {
  background: linear-gradient(to right, transparent 0%, var(--accent) 18%, var(--accent) 82%, transparent 100%);
}
.ribbon-game.active::after {
  background: linear-gradient(to right, rgba(251,191,36,0.55), rgba(251,191,36,0.08));
}
.ribbon-game.active .ribbon-label { color: var(--accent); letter-spacing: 1px; }
.ribbon-game.active .ribbon-opp  { color: var(--text); }
.ribbon-game.active .ribbon-time { color: var(--text-dim); }
.ribbon-game.excluded { opacity: 0.45; }
.ribbon-game.excluded .ribbon-opp { text-decoration: line-through; text-decoration-color: rgba(148,163,184,0.55); }
.ribbon-game:active { transform: scale(0.97); }

/* Include-in-totals dot (top-right corner of each ribbon card) */
.ribbon-include {
  position: absolute; top: 8px; right: 8px;
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid rgba(148,163,184,0.5);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  z-index: 2;
}
.ribbon-include::after {
  /* enlarge tap target without moving the visible dot */
  content: ''; position: absolute; inset: -8px;
}
.ribbon-include.on {
  background: var(--success); border-color: var(--success);
  box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
}
.ribbon-include.on::before {
  content: '✓'; font-size: 10px; font-weight: 900; color: #0f172a; line-height: 1;
}

/* Game toolbar — fair-share + undo/redo */
.game-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.game-toolbar.after-pitch {
  margin-top: 4px;
  margin-bottom: 16px;
}
.game-toolbar .game-toolbar-action {
  flex: 1 1 auto;
  width: auto;
  /* Default .btn is full-width; override here so it sits inline next to icon buttons. */
}
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--r-md);
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  color: var(--text-dim);
  transition: all 0.15s;
}
.icon-btn svg {
  width: 18px; height: 18px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.icon-btn:not(:disabled):hover { background: rgba(71,85,105,0.9); color: var(--text); }
.icon-btn:not(:disabled):active { transform: scale(0.94); }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Pitch card */
.pitch-card {
  background: linear-gradient(180deg, rgba(30,41,59,0.88) 0%, rgba(15,23,42,0.95) 100%);
  border: 1px solid rgba(71,85,105,0.55);
  border-radius: var(--r-lg);
  padding: 14px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}
.pitch-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-lg);
  background:
    radial-gradient(at 15% 0%, rgba(56,189,248,0.08), transparent 40%),
    radial-gradient(at 85% 100%, rgba(251,191,36,0.05), transparent 45%);
}
.pitch-card > * { position: relative; z-index: 1; }

.pitch {
  display: flex; flex-direction: column;
  gap: 6px;
  background: linear-gradient(to bottom, #4caf50, #388e3c);
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 10px;
}
.pitch-row {
  display: flex; justify-content: center; gap: 8px;
  align-items: stretch;
}
.pos-box {
  background: rgba(0,0,0,0.18);
  border-radius: 4px;
  padding: 3px 4px 4px;
  flex: 0 0 auto;
  min-width: 92px;
  max-width: 165px;
  width: 155px;
}

.pos-label {
  font-size: 8px; font-weight: 700;
  color: white;
  letter-spacing: 0.4px; text-transform: uppercase;
  text-align: center; margin-bottom: 2px;
}
.pos-spacer { display: none; }
.pos-name { display: inline; }

.chip-row { display: flex; gap: 2px; position: relative; min-height: 28px; }
.chip-row .ht-divider {
  position: absolute; top: -2px; bottom: -2px; width: 0;
  border-left: 1px dashed rgba(255,255,255,0.55);
  pointer-events: none;
  z-index: 3;
}

/* ─── MatchOps planner chip: simple, clear, effective ─── */
.slot {
  padding: 4px 3px 9px;
  font-size: 12px; font-weight: 500;
  text-align: center; user-select: none;
  border-radius: 3px;
  min-height: 28px; line-height: 1.2;
  flex: 1; min-width: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  position: relative;
  cursor: grab;
  background: white;
  color: #333;
  border: 1.5px solid #ccc;
  transition: transform 0.1s, border-color 0.15s;
}
/* Segment colours by segment index. Progressively warmer as you move
   through subs so 0/1/2/3+ subs in the same row are visually distinct. */
.slot[data-segidx="1"] { background: #fff3cd; border-color: #f6c947; color: #4a3c00; }
.slot[data-segidx="2"] { background: #ffe082; border-color: #f1a93a; color: #4a3000; }
.slot[data-segidx="3"] { background: #ffcc80; border-color: #ed8a2e; color: #4a2400; }
.slot[data-segidx="4"] { background: #ffb074; border-color: #d96b1f; color: #4a1d00; }
.slot[data-segidx="5"], .slot[data-segidx="6"] {
  background: #ff9966; border-color: #b94d12; color: #fff;
}
/* Single-segment row (no subs at this position) — show as full-game green. */
.chip-row.full-game .slot {
  background: #d4edda;
  border-color: #28a745;
  color: #155724;
  font-weight: 600;
}

/* Minute-start badge on non-first segments. Sits top-left so it doesn't
   collide with the half-time divider line that runs through the chip-row. */
.chip-min-tag {
  position: absolute;
  top: 1px; left: 3px;
  font-size: 8.5px; font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.2px;
  color: rgba(0,0,0,0.6);
  pointer-events: none;
  line-height: 1;
}
.chip-name { display: inline; }

/* Position-level menu button — gear icon at the right end of each
   pos-label header. Always visible (small footprint), works the same
   on phone (tap) and desktop (click). Opens a position-level sheet. */
.pos-label {
  position: relative;
}
.pos-menu-btn {
  position: absolute;
  right: -1px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.28);
  color: rgba(255,255,255,0.85);
  border-radius: 3px;
  padding: 0;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, transform 0.1s;
}
.pos-menu-btn:hover {
  background: rgba(0,0,0,0.55);
  color: #fff;
}
.pos-menu-btn:active { transform: translateY(-50%) scale(0.92); }
.pos-menu-btn svg { display: block; }

/* Position-sheet body styles (rendered into #sheet-body when openPositionSheet runs). */
.pos-sheet-segments {
  display: flex; flex-direction: column; gap: 6px;
}
.pos-sheet-segment-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
  color: var(--text);
  text-align: left;
  font-size: 13px;
  cursor: pointer;
}
.pos-sheet-segment-btn:hover { background: rgba(30,41,59,0.85); border-color: var(--border); }
.pos-sheet-segment-btn .pss-time {
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  color: var(--accent);
  min-width: 76px;
  font-size: 12px;
}
.pos-sheet-segment-btn .pss-name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-weight: 600;
}
.pos-sheet-segment-btn .pss-tag {
  font-size: 10px; font-weight: 700;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.slot:active { cursor: grabbing; transform: scale(0.96); }
.slot.drag-over { border-color: #2d5; background: #c8e6c9; }
.slot.tap-selected {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  z-index: 2;
}
.slot.highlighted {
  outline: 3px solid #f57c00;
  outline-offset: 2px;
  z-index: 1;
}
.slot:not(.highlighted).any-highlighted { opacity: 0.35; }

.slot.benched-both {
  background: #ffcdd2 !important;
  border-color: #c62828 !important;
  color: #b71c1c !important;
  font-weight: 700;
  box-shadow: 0 0 0 1px #c62828 inset;
}
.slot.plays-both { box-shadow: inset 0 0 0 2px #c62828; }

/* per-chip minute bar — thin, unobtrusive */
.chip-min-bar {
  position: absolute; bottom: 2px; left: 3px; right: 3px;
  height: 2px; border-radius: 1px;
  background: rgba(0,0,0,0.12);
  overflow: hidden;
  z-index: 1;
}
.chip-min-fill {
  height: 100%; border-radius: 1px;
  background: hsl(var(--chip-hue, 60), 65%, 40%);
  width: var(--chip-ratio, 0%);
}

/* Bench drawer */
.bench-drawer-toggle {
  width: 100%; padding: 11px 14px;
  background: linear-gradient(180deg, rgba(51,65,85,0.55), rgba(30,41,59,0.7));
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  border-radius: var(--r-md);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.bench-drawer-toggle:hover { color: var(--text); border-color: rgba(148,163,184,0.4); }
.bench-drawer-toggle .chev { transition: transform 0.2s; color: var(--accent); }
.bench-drawer-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
.bench-section {
  display: none; flex-direction: column; gap: 10px;
  margin-top: 8px; padding: 12px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border-radius: var(--r-md);
  border: 1px solid rgba(71,85,105,0.4);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.bench-section.open { display: flex; }
.bench-row .bench-label {
  font-size: 10px; color: var(--accent); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.bench-row .chip-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 6px;
}
/* Bench chips — neutral grey, distinct from on-field segment colours.
   Override the [data-segidx] selector that would otherwise paint them yellow. */
.bench-row .slot,
.bench-row .slot[data-segidx="1"],
.bench-row .slot[data-segidx="2"],
.bench-row .slot[data-segidx="3"],
.bench-row .slot[data-segidx="4"],
.bench-row .slot[data-segidx="5"],
.bench-row .slot[data-segidx="6"] {
  background: #e8e8e8;
  border-color: #bbb;
  color: #333;
}
.bench-row .chip-min-bar { background: rgba(0,0,0,0.12); }
.bench-row-label {
  font-size: 9px; font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: 4px 0 4px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.bench-row-label:first-child { margin-top: 0; }

/* Mini minute bar (per-game strip) */
.game-min-strip {
  margin-top: 14px;
  padding: 12px 14px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border: 1px solid rgba(71,85,105,0.4);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.game-min-strip h4 {
  margin: 0 0 10px; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.game-min-strip .strip-row {
  display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px;
}
.game-min-strip .strip-cell {
  height: 28px; border-radius: 4px; position: relative;
  background: var(--cell-bg, rgba(30,41,59,0.85));
  color: var(--cell-fg, #e2e8f0);
  border: 1px solid rgba(0,0,0,0.22);
  cursor: pointer;
  overflow: hidden;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.15s, transform 0.1s;
}
.game-min-strip .strip-cell:hover { filter: brightness(1.08); }
.game-min-strip .strip-cell:active { transform: scale(0.96); }
.game-min-strip .strip-cell.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}
.game-min-strip .strip-cell.any-highlighted:not(.highlighted) { opacity: 0.42; }
.game-min-strip .strip-cell .strip-init {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.3px;
  color: inherit;
}

/* ══════════════════ Minutes tab — quick-scan chip grid ══════════════════ */
.pt-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 720px) {
  .pt-grid { grid-template-columns: repeat(3, 1fr); }
}
.pt-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  min-height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.22);
  background: var(--pt-bg);
  color: var(--pt-fg);
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.2px;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
  transition: transform 0.1s, filter 0.15s;
}
.pt-chip:hover { filter: brightness(1.06); }
.pt-chip:active { transform: scale(0.97); }
.pt-chip .pt-name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-chip .pt-total {
  font-weight: 700; font-size: 16px;
  font-variant-numeric: tabular-nums;
  opacity: 0.92;
  flex-shrink: 0;
}
.pt-chip.prio .pt-name::after {
  content: ' ★';
  opacity: 0.55;
  font-weight: 700;
}
.pt-chip.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  filter: brightness(1.1);
}
.pt-chip.any-highlighted:not(.highlighted) { opacity: 0.48; }
/* Focus (pane tracks this chip) = subtle bottom accent bar, not an outline,
   so a toggle-off of the highlight removes the strong amber ring and you
   can clearly see the chip is no longer selected. */
.pt-chip.focused {
  box-shadow: 0 1px 2px rgba(0,0,0,0.28),
              inset 0 1px 0 rgba(255,255,255,0.08),
              inset 0 -3px 0 var(--accent);
}

/* Focus pane — stacks one card per highlighted player (comparison mode).
   When nothing is highlighted, falls back to a single worst-off card. */
#minutes-focus {
  margin-top: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
#minutes-focus:empty { display: none; }
.focus-card {
  padding: 14px;
  background: linear-gradient(180deg, rgba(30,41,59,0.92), rgba(15,23,42,0.95));
  border: 1px solid rgba(71,85,105,0.5);
  border-top: 2px solid var(--accent);
  border-radius: var(--r-md);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  position: relative;
}
.focus-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; margin-bottom: 10px;
}
.focus-name {
  font-size: 18px; font-weight: 700;
  color: var(--text); letter-spacing: 0.3px;
  font-family: 'Rajdhani', system-ui, sans-serif;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0;
}
.focus-star { color: var(--accent); opacity: 0.85; }
.focus-total {
  font-size: 20px; font-weight: 700; color: var(--accent);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.focus-bar { margin-bottom: 12px; }
.focus-bar-track {
  height: 6px; border-radius: 3px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(71,85,105,0.5);
  overflow: hidden;
}
.focus-bar-fill {
  height: 100%; border-radius: 3px;
  background: var(--bar-bg, #38bdf8);
  width: var(--bar-w, 0%);
  transition: width 0.25s ease;
}
.focus-bar-label {
  margin-top: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  color: var(--text-mute); text-transform: uppercase;
}
.focus-games {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
  margin-bottom: 12px;
}
.focus-game {
  padding: 6px 3px 6px;
  border-radius: 5px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(71,85,105,0.5);
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-height: 66px;
  font-weight: 700;
}
.focus-game .fg-label { font-size: 9px; color: var(--text-mute); letter-spacing: 0.4px; }
.focus-game .fg-pos {
  font-size: 11px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.4px;
  font-family: 'Rajdhani', system-ui, sans-serif;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%;
}
.focus-game .fg-mins { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
.focus-game.full   { background: rgba(34,197,94,0.18);  border-color: rgba(34,197,94,0.5);  }
.focus-game.full  .fg-mins { color: #86efac; }
.focus-game.half   { background: rgba(251,191,36,0.14); border-color: rgba(251,191,36,0.45); }
.focus-game.half  .fg-mins { color: #fde68a; }
.focus-game.zero   { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.4);  }
.focus-game.zero  .fg-mins { color: #fca5a5; }
.focus-game.excluded { opacity: 0.4; text-decoration: line-through; }

.focus-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.focus-actions .btn { flex: 1; width: auto; min-width: 140px; }

/* Section title (used on tabs) */
.section-title {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 0 12px;
  font-size: 18px; font-weight: 700;
  color: var(--heading); letter-spacing: 0.5px;
}
.section-title .count { color: var(--text-dim); font-size: 13px; font-weight: 600; }

/* ══════════════════ Plans tab ══════════════════ */
.plans-section {
  display: flex; flex-direction: column; gap: 8px;
  background: linear-gradient(to bottom, var(--bg-panel-soft), rgba(15,23,42,0.85));
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: var(--shadow-md);
}
.plans-section::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-md);
  background: linear-gradient(to bottom, var(--glow-sky), transparent 40%);
}
.plans-section > * { position: relative; z-index: 1; }
.plans-section h4 {
  margin: 0 0 4px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-mute);
}
.plans-section.danger h4 { color: #fca5a5; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 16px;
  border-radius: var(--r-md);
  font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  transition: all 0.15s ease;
  width: 100%;
}
.btn:active { transform: scale(0.97); }
.btn:hover { background: rgba(71,85,105,0.9); }
.btn.primary {
  background: linear-gradient(to bottom, var(--accent-strong), var(--accent-deep));
  color: var(--primary-text-on-amber); border-color: var(--accent);
  box-shadow: 0 2px 10px rgba(251,191,36,0.25);
}
.btn.primary:hover { background: linear-gradient(to bottom, var(--accent), var(--accent-strong)); }
.btn.danger {
  background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); color: #fca5a5;
}
.btn.danger:hover { background: rgba(239,68,68,0.25); }
/* Section-level flex-gap handles spacing; legacy .btn + .btn margin is no-op inside plans */
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; width: auto; }
.plans-section .current-plan-row { margin-bottom: 0; }

.current-plan-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; margin-bottom: 12px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: var(--r-md);
}
.current-plan-row .icon { font-size: 22px; }
.current-plan-row .meta { flex: 1; min-width: 0; }
.current-plan-row .name {
  font-weight: 700; font-size: 14px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.current-plan-row .ts { font-size: 11px; color: var(--text-dim); }

.version-list { display: flex; flex-direction: column; gap: 6px; }
.version-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: var(--r-md);
  background: rgba(15,23,42,0.6);
  border: 1px solid var(--border-soft);
  transition: background 0.15s;
}
.version-row:hover { background: rgba(30,41,59,0.8); }
.version-row.current {
  background: rgba(56,189,248,0.12);
  border-color: rgba(56,189,248,0.5);
}
.version-row .vname { flex: 1; font-weight: 700; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.version-row .vtime { font-size: 10px; color: var(--text-mute); white-space: nowrap; }
.version-row .vbtn {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  background: transparent; color: var(--text-dim);
  display: inline-flex; align-items: center; justify-content: center;
}
.version-row .vbtn:hover { background: rgba(71,85,105,0.5); color: var(--text); }
.version-row .vbtn.delete:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }
.version-empty { padding: 14px; text-align: center; color: var(--text-mute); font-style: italic; }

/* ══════════════════ Bottom sheet ══════════════════ */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: none;
  animation: fadeIn 0.2s;
}
.sheet-backdrop.open { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(to bottom, var(--bg-panel-strong), rgba(15,23,42,0.98));
  border-top: 1px solid var(--border);
  border-top-left-radius: 20px; border-top-right-radius: 20px;
  padding: 14px 14px calc(18px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  max-height: 75vh; overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.bottom-sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(148,163,184,0.4);
  margin: 0 auto 14px;
}
.sheet-title {
  text-align: center; font-size: 16px; font-weight: 700; color: var(--accent);
  margin: 0 0 6px;
}
.sheet-sub { text-align: center; font-size: 12px; color: var(--text-dim); margin: 0 0 14px; }
.sheet-actions { display: flex; flex-direction: column; gap: 8px; }

/* On wider viewports, render the bottom sheet as a centred dialog instead of
   a full-width slide-up. Better with a mouse — doesn't cover an entire game
   card you're comparing against. */
@media (min-width: 700px) {
  .bottom-sheet {
    bottom: auto;
    top: 50%; left: 50%; right: auto;
    width: min(560px, calc(100vw - 40px));
    max-height: min(80vh, 720px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 18px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);
    transform: translate(-50%, -50%) scale(0.92);
    opacity: 0;
    transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.15s ease;
  }
  .bottom-sheet.open {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .sheet-handle { display: none; }
  .sheet-title { font-size: 17px; margin-bottom: 4px; }
}

/* ══════════════════ Misc ══════════════════ */
.empty-state {
  padding: 40px 16px; text-align: center; color: var(--text-dim);
  border: 2px dashed var(--border-soft); border-radius: var(--r-md);
}
input[type="checkbox"] { accent-color: var(--success); cursor: pointer; }

/* ══════════════════ Settings tab ══════════════════ */
.settings-section { margin-bottom: 14px; }
.settings-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.settings-field label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; color: var(--text-mute);
}
.settings-field input,
.settings-field select {
  padding: 9px 10px;
  background: rgba(15,23,42,0.7);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  font-size: 14px;
}
.settings-field input:focus,
.settings-field select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
.settings-field .hint { font-size: 11px; color: var(--text-mute); }
.game-settings-card {
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 10px 12px 12px;
  margin-bottom: 10px;
  background: rgba(15,23,42,0.55);
}
.game-settings-card .gsc-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; font-weight: 700; color: var(--accent);
  margin-bottom: 8px;
}
.game-settings-card .gsc-head .gsc-actions { display: flex; gap: 4px; }
.game-settings-card .gsc-row { display: flex; gap: 8px; flex-wrap: wrap; }
.game-settings-card .gsc-row .settings-field { flex: 1; min-width: 110px; margin-bottom: 8px; }
.gsc-mini-btn {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.gsc-mini-btn:hover { background: rgba(71,85,105,0.4); color: var(--text); }
.gsc-mini-btn.danger:hover { background: rgba(239,68,68,0.2); color: #fca5a5; border-color: rgba(239,68,68,0.5); }

/* ══════════════════ Detail overlay ══════════════════ */
.detail-overlay {
  position: fixed; inset: 0; z-index: 80;
  background: linear-gradient(to bottom, var(--bg-panel-strong), rgba(15,23,42,0.99));
  display: none;
  flex-direction: column;
  overflow-y: auto;
  /* Stop scroll-chaining: when the user reaches the top/bottom of the modal,
     the touch/wheel doesn't pass through to scroll the page underneath. */
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 0;
}
.detail-overlay.open { display: flex; }
.detail-header {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
}
.detail-header .dt-title { flex: 1; font-size: 16px; font-weight: 700; color: var(--accent); }
.detail-header .dt-sub { font-size: 12px; color: var(--text-dim); }
.detail-close {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  background: var(--bg-elev); color: var(--text-dim);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
}
.detail-body { padding: 14px; }
.detail-pitch-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto 14px;
  aspect-ratio: 0.66;
  background: linear-gradient(to bottom, #4caf50, #388e3c);
  border-radius: 6px;
  overflow: hidden;
}
.detail-pitch-wrap::before {
  /* center circle + halfway line, subtle */
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: rgba(255,255,255,0.35);
}
.detail-disc {
  position: absolute;
  /* Centre the disc on its (relX, relY) coordinate so geometry matches
     MatchOps-Local's pitch where players are anchored at their centre. */
  transform: translate(-50%, -50%);
  /* Background and foreground come from playerRatio via inline --disc-bg/--disc-fg vars. */
  background: var(--disc-bg, rgba(255,255,255,0.96));
  color: var(--disc-fg, #1e293b);
  border: 2px solid rgba(255,255,255,0.85);
  min-width: 64px; max-width: 96px;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 11px; font-weight: 700;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
  transition: filter 0.15s, opacity 0.15s, transform 0.1s;
}
.detail-disc:hover { filter: brightness(1.1); }
.detail-disc:active { transform: translate(-50%, -50%) scale(0.95); }
.detail-disc.highlighted {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
  z-index: 5;
}
.detail-disc.dimmed { opacity: 0.42; }
.detail-disc .dd-role {
  display: block;
  font-size: 8px; font-weight: 800;
  color: var(--disc-fg, #64748b);
  opacity: 0.75;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.detail-disc .dd-name {
  display: block;
  font-size: 11px; font-weight: 700;
}
.detail-scrubber {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  margin-bottom: 12px;
}
.detail-scrubber input[type="range"] { flex: 1; min-width: 0; }
.detail-scrubber .dt-time {
  font-variant-numeric: tabular-nums;
  font-weight: 700; color: var(--accent);
  min-width: 56px; text-align: right;
}
/* Prev / next snap buttons. Step through kickoff → sub times → halftime → end. */
.dt-step-btn {
  width: 32px; height: 32px;
  flex-shrink: 0;
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  color: var(--text-dim);
  border-radius: var(--r-sm);
  font-size: 18px; font-weight: 700;
  line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, transform 0.1s;
}
.dt-step-btn:hover { color: var(--text); background: rgba(71,85,105,0.9); }
.dt-step-btn:active { transform: scale(0.94); }
.detail-timeline {
  display: flex; flex-direction: column; gap: 5px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
}
.detail-timeline h4 {
  margin: 0 0 4px; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
}
.dt-track-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
}
.dt-track-row .dt-track-label {
  flex: 0 0 auto;
  min-width: 38px;
  padding-right: 6px;
  font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.4px;
  font-variant-numeric: tabular-nums;
}
.dt-track {
  position: relative; flex: 1; height: 22px;
  background: rgba(0,0,0,0.35);
  border-radius: 3px;
  border: 1px solid var(--border-soft);
}
.dt-track {
  cursor: pointer;
}
.dt-track .dt-seg {
  position: absolute; top: 0; bottom: 0;
  background: rgba(255,255,255,0.85); color: #1e293b;
  border-right: 1px solid rgba(0,0,0,0.2);
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  padding: 0 3px;
  cursor: pointer;
  transition: filter 0.15s;
}
.dt-track .dt-seg:hover { filter: brightness(1.08); }
.dt-track .dt-seg:active { filter: brightness(0.94); }
.dt-track .dt-seg[data-seg="sub"] {
  background: #fff3cd;
  /* Emphasise the boundary with a left accent so multi-sub timelines read clearly. */
  box-shadow: inset 2px 0 0 var(--accent);
}
.dt-track .dt-pin {
  position: absolute; top: -3px; bottom: -3px;
  width: 2px; background: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
  z-index: 4;
}
.dt-track .dt-half {
  /* Stronger halftime guide so it stands out against the dark track. */
  position: absolute; top: -2px; bottom: -2px;
  width: 0;
  border-left: 2px dashed rgba(251,191,36,0.85);
  z-index: 2;
}
/* Highlight propagation in segments (matches highlightedPlayers set). */
.dt-track .dt-seg.dt-seg-hl {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  z-index: 3;
  filter: brightness(1.05);
}
.dt-track .dt-seg.dt-seg-dim { opacity: 0.42; }

/* Tier labels — small section dividers above each group of role rows. */
.dt-tier-label {
  font-size: 9px; font-weight: 800;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin: 6px 0 2px 0;
  padding-left: 2px;
}
.dt-tier-label:first-child { margin-top: 0; }
.detail-timeline h4 + .dt-tier-label { margin-top: 0; }

/* Bench row — neutral tone so it reads as "off the field" vs the warm
   played-segment colours. Listing names in a single segment helps spot
   "who's available right now" at a glance. */
.dt-track-bench {
  background: rgba(0,0,0,0.55);
}
.dt-seg-bench {
  background: rgba(232,232,232,0.85) !important;
  color: #444 !important;
  font-size: 9px !important;
  font-weight: 600 !important;
  border-right-color: rgba(0,0,0,0.25) !important;
  cursor: default !important;
}
.dt-seg-bench:hover { filter: none !important; }

/* ══════════════════ Settings tools section ══════════════════ */
.settings-tools-hint {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-mute);
  font-style: italic;
}

/* ══════════════════ Minutes-tab warnings strip ══════════════════ */
.warnings-strip {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 12px;
}
.warning-chip {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  padding: 10px 12px;
  border-radius: var(--r-md);
  text-align: left;
  border: 1px solid;
  font-size: 12px;
  cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
}
.warning-chip:hover { filter: brightness(1.08); }
.warning-chip:active { transform: scale(0.98); }
.warning-chip .warning-label {
  font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.2px;
}
.warning-chip .warning-detail {
  font-size: 11px; opacity: 0.85;
}
.warning-zero {
  background: rgba(239,68,68,0.16);
  border-color: rgba(239,68,68,0.5);
  color: #fecaca;
}
.warning-spread {
  background: rgba(251,146,60,0.16);
  border-color: rgba(251,146,60,0.5);
  color: #fed7aa;
}
.warning-gk {
  background: rgba(56,189,248,0.16);
  border-color: rgba(56,189,248,0.5);
  color: #bae6fd;
}

/* ══════════════════ Bottom sheet inline form ══════════════════ */
#sheet-body { margin-bottom: 12px; }
#sheet-body:empty { display: none; }
.sheet-min-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
  margin-bottom: 10px;
}
.sheet-min-row label {
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  min-width: 60px;
}
.sheet-min-row input[type="number"] {
  flex: 1;
  padding: 8px 10px;
  background: rgba(15,23,42,0.85);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  text-align: center;
}
.sheet-section-label {
  font-size: 11px; font-weight: 700;
  color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin: 8px 0 6px;
}
.sheet-bench-grid {
  display: grid; gap: 6px;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  margin-bottom: 4px;
}
.sheet-bench-chip {
  padding: 12px 8px;
  font-size: 13px; font-weight: 700;
  text-align: center;
  background: rgba(56,189,248,0.12);
  color: var(--text);
  border: 1px solid rgba(56,189,248,0.4);
  border-radius: var(--r-sm);
  width: auto;
}
.sheet-bench-chip:hover { background: rgba(56,189,248,0.2); }
.sheet-bench-chip:active { transform: scale(0.96); }

/* ══════════════════ View toggle (Single / Grid on Games tab) ══════════════════ */
.view-toggle {
  display: flex; gap: 4px;
  margin: 0 0 10px;
  padding: 3px;
  background: rgba(15,23,42,0.7);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  width: fit-content;
}
.view-toggle:empty { display: none; }
.view-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--text-mute);
  border-radius: var(--r-sm);
  transition: background 0.12s, color 0.12s;
}
.view-toggle-btn.active {
  background: var(--accent);
  color: var(--primary-text-on-amber);
}
.view-toggle-btn:not(.active):hover { color: var(--text); background: rgba(71,85,105,0.5); }

/* ══════════════════ Grid view: all games side-by-side ══════════════════ */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 14px;
  margin-top: 6px;
}
#tab-games.view-grid .pitch-card {
  margin-bottom: 0;
  max-width: none;
}
.pitch-card.card-excluded {
  opacity: 0.55;
}
.pitch-card.card-excluded .pitch-card-title::after {
  content: ' · excluded';
  font-size: 11px;
  color: var(--text-mute);
  font-weight: 500;
  letter-spacing: 0.3px;
}
#tab-games.view-grid .game-toolbar { margin-bottom: 12px; }
#tab-games.view-grid .game-min-strip { margin-bottom: 12px; margin-top: 0; }
#tab-games.view-grid .ribbon { display: none; }
#tab-games.view-grid .plan-name { margin-bottom: 4px; }

/* In grid mode at desktop widths, expand the content area so 3-4 cards fit. */
@media (min-width: 900px) {
  #tab-games.view-grid ~ * { /* no-op selector kept for clarity */ }
}

/* ══════════════════ Pitch card header (game label + open-detail button) ══════════════════ */
.pitch-card-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.pitch-card-header .pitch-card-title {
  font-size: 13px; font-weight: 700;
  color: var(--text); letter-spacing: 0.3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pitch-card-header .pitch-detail-btn {
  width: 32px; height: 32px;
  flex-shrink: 0;
}
.pitch-card-header .pitch-detail-btn svg { width: 16px; height: 16px; }

/* ══════════════════ Settings tab ══════════════════ */
.settings-section {
  display: flex; flex-direction: column; gap: 10px;
  background: linear-gradient(to bottom, var(--bg-panel-soft), rgba(15,23,42,0.85));
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: var(--shadow-md);
}
.settings-section h4 {
  margin: 0 0 4px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-mute);
}
.settings-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
}
.settings-row label {
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  min-width: 84px;
}
.settings-row input[type="text"],
.settings-row input[type="number"],
.settings-row select {
  flex: 1;
  padding: 6px 8px;
  background: rgba(15,23,42,0.85);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
}
.settings-row .settings-readout {
  flex: 1;
  font-size: 12px;
  color: var(--text-dim);
}
.settings-row .settings-readout a { color: var(--accent); text-decoration: none; }
.settings-row .settings-readout a:hover { text-decoration: underline; }
.settings-game-row {
  display: grid;
  grid-template-columns: minmax(60px, 0.8fr) minmax(80px, 1.4fr) minmax(50px, 0.7fr) 86px 76px auto;
  gap: 6px; align-items: center;
  padding: 8px 10px;
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
}
.settings-game-row input,
.settings-game-row select {
  padding: 5px 6px;
  background: rgba(15,23,42,0.85);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 12px;
  min-width: 0;
}
@media (max-width: 480px) {
  .settings-game-row {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
    grid-auto-flow: row;
  }
  .settings-game-row .gr-del { grid-column: 3; grid-row: 1 / span 2; }
}
.settings-game-row .gr-num {
  font-size: 10px; font-weight: 700;
  color: var(--accent);
  text-align: center;
}
.settings-game-row .gr-actions {
  display: inline-flex; gap: 4px; align-items: center;
}
.settings-game-row .gr-del,
.settings-game-row .gr-dup {
  width: 26px; height: 26px;
  border-radius: var(--r-sm);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
}
.settings-game-row .gr-del {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.4);
  color: #fca5a5;
}
.settings-game-row .gr-dup {
  background: rgba(56,189,248,0.12);
  border: 1px solid rgba(56,189,248,0.4);
  color: #7dd3fc;
}
.settings-game-row .gr-dup:hover { background: rgba(56,189,248,0.2); }

/* ══════════════════ Narrow screens ══════════════════ */
@media (max-width: 420px) {
  .pos-box { min-width: 92px; max-width: 150px; padding: 3px 3px 4px; }
  .pitch { gap: 5px; padding: 6px; }
  .ribbon-game { min-width: 112px; padding: 9px 32px 9px 12px; }
  .ribbon-game .ribbon-opp { font-size: 13px; }
  .game-min-strip .strip-cell .strip-init { font-size: 7px; }
  .slot { font-size: 11.5px; padding: 3px 3px 8px; min-height: 26px; }
}

/* ══════════════════ Wider / tablet+ ══════════════════ */
@media (min-width: 900px) {
  .content {
    max-width: 960px; margin: 0 auto;
  }
  .pitch-card { max-width: 540px; margin-left: auto; margin-right: auto; margin-bottom: 12px; }
  /* Desktop grid mode: drop the centred 960px cap so 3-4 cards can fit, and
     let cards stretch to the column width (no internal 540px cap). */
  body:has(#tab-games.view-grid.tab-panel.active) .content { max-width: 1600px; }
  #tab-games.view-grid .pitch-card { max-width: none; margin: 0; }
}
</style>
</head>

<!-- Bottom sheet -->
<div id="sheet-backdrop" class="sheet-backdrop"></div>

/* Tag every formation role with a stamina/sub hint, used by the fair-share
   suggester. GK is always 'never' (almost never subbed). Roles that
   conventionally play full game ('preserved') sit in the back line and
   central spine; flank/wing/striker roles are 'preferred' (typically
   subbed at half-time so a bench player can come on). User's note: in
   5v5 all outfield roles are equal — no preserved roles. */
const _STAMINA_PRESERVED = {
  '3v3':   new Set(['DEF']),
  '5v5':   new Set([]),
  '8v8':   new Set(['LB','CB','RB','CDM','CM','CAM']),
  '11v11': new Set(['LB','LCB','RCB','CB','RB','LDM','RDM','CDM','LCM','CM','RCM','CAM']),
};
(function tagRoleStamina() {
  for (const f of FORMATIONS) {
    const preserved = _STAMINA_PRESERVED[f.fieldSize] || new Set();
    for (const r of f.roles) {
      r.sub = r.name === 'GK' ? 'never' : (preserved.has(r.name) ? 'preserved' : 'preferred');
    }
  }
})();

function getFormation(id) { return FORMATIONS.find(f => f.id === id) || FORMATIONS.find(f => f.id === '8v8-2-1-2-1-1'); }

// Group roles into rows (top-of-pitch first, GK as last bottom row).
// Roles within tolerance ±0.04 in relY count as the same row; rows sort
// ascending by mean relY; within a row roles sort ascending by relX.
function formationRows(formation) {
  const tol = 0.04;
  const sorted = formation.roles.slice().sort((a, b) => a.relY - b.relY);
  const rows = [];
  for (const r of sorted) {
    const row = rows.find(R => Math.abs(R.relY - r.relY) <= tol);
    if (row) { row.roles.push(r); row.relY = (row.relY * row.roles.length + r.relY) / (row.roles.length + 1); }
    else rows.push({ relY: r.relY, roles: [r] });
  }
  rows.forEach(R => R.roles.sort((a, b) => a.relX - b.relX));
  rows.sort((a, b) => a.relY - b.relY);
  return rows;
}

/* Repair role names if a saved plan uses slightly different role keys than the
   current formation registry (e.g. 5v5-3-1 was originally shipped with
   LB/CB/RB; coords were at midfield band so it was renamed to LM/CM/RM).
   Strategy: if every startingXI key is already a valid role, no-op; else
   build a positional rename map (old roles in the same listed order →
   new roles in the same listed order) and rewrite startingXI + scheduledSubs.
   Returns the (possibly mutated) game. */
function repairGameRoles(game, formation) {
  if (!game || !formation) return game;
  const validRoles = new Set(formation.roles.map(r => r.name));
  const oldRoles = Object.keys(game.startingXI || {});
  if (oldRoles.length === 0) return game;
  const allValid = oldRoles.every(r => validRoles.has(r));
  if (allValid) return game;
  // Positional remap: assume old keys were ordered the same as the formation roles.
  // Carry any role name that already matches; remap the rest by index.
  const newRoles = formation.roles.map(r => r.name);
  if (oldRoles.length !== newRoles.length) return game; // can't safely repair
  const renameMap = {};
  for (let i = 0; i < oldRoles.length; i++) {
    if (oldRoles[i] !== newRoles[i]) renameMap[oldRoles[i]] = newRoles[i];
  }
  if (Object.keys(renameMap).length === 0) return game;
  const newXI = {};
  for (let i = 0; i < oldRoles.length; i++) {
    const oldR = oldRoles[i];
    const newR = renameMap[oldR] || oldR;
    newXI[newR] = game.startingXI[oldR];
  }
  game.startingXI = newXI;
  if (Array.isArray(game.scheduledSubs)) {
    for (const s of game.scheduledSubs) {
      if (s && renameMap[s.role]) s.role = renameMap[s.role];
    }
  }
  return game;
}
function repairTournamentRoles(t) {
  if (!t || !Array.isArray(t.games)) return t;
  const formation = getFormation(t.formationId);
  if (!formation) return t;
  for (const g of t.games) repairGameRoles(g, formation);
  return t;
}

/* ══════════════════ Migration v2 → v3 ══════════════════ */
function migrateV2ToV3(v2) {
  if (!v2 || !Array.isArray(v2.games)) return null;
  const games = v2.games.map((g, i) => {
    const startingXI = {};
    for (const role of V2_POSITIONS) startingXI[role] = (g && g.h1 && typeof g.h1[role] === 'string') ? g.h1[role] : '';
    const scheduledSubs = [];
    for (const role of V2_POSITIONS) {
      const a = g && g.h1 ? g.h1[role] : '';
      const b = g && g.h2 ? g.h2[role] : '';
      if (a && b && a !== b) {
        scheduledSubs.push({
          id: newSubId(),
          timeSec: 750, role,
          outPlayer: a, inPlayer: b,
        });
      }
    }
    return {
      id: 'g' + (i + 1),
      label: 'Game ' + (i + 1),
      time: V2_SCHEDULE[i] ? V2_SCHEDULE[i].time : '',
      field: V2_SCHEDULE[i] ? V2_SCHEDULE[i].field : '',
      opponent: V2_SCHEDULE[i] ? V2_SCHEDULE[i].opp : 'Opponent',
      numberOfPeriods: 2,
      periodDurationMinutes: 12.5,
      durationMin: 25,
      halfTimeMin: 12.5,
      startingXI,
      scheduledSubs,
    };
  });
  return {
    teamName: 'Pepo Violetti',
    formationId: '8v8-2-1-2-1-1',
    rosterSize: 11,
    games,
  };
}

  return playerTotalSec(player) / expected;
}
function hueForRatio(r) {
  const c = Math.max(0.4, Math.min(1.5, r));
  return Math.round((c - 0.4) / 1.1 * 150);
}
function ratioColors(r) {
  // Solid background + contrasting text for a ratio-coloured chip.
  if (r === null) return { bg: '#475569', fg: '#e2e8f0' };
  const h = hueForRatio(r); // 0 (red) → 150 (green)
  if (h < 35)     return { bg: 'hsl(' + h + ', 72%, 46%)', fg: '#fef2f2' };  // red — cream text
  if (h < 85)     return { bg: 'hsl(' + h + ', 78%, 60%)', fg: '#1a1a1a' };  // yellow — dark text
  return              { bg: 'hsl(' + h + ', 55%, 40%)', fg: '#ecfdf5' };   // green — cream text
}
function formatMin(sec) { const m = Math.floor(sec/60), s = sec%60; return m + ':' + s.toString().padStart(2,'0'); }
function benchedBothHalves(gi) {
  // Renamed semantics for the new model: players who never appear on the field this game.
  const g = tournament.games[gi];
  if (!g) return [];
  const onField = playersOnFieldThisGame(g);
  return PLAYERS.filter(p => !onField.has(p));
}
function playerInitials(name) {
  return name.split(/[\s.]+/).filter(Boolean).map(s => s[0]).slice(0,2).join('').toUpperCase();
}
function anyHighlightActive() { return highlightedPlayers.size > 0; }
function isHighlighted(p) { return p && highlightedPlayers.has(p); }
function toggleHighlight(p) {
  if (!p) return;
  if (highlightedPlayers.has(p)) highlightedPlayers.delete(p);
  else highlightedPlayers.add(p);
}

/* ══════════════════ Swap engine (segment-aware) ══════════════════
 * A "chip" is identified by (gameIdx, role, startSec). startSec=0 means the
 * starting-XI segment for that role. role='__BENCH__' means a bench chip.
 *
 * Swap semantics:
 *   - Two field segments (same or different role): swap the two players for
 *     those exact time intervals. If the segments are at the same role, this
 *     is just a name-swap of the two players. If at different roles, we need
 *     each segment to independently take the other's player.
 *   - Field segment ↔ bench chip: bring the bench player ON for that time
 *     interval, push the field player OFF for that interval.
 *
 * For starting-XI segments we mutate startingXI[role]; for later segments we
 * mutate the corresponding sub.inPlayer; we may also need to update the
 * subsequent boundary's outPlayer for consistency.
 */

function _setSegmentPlayer(game, role, startSec, newPlayer) {
  // Sets the active player for the segment that starts at startSec at this role.
  // startSec === 0 → startingXI[role]; otherwise → sub.inPlayer of the matching sub.
  if (startSec <= 0) {
    game.startingXI[role] = newPlayer || '';
    // The first sub at this role keeps its outPlayer in sync (whatever was on field at that sub time).
    return;
  }
  const subs = (game.scheduledSubs || []).filter(s => s.role === role).sort((a, b) => a.timeSec - b.timeSec);
  const idx = subs.findIndex(s => s.timeSec === startSec);
  if (idx >= 0) subs[idx].inPlayer = newPlayer || '';
}
function _segmentPlayer(game, role, startSec) {
  if (startSec <= 0) return game.startingXI[role] || '';
  const sub = (game.scheduledSubs || []).find(s => s.role === role && s.timeSec === startSec);
  return sub ? (sub.inPlayer || '') : '';
}

function performSwap(gIdx, srcRole, srcStart, tgtRole, tgtStart, benchPlayerOverride) {
  const g = tournament.games[gIdx];
  if (!g) return;
  const isSrcBench = srcRole === '__BENCH__';
  const isTgtBench = tgtRole === '__BENCH__';
  if (isSrcBench && isTgtBench) return;
  if (!isSrcBench && !isTgtBench && srcRole === tgtRole && srcStart === tgtStart) return;

  if (!isSrcBench && !isTgtBench) {
    const srcP = _segmentPlayer(g, srcRole, srcStart);
    const tgtP = _segmentPlayer(g, tgtRole, tgtStart);
    if (!srcP && !tgtP) return;
    _setSegmentPlayer(g, srcRole, srcStart, tgtP);
    _setSegmentPlayer(g, tgtRole, tgtStart, srcP);
    saveAll(); pushHistory(); renderActiveTab();
    return;
  }

  const fieldRole = isSrcBench ? tgtRole : srcRole;
  const fieldStart = isSrcBench ? tgtStart : srcStart;
  const benchPlayer = benchPlayerOverride || (tapSelected && tapSelected.benchPlayer);
  if (!benchPlayer) return;
  _setSegmentPlayer(g, fieldRole, fieldStart, benchPlayer);
  saveAll(); pushHistory(); renderActiveTab();
}

/* Add or update a substitution at (gameIdx, role, atSec) bringing inPlayer on. */
/* Trigger a rerender of the detail modal too if it's open, so timeline +
   pitch reflect a state change made via the modal's segment-tap sheet. */
function _rerenderAfterMutate() {
  renderActiveTab();
  if (detailGameIdx >= 0 && document.getElementById('detail-overlay').classList.contains('open')) {
    renderDetailModal();
  }
  // Surface any new double-position issues introduced by the edit.
  if (typeof refreshStateBanner === 'function') refreshStateBanner();
}
function addSubAtMinute(gameIdx, role, atSec, inPlayer) {
  const g = tournament.games[gameIdx];
  if (!g) return;
  const durationSec = gameTotalSec(g);
  atSec = Math.max(1, Math.min(durationSec - 1, Math.round(atSec)));
  // Refuse if the chosen player is already on the field at another role at
  // exactly this moment — they can't be in two places at once. Rare path
  // (the bench-picker only shows actually-on-bench players), but the same
  // function is also called from "Replace incoming player" / "Move sub" so
  // the guard belongs here.
  if (inPlayer && wouldCauseDoublePosition(g, role, atSec, inPlayer)) {
    alert(inPlayer + ' is already on the field at this moment in another role. Pick a different player or sub them off first.');
    return;
  }
  // Find existing player at that time at this role (becomes outPlayer).
  // Compute outPlayer from a slightly-earlier instant so an in-place update
  // (where the sub at this role+time already exists) reads the segment
  // *before* the boundary, not the segment that the existing sub starts.
  const outPlayer = playerAtRoleSec(g, role, Math.max(0, atSec - 1));
  // If a sub already exists at exactly atSec for this role, update in-place; else append.
  const existing = (g.scheduledSubs || []).find(s => s.role === role && s.timeSec === atSec);
  if (existing) {
    existing.outPlayer = outPlayer;
    existing.inPlayer = inPlayer || '';
  } else {
    g.scheduledSubs = g.scheduledSubs || [];
    g.scheduledSubs.push({
      id: newSubId(),
      role, timeSec: atSec,
      outPlayer, inPlayer: inPlayer || ''
    });
  }
  // Keep subs sorted in time order for deterministic rendering.
  g.scheduledSubs.sort((a, b) => a.role.localeCompare(b.role) || a.timeSec - b.timeSec);
  saveAll(); pushHistory(); _rerenderAfterMutate();
}
function removeSub(gameIdx, subId) {
  const g = tournament.games[gameIdx];
  if (!g || !Array.isArray(g.scheduledSubs)) return;
  g.scheduledSubs = g.scheduledSubs.filter(s => s.id !== subId);
  saveAll(); pushHistory(); _rerenderAfterMutate();
}

/* ══════════════════ Rendering ══════════════════ */
function renderActiveTab() {
  if (activeTab === 'games') renderGamesTab();
  else if (activeTab === 'minutes') renderMinutesTab();
  else if (activeTab === 'plans') renderPlans();
  else if (activeTab === 'settings') renderSettings();
  updateVersionBadge();
}

/* ─── Plan name line (under the ribbon) ─── */
function updateVersionBadge() {
  const b = document.getElementById('plan-name');
  if (!b) return;
  if (currentVersionName) {
    const dirty = isWorkingCopyDirty();
    b.textContent = currentVersionName + (dirty ? ' • unsaved' : '');
    b.classList.add('has-version');
    b.classList.toggle('is-dirty', dirty);
  } else {
    b.textContent = '';
    b.classList.remove('has-version', 'is-dirty');
  }
}

/* ─── Games tab ─── */
function renderGamesTab() {
  renderViewToggle();
  // Ribbon is only useful in Single mode; Grid mode shows every game card directly.
  if (viewMode === 'single') {
    renderRibbon();
  } else {
    const ribbon = document.getElementById('ribbon');
    if (ribbon) ribbon.innerHTML = '';
  }
  renderGameDetail();
}
function renderViewToggle() {
  const host = document.getElementById('view-toggle');
  if (!host) return;
  const isGrid = viewMode === 'grid';
  host.innerHTML =
    '<button type="button" class="view-toggle-btn' + (isGrid ? '' : ' active') + '" data-vm="single" title="Single game view">' +
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"><rect x="4" y="5" width="16" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>' +
      '<span>Single</span>' +
    '</button>' +
    '<button type="button" class="view-toggle-btn' + (isGrid ? ' active' : '') + '" data-vm="grid" title="All games side-by-side">' +
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"><rect x="3.5" y="5" width="7.5" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="5" width="7.5" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>' +
      '<span>Grid</span>' +
    '</button>';
  host.querySelectorAll('.view-toggle-btn').forEach(b => {

  });
}
function renderRibbon() {
  const container = document.getElementById('ribbon');
  container.innerHTML = '';
  tournament.games.forEach((game, i) => {
    const btn = document.createElement('button');
    btn.className = 'ribbon-game' + (i === activeGame ? ' active' : '') + (included[i] ? '' : ' excluded');
    btn.dataset.game = i;
    const dotTitle = included[i] ? 'Counted in totals - tap to exclude' : 'Excluded from totals - tap to include';
    const opp = game.opponent || 'TBD';
    const time = game.time || 'TBD';
    const field = game.field || '';
    const timeText = time + (field && field !== 'TBD' ? ' · ' + field : '');
    btn.innerHTML =
      '<span class="ribbon-include' + (included[i] ? ' on' : '') + '" data-toggle role="checkbox" aria-checked="' + included[i] + '" aria-label="' + dotTitle + '" title="' + dotTitle + '"></span>' +
      '<span class="ribbon-label">' + (game.label || ('Game ' + (i+1))) + '</span>' +
      '<span class="ribbon-opp">' + escapeHtml(opp) + '</span>' +
      '<span class="ribbon-time">' + escapeHtml(timeText) + '</span>';
    btn.addEventListener('click', (e) => {
      if (e.target.closest('[data-toggle]')) {
        e.stopPropagation();
        included[i] = !included[i];
        saveAll(); pushHistory(); renderActiveTab();
        return;
      }
      if (i === activeGame) return;
      const direction = i > activeGame ? 'next' : 'prev';
      activeGame = i; tapSelected = null; renderGamesTab();
      animateGameSwitch(direction);
    });
    container.appendChild(btn);
  });
  const activeEl = container.querySelector('.ribbon-game.active');
  if (activeEl && activeEl.scrollIntoView) activeEl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
}

/* Build one segment chip. role='__BENCH__' for bench chips (no startSec semantics). */
function chipHtml(gameIdx, role, startSec, segIdx, segMin, player, extraClass) {
  const hl = isHighlighted(player) ? 'highlighted' : '';
  const dim = anyHighlightActive() && player && !isHighlighted(player) ? 'any-highlighted' : '';
  const tap = tapSelected
    && tapSelected.game === gameIdx
    && tapSelected.role === role
    && tapSelected.startSec === startSec
    && tapSelected.benchPlayer === (role === '__BENCH__' ? player : undefined)
      ? 'tap-selected' : '';
  const cls = ['slot', hl, dim, tap, extraClass || ''].filter(Boolean).join(' ');
  let barHtml = '';
  if (player) {
    const r = playerRatio(player);
    const hue = r !== null ? hueForRatio(r) : 60;
    const pct = r !== null ? Math.min(100, Math.max(0, r * 80)) : 0;
    barHtml = '<div class="chip-min-bar"><div class="chip-min-fill" style="--chip-hue:' + hue + ';--chip-ratio:' + pct + '%"></div></div>';
  }
  // Minute badge on non-first segments — makes sub timing legible at a glance
  // ("Niilo · 12'" tells you the sub came on at minute 12 without measuring chip width).
  let minuteBadge = '';
  if (role !== '__BENCH__' && segIdx > 0 && startSec > 0) {
    const startMin = Math.round(startSec / 60 * 2) / 2;
    const startMinStr = (startMin % 1 === 0 ? String(startMin) : startMin.toFixed(1));
    minuteBadge = '<span class="chip-min-tag">' + startMinStr + "'" + '</span>';
  }
  const flex = Math.max(1, Math.round(segMin || 0));
  const benchAttr = role === '__BENCH__' ? ' data-bench-player="' + escapeHtml(player || '') + '"' : '';
  return '<div class="' + cls + '" data-game="' + gameIdx + '" data-role="' + escapeHtml(role) + '" data-start="' + startSec + '" data-segidx="' + segIdx + '"' + benchAttr + ' style="--seg-flex:' + flex + ';" draggable="true">' +
    minuteBadge +
    '<span class="chip-name">' + escapeHtml(player || '') + '</span>' + barHtml + '</div>';
}

/* Build the HTML for a single game's pitch card (pitch + bench drawer).
   Used by both Single mode (one card for activeGame) and Grid mode
   (every included game side-by-side). Does NOT include the game-toolbar
   or tournament-totals strip — those are rendered once and shared. */
function renderGameCardHtml(gIdx) {
  const g = tournament.games[gIdx];
  if (!g) return '';
  const benchedNeverPlay = new Set(benchedBothHalves(gIdx));
  const formation = getFormation(tournament.formationId);
  const rows = formationRows(formation);
  const benchOpen = benchOpenSet.has(gIdx);
  const durationSec = gameTotalSec(g);
  const halfSec = gameHalfTimeSec(g);
  const htPct = halfSec > 0 ? (halfSec / durationSec * 100).toFixed(2) + '%' : '50%';

  const headerLine = (g.label || ('Game ' + (gIdx + 1))) + ' · ' + (g.opponent || 'TBD');

  let html = '';
  const cardCls = 'pitch-card' + (included[gIdx] ? '' : ' card-excluded');
  html += '<div class="' + cardCls + '" data-game-card="' + gIdx + '">';
  html +=   '<div class="pitch-card-header">';
  html +=     '<span class="pitch-card-title">' + escapeHtml(headerLine) + '</span>';
  html +=     '<button class="icon-btn pitch-detail-btn" data-detail-for="' + gIdx + '" title="Open detail view" aria-label="Open detail view">' +
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>' +
              '</button>';
  html +=   '</div>';
  html +=   '<div class="pitch">';
  for (const row of rows) {
    html += '<div class="pitch-row">';
    for (const role of row.roles) {
      const segs = getCellSegments(g, role.name);
      const isFull = segs.length === 1;
      html += '<div class="pos-box">';
      html +=   '<div class="pos-label">';
      html +=     '<span class="pos-name">' + escapeHtml(role.name) + '</span>';
      html +=     '<button type="button" class="pos-menu-btn" tabindex="-1" data-pos-menu="' + gIdx + '|' + escapeHtml(role.name) + '" title="Position actions" aria-label="Position actions">' +
                    '<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor" aria-hidden="true">' +
                      '<path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.03 7.03 0 0 0-1.69-.98l-.38-2.65A.5.5 0 0 0 14 2h-4a.5.5 0 0 0-.49.42l-.38 2.65c-.61.24-1.18.57-1.69.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.14.22.43.31.66.22l2.49-1c.51.41 1.08.74 1.69.98l.38 2.65c.05.24.25.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65c.61-.24 1.18-.57 1.69-.98l2.49 1c.23.09.52 0 .66-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/>' +
                    '</svg>' +
                  '</button>';
      html +=   '</div>';
      html +=   '<div class="chip-row' + (isFull ? ' full-game' : '') + '" style="--ht-pct:' + htPct + ';">';
      const playsBothAtHalf = (player) => {
        let count = 0;
        for (const s of segs) if (s.player === player) count++;
        return count > 1 ? 'plays-both' : '';
      };
      for (const seg of segs) {
        const segMin = (seg.endSec - seg.startSec) / 60;
        const extra = playsBothAtHalf(seg.player);
        html += chipHtml(gIdx, role.name, seg.startSec, seg.segIdx, segMin, seg.player, extra);
      }
      if (halfSec > 0) html += '<div class="ht-divider"></div>';
      html +=   '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html +=   '</div>';

  // Bench drawer
  const benchPlayersAtKickoff = benchAtSec(g, 0);
  const showHalfTimeBench = halfSec > 0;
  const benchPlayersAtHT = showHalfTimeBench ? benchAtSec(g, halfSec) : [];
  const benchCountLabel = showHalfTimeBench
    ? (benchPlayersAtKickoff.length + ' / ' + benchPlayersAtHT.length)
    : String(benchPlayersAtKickoff.length);
  html +=   '<button class="bench-drawer-toggle" data-bench-toggle="' + gIdx + '" aria-expanded="' + benchOpen + '">' +
              '<span>Bench (' + benchCountLabel + ')</span><span class="chev">▼</span>' +
            '</button>';
  html +=   '<div class="bench-section' + (benchOpen ? ' open' : '') + '">';
  if (showHalfTimeBench) html += '<div class="bench-row-label">Kickoff</div>';
  html +=     '<div class="bench-row"><div class="chip-row">' +
                benchPlayersAtKickoff.map((pl) => {
                  const extra = benchedNeverPlay.has(pl) ? 'benched-both' : '';
                  return chipHtml(gIdx, '__BENCH__', 0, 0, 1, pl, extra);
                }).join('') +
              '</div></div>';
  if (showHalfTimeBench) {
    const halfMinLabel = Math.round(halfSec / 60 * 2) / 2;
    const halfMinStr = halfMinLabel % 1 === 0 ? String(halfMinLabel) : halfMinLabel.toFixed(1);
    html += '<div class="bench-row-label">After ' + halfMinStr + "'</div>";
    html +=   '<div class="bench-row"><div class="chip-row">' +
                  benchPlayersAtHT.map((pl) => {
                    const extra = benchedNeverPlay.has(pl) ? 'benched-both' : '';
                    return chipHtml(gIdx, '__BENCH__', 0, 0, 1, pl, extra);
                  }).join('') +
              '</div></div>';
  }
  html +=   '</div>';
  html += '</div>'; // close .pitch-card
  return html;
}

/* Tournament-totals strip — shared across both view modes. Single mode
   renders it once per active card; Grid mode renders it once above the
   grid since it's identical for every game. */
function renderTournamentTotalsHtml() {
  let html = '<div class="game-min-strip totals">';
  html +=   '<h4>Tournament totals</h4>';
  html +=   '<div class="strip-row">';
  const sortedForStrip = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });
  const anyHi = anyHighlightActive();
  html += sortedForStrip.map(pl => {
    const totMin = Math.round(playerTotalSec(pl) / 60);
    const r = playerRatio(pl);
    const c = ratioColors(r);
    const hl = isHighlighted(pl);
    const dim = anyHi && !hl;
    const cls = 'strip-cell' + (hl ? ' highlighted' : '') + (dim ? ' any-highlighted' : '');
    return '<button class="' + cls + '" ' +
      'data-player="' + pl.replace(/"/g, '&quot;') + '" ' +
      'style="--cell-bg:' + c.bg + ';--cell-fg:' + c.fg + '" ' +
      'title="' + pl + ' — ' + totMin + "'" + '">' +
      '<span class="strip-init">' + playerInitials(pl) + '</span>' +
    '</button>';
  }).join('');
  html +=   '</div>';
  html += '</div>';
  return html;
}

function renderGameDetail() {
  const view = document.getElementById('game-detail');
  if (!view) return;
  const tabGames = document.getElementById('tab-games');
  const isGrid = viewMode === 'grid';
  tabGames.classList.toggle('view-grid', isGrid);
  tabGames.classList.toggle('view-single', !isGrid);

  let html = '';
  if (isGrid) {
    // Grid mode: shared toolbar + totals + grid of all games (or only included games).
    html += renderGameToolbarHtml();
    html += renderTournamentTotalsHtml();
    html += '<div class="games-grid">';
    for (let i = 0; i < tournament.games.length; i++) {
      html += renderGameCardHtml(i);
    }
    html += '</div>';
  } else {
    // Single mode (current): one game's card + totals strip inside the card,
    // then the toolbar after.
    const gIdx = activeGame;
    const g = tournament.games[gIdx];
    if (!g) { view.innerHTML = ''; return; }
    // Card with totals strip embedded inside (legacy layout for single mode).
    let card = renderGameCardHtml(gIdx);
    // Inject totals strip just before the closing </div> of the card.
    const closeIdx = card.lastIndexOf('</div>');
    card = card.slice(0, closeIdx) + renderTournamentTotalsHtml() + card.slice(closeIdx);
    html += card;
    html += renderGameToolbarHtml();
  }
  view.innerHTML = html;

  // Handlers
  const undoBtn = document.getElementById('btn-undo');
  if (undoBtn) undoBtn.addEventListener('click', undo);
  const redoBtn = document.getElementById('btn-redo');
  if (redoBtn) redoBtn.addEventListener('click', redo);
  const fsBtnGame = document.getElementById('btn-fair-share-game');
  if (fsBtnGame) fsBtnGame.addEventListener('click', () => {
    const includedCount = included.filter(Boolean).length;
    if (includedCount === 0) { alert('No games are included. Toggle game inclusion in the ribbon first.'); return; }
    if (!confirm('Rebuild starting XI + half-time subs across ' + includedCount + ' included game(s) to balance minutes? Existing subs will be replaced. Use Undo to roll back.')) return;
    suggestFairShareLineup();
  });
  // Open-detail buttons (one per card in grid mode, one in single mode).
  view.querySelectorAll('[data-detail-for]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.detailFor, 10);

  // Bench-drawer toggles (per card).

  // Strip cells → highlight / open per-player sheet
  view.querySelectorAll('.game-min-strip .strip-cell').forEach(cell => {

    if (!p) return;
    cell.addEventListener('click', (e) => {

    });
