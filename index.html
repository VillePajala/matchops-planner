<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MatchOps Planner</title>
<meta name="description" content="Tournament lineup and substitution planner.">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════ Design tokens (MatchOps family) ══════════════════ */
:root {
  --bg-base: #0f172a;
  --bg-panel: #1e293b;
  --bg-panel-soft: rgba(30,41,59,0.92);
  --bg-panel-strong: rgba(30,41,59,0.98);
  --bg-elev: rgba(51,65,85,0.7);
  --border-soft: rgba(71,85,105,0.4);
  --border: rgba(71,85,105,0.6);
  --border-strong: rgba(100,116,139,0.8);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-mute: #64748b;
  --heading: #facc15;      /* yellow-400 */
  --accent: #fbbf24;       /* amber-400 */
  --accent-strong: #f59e0b;/* amber-500 */
  --accent-deep: #d97706;  /* amber-600 */
  --primary-text-on-amber: #1e293b;
  --success: #22c55e;
  --warn: #fb923c;
  --danger: #ef4444;
  --info: #38bdf8;
  --info-strong: #0ea5e9;
  --glow-sky: rgba(56,189,248,0.08);
  --glow-indigo: rgba(99,102,241,0.08);
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-pill: 999px;
  --app-bar-h: 56px;
  --bottom-nav-h: 66px;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  background: var(--bg-base);
  overflow-x: hidden;
}
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  color: var(--text);
  background:
    radial-gradient(at 20% 10%, var(--glow-sky), transparent 55%),
    radial-gradient(at 85% 95%, var(--glow-indigo), transparent 55%),
    var(--bg-base);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font-family: inherit; }
button { border: none; background: none; color: inherit; cursor: pointer; }
* { scrollbar-width: thin; scrollbar-color: rgba(51,65,85,0.5) transparent; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background-color: rgba(51,65,85,0.5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background-color: rgba(71,85,105,0.8); }

/* ══════════════════ App shell ══════════════════ */
.app-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(var(--app-bar-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.03);
  z-index: 50;
}
.app-bar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to bottom, var(--glow-sky), transparent 50%);
}
.app-bar > * { position: relative; z-index: 1; }

.app-logo {
  width: 36px; height: 36px;
  flex-shrink: 0;
  object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.35));
}
.app-title {
  flex: 1 1 auto;
  min-width: 0;
  font-family: 'Rajdhani', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.4px;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.save-status {
  font-size: 10px; color: var(--success); font-weight: 600;
  flex-shrink: 0;
  transition: opacity 0.3s;
}
/* Plan name — plain text line under the ribbon, no pill/icon */
.plan-name {
  display: none;
  padding: 0 4px;
  margin: -4px 0 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  color: var(--text-mute);
  background: none; border: none;
  text-align: left;
  max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.plan-name.has-version { display: block; }
.plan-name:hover { color: var(--text-dim); }

/* Install-as-PWA prompt banner (browser-driven install + iOS hint) */
.install-banner {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 10px;
  padding: 10px 12px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.4);
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--text);
}
.install-banner[hidden] { display: none !important; }
.install-banner .install-text {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.install-banner .install-action {
  background: var(--accent); color: var(--primary-text-on-amber);
  border: 1px solid var(--accent);
  padding: 5px 12px; border-radius: 6px;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  cursor: pointer;
}
.install-banner .install-dismiss {
  background: transparent; color: var(--text-mute);
  padding: 2px 6px; border: none;
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  cursor: pointer;
}
@media (max-width: 420px) {
  .app-title { font-size: 17px; }
  .save-status { display: none; } /* reclaim space on narrow */
}
@media (max-width: 340px) {
  .app-title { font-size: 15px; }
}

.content {
  padding-top: calc(var(--app-bar-h) + env(safe-area-inset-top) + 12px);
  padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom) + 12px);
  padding-left: max(12px, env(safe-area-inset-left));
  padding-right: max(12px, env(safe-area-inset-right));
  min-height: 100vh; min-height: 100dvh;
}
.tab-panel { display: none; animation: fadeSlideIn 0.22s ease-out; }
.tab-panel.active { display: block; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Clip horizontal overflow only around the slide-animated panel so
   the ribbon above keeps room for its box-shadows. */
.game-detail-wrap {
  overflow: clip;
  overflow-x: clip;
  /* small side padding so shadows / outlines on inner cards aren't
     shaved by the clip box */
  padding: 0 2px;
  margin: 0 -2px;
}
#game-detail {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: translate3d(0, 0, 0);
}
/* Game-carousel slide animations (swipe or ribbon tap).
   Short, GPU-accelerated, small travel distance — no layout shift. */
#game-detail.slide-from-right {
  animation: gameSlideFromRight 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
#game-detail.slide-from-left {
  animation: gameSlideFromLeft 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
@keyframes gameSlideFromRight {
  from { opacity: 0.85; transform: translate3d(6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}
@keyframes gameSlideFromLeft {
  from { opacity: 0.85; transform: translate3d(-6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: max(6px, env(safe-area-inset-left));
  padding-right: max(6px, env(safe-area-inset-right));
  display: flex; align-items: stretch;
  background: linear-gradient(to top, rgba(15,23,42,0.98), rgba(30,41,59,0.95));
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.3);
}
.bottom-nav::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: rgba(99,102,241,0.06);
  mix-blend-mode: soft-light;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 6px 4px;
  color: var(--text-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color 0.15s, transform 0.15s;
  position: relative;
}
.nav-item .nav-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
}
.nav-item .nav-icon svg {
  width: 22px; height: 22px;
  stroke: currentColor; fill: none;
  stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
  content: ''; position: absolute; top: 0; left: 22%; right: 22%;
  height: 3px; border-radius: 0 0 3px 3px;
  background: linear-gradient(to right, var(--accent-strong), var(--accent));
  box-shadow: 0 0 10px var(--accent);
}
.nav-item:active { transform: scale(0.94); }

/* ══════════════════ Games tab ══════════════════ */
.ribbon {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 2px 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  margin: 0 -6px 12px;
  padding-left: 6px; padding-right: 6px;
}
.ribbon-game {
  flex: 0 0 auto; scroll-snap-align: start;
  padding: 11px 34px 11px 14px; border-radius: var(--r-md);
  background:
    linear-gradient(180deg, rgba(51,65,85,0.55) 0%, rgba(30,41,59,0.75) 55%, rgba(15,23,42,0.85) 100%);
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  display: flex; flex-direction: column; align-items: flex-start; gap: 3px;
  min-width: 144px;
  position: relative; overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 2px rgba(0,0,0,0.35);
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}
.ribbon-game::before {
  /* thin top accent bar — transparent by default, amber when active */
  content: ''; position: absolute; left: 0; right: 0; top: 0;
  height: 2px; background: transparent;
  transition: background 0.18s ease;
}
.ribbon-game::after {
  /* hairline divider between label and opp rows for a classic card look */
  content: ''; position: absolute; left: 14px; right: 34px;
  top: 28px; height: 1px;
  background: linear-gradient(to right, rgba(148,163,184,0.18), rgba(148,163,184,0.04));
  pointer-events: none;
}
.ribbon-game .ribbon-label {
  font-size: 10px; font-weight: 700; color: var(--text-mute);
  letter-spacing: 0.8px; text-transform: uppercase;
}
.ribbon-game .ribbon-opp {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-top: 4px;
}
.ribbon-game .ribbon-time {
  font-size: 10px; color: var(--text-mute); font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.ribbon-game.active {
  background:
    linear-gradient(180deg, rgba(51,65,85,0.92) 0%, rgba(30,41,59,0.95) 60%, rgba(15,23,42,0.95) 100%);
  border-color: rgba(251,191,36,0.6);
  color: var(--text);
  box-shadow:
    0 6px 18px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(251,191,36,0.18),
    inset 0 0 0 1px rgba(251,191,36,0.08);
}
.ribbon-game.active::before {
  background: linear-gradient(to right, transparent 0%, var(--accent) 18%, var(--accent) 82%, transparent 100%);
}
.ribbon-game.active::after {
  background: linear-gradient(to right, rgba(251,191,36,0.55), rgba(251,191,36,0.08));
}
.ribbon-game.active .ribbon-label { color: var(--accent); letter-spacing: 1px; }
.ribbon-game.active .ribbon-opp  { color: var(--text); }
.ribbon-game.active .ribbon-time { color: var(--text-dim); }
.ribbon-game.excluded { opacity: 0.45; }
.ribbon-game.excluded .ribbon-opp { text-decoration: line-through; text-decoration-color: rgba(148,163,184,0.55); }
.ribbon-game:active { transform: scale(0.97); }

/* Include-in-totals dot (top-right corner of each ribbon card) */
.ribbon-include {
  position: absolute; top: 8px; right: 8px;
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid rgba(148,163,184,0.5);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  z-index: 2;
}
.ribbon-include::after {
  /* enlarge tap target without moving the visible dot */
  content: ''; position: absolute; inset: -8px;
}
.ribbon-include.on {
  background: var(--success); border-color: var(--success);
  box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
}
.ribbon-include.on::before {
  content: '✓'; font-size: 10px; font-weight: 900; color: #0f172a; line-height: 1;
}

/* Game toolbar (undo/redo) — now placed AFTER the pitch card */
.game-toolbar {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  margin-bottom: 10px;
}
.game-toolbar.after-pitch {
  margin-top: 4px;
  margin-bottom: 16px;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--r-md);
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  color: var(--text-dim);
  transition: all 0.15s;
}
.icon-btn svg {
  width: 18px; height: 18px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.icon-btn:not(:disabled):hover { background: rgba(71,85,105,0.9); color: var(--text); }
.icon-btn:not(:disabled):active { transform: scale(0.94); }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Pitch card */
.pitch-card {
  background: linear-gradient(180deg, rgba(30,41,59,0.88) 0%, rgba(15,23,42,0.95) 100%);
  border: 1px solid rgba(71,85,105,0.55);
  border-radius: var(--r-lg);
  padding: 14px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}
.pitch-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-lg);
  background:
    radial-gradient(at 15% 0%, rgba(56,189,248,0.08), transparent 40%),
    radial-gradient(at 85% 100%, rgba(251,191,36,0.05), transparent 45%);
}
.pitch-card > * { position: relative; z-index: 1; }

.pitch {
  display: grid; grid-template-rows: repeat(6, auto); grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: linear-gradient(to bottom, #4caf50, #388e3c);
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 10px;
}
.pos-box {
  background: rgba(0,0,0,0.18);
  border-radius: 4px;
  padding: 3px 4px 4px;
  width: 155px;
}
.pos-box.pos-st  { grid-row: 1; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-cam { grid-row: 2; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-lm  { grid-row: 3; grid-column: 1; justify-self: end; }
.pos-box.pos-rm  { grid-row: 3; grid-column: 2; justify-self: start; }
.pos-box.pos-cdm { grid-row: 4; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-lb  { grid-row: 5; grid-column: 1; justify-self: end; }
.pos-box.pos-rb  { grid-row: 5; grid-column: 2; justify-self: start; }
.pos-box.pos-gk  { grid-row: 6; grid-column: 1 / 3; justify-self: center; }

.pos-label {
  font-size: 8px; font-weight: 700;
  color: white;
  letter-spacing: 0.4px; text-transform: uppercase;
  text-align: center; margin-bottom: 2px;
}
.pos-spacer { display: none; }
.pos-name { display: inline; }

.chip-row { display: flex; gap: 2px; }

/* ─── MatchOps planner chip: simple, clear, effective ─── */
.slot {
  padding: 4px 3px 9px;
  font-size: 12px; font-weight: 500;
  text-align: center; user-select: none;
  border-radius: 3px;
  min-height: 28px; line-height: 1.2;
  flex: 1; min-width: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  position: relative;
  cursor: grab;
  background: white;
  color: #333;
  border: 1.5px solid #ccc;
  transition: transform 0.1s, border-color 0.15s;
}
.slot[data-half="h2"] {
  background: #fff3cd;
  border-color: #ffc107;
  color: #333;
}
.chip-row.full-game .slot[data-half="h1"] {
  background: #d4edda;
  border-color: #28a745;
  color: #155724;
  font-weight: 600;
  flex: 1;
}
.chip-row.full-game .slot[data-half="h2"] { display: none; }

.slot:active { cursor: grabbing; transform: scale(0.96); }
.slot.drag-over { border-color: #2d5; background: #c8e6c9; }
.slot.tap-selected {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  z-index: 2;
}
.slot.highlighted {
  outline: 3px solid #f57c00;
  outline-offset: 2px;
  z-index: 1;
}
.slot:not(.highlighted).any-highlighted { opacity: 0.35; }

.slot.benched-both {
  background: #ffcdd2 !important;
  border-color: #c62828 !important;
  color: #b71c1c !important;
  font-weight: 700;
  box-shadow: 0 0 0 1px #c62828 inset;
}
.slot.plays-both { box-shadow: inset 0 0 0 2px #c62828; }

/* per-chip minute bar — thin, unobtrusive */
.chip-min-bar {
  position: absolute; bottom: 2px; left: 3px; right: 3px;
  height: 2px; border-radius: 1px;
  background: rgba(0,0,0,0.12);
  overflow: hidden;
  z-index: 1;
}
.chip-min-fill {
  height: 100%; border-radius: 1px;
  background: hsl(var(--chip-hue, 60), 65%, 40%);
  width: var(--chip-ratio, 0%);
}

/* Bench drawer */
.bench-drawer-toggle {
  width: 100%; padding: 11px 14px;
  background: linear-gradient(180deg, rgba(51,65,85,0.55), rgba(30,41,59,0.7));
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  border-radius: var(--r-md);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.bench-drawer-toggle:hover { color: var(--text); border-color: rgba(148,163,184,0.4); }
.bench-drawer-toggle .chev { transition: transform 0.2s; color: var(--accent); }
.bench-drawer-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
.bench-section {
  display: none; flex-direction: column; gap: 10px;
  margin-top: 8px; padding: 12px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border-radius: var(--r-md);
  border: 1px solid rgba(71,85,105,0.4);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.bench-section.open { display: flex; }
.bench-row .bench-label {
  font-size: 10px; color: var(--accent); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.bench-row .chip-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
/* Bench chips — light variants of the same palette (MatchOps planner) */
.bench-row .slot[data-half="h1"] {
  background: #e8e8e8;
  border-color: #bbb;
  color: #333;
}
.bench-row .slot[data-half="h2"] {
  background: #ffecb3;
  border-color: #d4a017;
  color: #333;
}
.bench-row .chip-min-bar { background: rgba(0,0,0,0.12); }

/* Mini minute bar (per-game strip) */
.game-min-strip {
  margin-top: 14px;
  padding: 12px 14px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border: 1px solid rgba(71,85,105,0.4);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);

.game-min-strip h4 {
  margin: 0 0 10px; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.game-min-strip .strip-row {
  display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px;
}
.game-min-strip .strip-cell {
  height: 28px; border-radius: 4px; position: relative;
  background: var(--cell-bg, rgba(30,41,59,0.85));
  color: var(--cell-fg, #e2e8f0);
  border: 1px solid rgba(0,0,0,0.22);
  cursor: pointer;
  overflow: hidden;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.15s, transform 0.1s;
}
.game-min-strip .strip-cell:hover { filter: brightness(1.08); }
.game-min-strip .strip-cell:active { transform: scale(0.96); }
.game-min-strip .strip-cell.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}
.game-min-strip .strip-cell.any-highlighted:not(.highlighted) { opacity: 0.42; }

  font-size: 10px; font-weight: 700;

/* ══════════════════ Minutes tab — quick-scan chip grid ══════════════════ */
.pt-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 720px) {
  .pt-grid { grid-template-columns: repeat(3, 1fr); }
}
.pt-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  min-height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.22);
  background: var(--pt-bg);
  color: var(--pt-fg);
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.2px;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
  transition: transform 0.1s, filter 0.15s;
}
.pt-chip:hover { filter: brightness(1.06); }
.pt-chip:active { transform: scale(0.97); }
.pt-chip .pt-name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-chip .pt-total {
  font-weight: 700; font-size: 16px;
  font-variant-numeric: tabular-nums;
  opacity: 0.92;
  flex-shrink: 0;
}
.pt-chip.prio .pt-name::after {

}
.pt-chip.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  filter: brightness(1.1);
}
.pt-chip.any-highlighted:not(.highlighted) { opacity: 0.48; }

   can clearly see the chip is no longer selected. */
.pt-chip.focused {
  box-shadow: 0 1px 2px rgba(0,0,0,0.28),

// Undo/redo history
const history = [];
let historyIndex = -1;
const HISTORY_MAX = 40;

function snapshotStateForHistory() {
  return { games: JSON.parse(JSON.stringify(state)), included: included.slice() };
}
function pushHistory() {
  history.splice(historyIndex + 1);
  history.push(snapshotStateForHistory());
  if (history.length > HISTORY_MAX) history.shift();
  historyIndex = history.length - 1;
  renderActiveTab();
}
function applyHistorySnapshot(snap) {
  state = JSON.parse(JSON.stringify(snap.games));
  included = snap.included.slice();
  saveAll();
  renderActiveTab();
}
function undo() { if (historyIndex > 0) { historyIndex--; applyHistorySnapshot(history[historyIndex]); } }
function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyHistorySnapshot(history[historyIndex]); } }
pushHistory(); // initial state

/* ══════════════════ Persistence ══════════════════ */
function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && Array.isArray(p.games) && p.games.length === 5) {
        return {
          games: p.games,
          included: Array.isArray(p.included) ? p.included.slice(0,5).concat(DEFAULT_INCLUDED.slice(p.included.length)) : DEFAULT_INCLUDED.slice(),
          currentVersionName: p.currentVersionName || null,
        };
      }
    }
  } catch (e) {}
  return { games: JSON.parse(JSON.stringify(SEED)), included: DEFAULT_INCLUDED.slice(), currentVersionName: null };
}
function saveAll() {
  const snapshot = { games: state, included, currentVersionName, savedAt: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  showSaved(); updateVersionBadge();
}
let saveStatusTimer = null;
function showSaved() {
  const el = document.getElementById('save-status');
  if (!el) return;
  const now = new Date();
  el.textContent = '✓ ' + now.toTimeString().slice(0,5);
  el.style.opacity = '1';
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(() => { el.style.opacity = '0'; }, 2400);
}

/* ══════════════════ Versions ══════════════════ */
function loadVersions() {
  try { const raw = localStorage.getItem(VERSIONS_KEY); if (raw) return JSON.parse(raw) || {}; } catch (e) {}
  return {};
}
function saveVersionsMap(m) { localStorage.setItem(VERSIONS_KEY, JSON.stringify(m)); }
function snapshotForVersion() {
  return { games: JSON.parse(JSON.stringify(state)), included: included.slice(), savedAt: new Date().toISOString() };
}
function saveVersion(name, silent) {
  const m = loadVersions();
  if (!silent && m[name] && !confirm('"' + name + '" already exists. Overwrite?')) return false;
  m[name] = snapshotForVersion();
  saveVersionsMap(m);
  return true;
}
function deleteVersion(name) {
  if (!confirm('Delete "' + name + '"?')) return;
  const m = loadVersions(); delete m[name]; saveVersionsMap(m);
  if (currentVersionName === name) { currentVersionName = null; saveAll(); }
  if (activeTab === 'plans') renderPlans();
}
function renameVersion(oldName) {
  const m = loadVersions(); if (!m[oldName]) return;
  const input = prompt('Rename "' + oldName + '" to:', oldName);
  if (input === null) return;
  const n = input.trim(); if (!n || n === oldName) return;
  if (m[n] && !confirm('"' + n + '" exists. Overwrite?')) return;
  m[n] = m[oldName]; delete m[oldName]; saveVersionsMap(m);
  if (currentVersionName === oldName) { currentVersionName = n; saveAll(); }
  if (activeTab === 'plans') renderPlans();
}
function applyVersion(name) {
  const m = loadVersions(); const v = m[name]; if (!v) return;
  if (!confirm('Load "' + name + '"? Your current state will be replaced.')) return;
  state = JSON.parse(JSON.stringify(v.games));
  included = (v.included || DEFAULT_INCLUDED).slice(0,5);
  while (included.length < 5) included.push(true);
  currentVersionName = name;
  highlightedPlayers.clear();
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Helpers ══════════════════ */
function findKeyInHalf(g, half, player, excludeKey) {
  for (const p of POSITIONS) if (p !== excludeKey && g[half][p] === player) return p;
  for (const b of BENCH_KEYS) if (b !== excludeKey && g[half][b] === player) return b;
  return null;
}
function playerMinsPerGame(player, gameIdx) {
  const g = state[gameIdx]; let secs = 0;
  for (const half of ['h1','h2']) for (const pos of POSITIONS) if (g[half][pos] === player) { secs += HALF_MIN; break; }
  return secs;
}
function playerGamePositions(player, gameIdx) {
  const g = state[gameIdx];
  const h1 = POSITIONS.find(p => g.h1[p] === player) || null;
  const h2 = POSITIONS.find(p => g.h2[p] === player) || null;
  if (!h1 && !h2) return { text: null };       // bench both halves
  if (h1 && h2 && h1 === h2) return { text: h1 }; // full at one position
  if (h1 && h2) return { text: h1 + '/' + h2 };   // plays-both: two positions
  return { text: (h1 || h2) + '\u00b7' + (h1 ? '1' : '2') }; // half only
}
function playerGKInGame(player, gameIdx) {
  const g = state[gameIdx];
  const h1 = g.h1.GK === player, h2 = g.h2.GK === player;
  if (h1 && h2) return 'full'; if (h1) return 'h1'; if (h2) return 'h2'; return null;
}
function playerTotalSec(player) {
  return [0,1,2,3,4].reduce((s,i) => s + (included[i] ? playerMinsPerGame(player,i) : 0), 0);
}
function playerTotalSecAll(player) {
  return [0,1,2,3,4].reduce((s,i) => s + playerMinsPerGame(player,i), 0);
}
function playerRatio(player) {
  const active = included.filter(Boolean).length;
  if (!active) return null;
  const expected = 12000 * active / 11;
  return playerTotalSec(player) / expected;
}
function hueForRatio(r) {
  const c = Math.max(0.4, Math.min(1.5, r));
  return Math.round((c - 0.4) / 1.1 * 150);
}
function ratioColors(r) {
  // Solid background + contrasting text for a ratio-coloured chip.
  if (r === null) return { bg: '#475569', fg: '#e2e8f0' };
  const h = hueForRatio(r); // 0 (red) → 150 (green)
  if (h < 35)     return { bg: 'hsl(' + h + ', 72%, 46%)', fg: '#fef2f2' };  // red — cream text
  if (h < 85)     return { bg: 'hsl(' + h + ', 78%, 60%)', fg: '#1a1a1a' };  // yellow — dark text
  return              { bg: 'hsl(' + h + ', 55%, 40%)', fg: '#ecfdf5' };   // green — cream text
}
function formatMin(sec) { const m = Math.floor(sec/60), s = sec%60; return m + ':' + s.toString().padStart(2,'0'); }
function benchedBothHalves(gi) {
  const g = state[gi];
  const b1 = new Set(BENCH_KEYS.map(k => g.h1[k]).filter(Boolean));
  const b2 = new Set(BENCH_KEYS.map(k => g.h2[k]).filter(Boolean));
  const f1 = new Set(POSITIONS.map(p => g.h1[p]).filter(Boolean));
  const f2 = new Set(POSITIONS.map(p => g.h2[p]).filter(Boolean));
  return [...b1].filter(p => b2.has(p) && !f1.has(p) && !f2.has(p));
}
function playerInitials(name) {
  return name.split(/[\s.]+/).filter(Boolean).map(s => s[0]).slice(0,2).join('').toUpperCase();
}
function anyHighlightActive() { return highlightedPlayers.size > 0; }
function isHighlighted(p) { return p && highlightedPlayers.has(p); }
function toggleHighlight(p) {
  if (!p) return;
  if (highlightedPlayers.has(p)) highlightedPlayers.delete(p);
  else highlightedPlayers.add(p);
}

/* ══════════════════ Swap engine (shared by drag, tap, and bottom sheet) ══════════════════ */
function performSwap(gIdx, srcHalf, srcKey, tgtHalf, tgtKey) {
  const g = state[gIdx];
  const srcPlayer = g[srcHalf][srcKey];
  const tgtPlayer = g[tgtHalf][tgtKey];
  if (!srcPlayer) return;
  if (srcHalf === tgtHalf && srcKey === tgtKey) return;

  // Same position flip (both halves of same pos, two different players)
  if (srcKey === tgtKey && srcHalf !== tgtHalf && POSITIONS.includes(srcKey) && srcPlayer && tgtPlayer && srcPlayer !== tgtPlayer) {
    const pA = srcPlayer, pB = tgtPlayer;
    for (const half of ['h1','h2']) for (const k of POSITIONS.concat(BENCH_KEYS)) {
      if (g[half][k] === pA) g[half][k] = pB; else if (g[half][k] === pB) g[half][k] = pA;
    }
  } else if (srcHalf === tgtHalf) {
    const isFieldPos = POSITIONS.includes(tgtKey);
    const targetWasMerged = isFieldPos && g.h1[tgtKey] === g.h2[tgtKey] && g.h1[tgtKey] !== '';
    g[tgtHalf][tgtKey] = srcPlayer; g[srcHalf][srcKey] = tgtPlayer;
    if (targetWasMerged && srcPlayer !== tgtPlayer) {
      const oh = tgtHalf === 'h1' ? 'h2' : 'h1';
      const srcOther = findKeyInHalf(g, oh, srcPlayer, tgtKey);
      if (srcOther) {
        const tmp = g[oh][tgtKey]; g[oh][tgtKey] = srcPlayer; g[oh][srcOther] = tmp;
      }
    }
  } else {
    // cross-half
    const srcInTgt = findKeyInHalf(g, tgtHalf, srcPlayer, null);
    if (srcInTgt) {
      const tmp = g[tgtHalf][tgtKey]; g[tgtHalf][tgtKey] = srcPlayer; g[tgtHalf][srcInTgt] = tmp;
    } else {
      g[tgtHalf][tgtKey] = srcPlayer; g[tgtHalf].bench0 = tgtPlayer;
    }
  }
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Rendering ══════════════════ */
function renderActiveTab() {
  if (activeTab === 'games') renderGamesTab();
  else if (activeTab === 'minutes') renderMinutesTab();
  else if (activeTab === 'plans') renderPlans();
  updateVersionBadge();
}

/* ─── Plan name line (under the ribbon) ─── */
function updateVersionBadge() {
  const b = document.getElementById('plan-name');
  if (!b) return;
  if (currentVersionName) {
    b.textContent = currentVersionName;
    b.classList.add('has-version');
  } else {
    b.textContent = '';
    b.classList.remove('has-version');
  }
}

/* ─── Games tab ─── */
function renderGamesTab() {
  renderRibbon();
  renderGameDetail();
}
function renderRibbon() {
  const container = document.getElementById('ribbon');
  container.innerHTML = '';
  SCHEDULE.forEach((sched, i) => {
    const btn = document.createElement('button');
    btn.className = 'ribbon-game' + (i === activeGame ? ' active' : '') + (included[i] ? '' : ' excluded');
    btn.dataset.game = i;
    const dotTitle = included[i] ? 'Counted in totals — tap to exclude' : 'Excluded from totals — tap to include';
    btn.innerHTML =
      '<span class="ribbon-include' + (included[i] ? ' on' : '') + '" data-toggle role="checkbox" aria-checked="' + included[i] + '" aria-label="' + dotTitle + '" title="' + dotTitle + '"></span>' +
      '<span class="ribbon-label">Game ' + (i+1) + '</span>' +
      '<span class="ribbon-opp">' + sched.opp + '</span>' +
      '<span class="ribbon-time">' + sched.time + (sched.field && sched.field !== 'TBD' ? ' · ' + sched.field : '') + '</span>';
    btn.addEventListener('click', (e) => {
      if (e.target.closest('[data-toggle]')) {
        e.stopPropagation();
        included[i] = !included[i];
        saveAll(); pushHistory(); renderActiveTab();
        return;
      }
      if (i === activeGame) return;
      const direction = i > activeGame ? 'next' : 'prev';
      activeGame = i; renderGamesTab();
      animateGameSwitch(direction);
    });
    container.appendChild(btn);
  });
  // scroll active into view (instant — the slide animation is the main motion)
  const activeEl = container.querySelector('.ribbon-game.active');
  if (activeEl && activeEl.scrollIntoView) activeEl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
}

function chipHtml(gameIdx, half, key, player, extraClass) {
  const hl = isHighlighted(player) ? 'highlighted' : '';
  const dim = anyHighlightActive() && player && !isHighlighted(player) ? 'any-highlighted' : '';
  const tap = tapSelected && tapSelected.game === gameIdx && tapSelected.half === half && tapSelected.key === key ? 'tap-selected' : '';
  const cls = ['slot', hl, dim, tap, extraClass || ''].filter(Boolean).join(' ');
  // per-chip minute bar
  let barHtml = '';
  if (player) {
    const r = playerRatio(player);
    const hue = r !== null ? hueForRatio(r) : 60;
    const pct = r !== null ? Math.min(100, Math.max(0, r * 80)) : 0; // display up to 100% when r=1.25
    barHtml = '<div class="chip-min-bar"><div class="chip-min-fill" style="--chip-hue:' + hue + ';--chip-ratio:' + pct + '%"></div></div>';
  }
  return '<div class="' + cls + '" data-game="' + gameIdx + '" data-half="' + half + '" data-key="' + key + '" draggable="true">' +
    '<span>' + (player || '') + '</span>' + barHtml + '</div>';
}

function renderGameDetail() {
  const gIdx = activeGame;
  const g = state[gIdx];
  const sched = SCHEDULE[gIdx];
  const view = document.getElementById('game-detail');
  const benchedBoth = new Set(benchedBothHalves(gIdx));
  const onFieldH1 = new Set(POSITIONS.map(p => g.h1[p]).filter(Boolean));
  const onFieldH2 = new Set(POSITIONS.map(p => g.h2[p]).filter(Boolean));
  const benchOpen = benchOpenFor === gIdx;

  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  let html = '';

  // Pitch card (undo/redo now appear AFTER this block)
  html += '<div class="pitch-card">';
  html +=   '<div class="pitch">';
  html += POSITIONS.map(p => {
    const h1 = g.h1[p] || '', h2 = g.h2[p] || '';
    const full = h1 && h1 === h2;
    const h1PlaysBoth = !full && h1 && onFieldH2.has(h1) ? 'plays-both' : '';
    const h2PlaysBoth = !full && h2 && onFieldH1.has(h2) ? 'plays-both' : '';
    return '<div class="pos-box pos-' + p.toLowerCase() + '">' +
      '<div class="pos-label"><span class="pos-spacer"></span><span class="pos-name">' + p + '</span><span class="pos-spacer"></span></div>' +
      '<div class="chip-row' + (full ? ' full-game' : '') + '">' +
        chipHtml(gIdx, 'h1', p, h1, h1PlaysBoth) +
        chipHtml(gIdx, 'h2', p, h2, h2PlaysBoth) +
      '</div>' +
    '</div>';
  }).join('');
  html +=   '</div>';

  // Bench drawer toggle
  const benchCount = BENCH_KEYS.filter(k => g.h1[k] || g.h2[k]).length * 2;
  html +=   '<button class="bench-drawer-toggle" id="bench-toggle" aria-expanded="' + benchOpen + '">' +
              '<span>Bench (' + benchCount + ' slots)</span><span class="chev">▼</span>' +
            '</button>';
  html +=   '<div class="bench-section' + (benchOpen ? ' open' : '') + '" id="bench-section">';
  html +=     '<div class="bench-row"><div class="bench-label">Bench H1</div><div class="chip-row">' +
                BENCH_KEYS.map(k => {
                  const pl = g.h1[k] || '';
                  return chipHtml(gIdx, 'h1', k, pl, benchedBoth.has(pl) ? 'benched-both' : '');
                }).join('') +
              '</div></div>';
  html +=     '<div class="bench-row"><div class="bench-label">Bench H2</div><div class="chip-row">' +
                BENCH_KEYS.map(k => {
                  const pl = g.h2[k] || '';
                  return chipHtml(gIdx, 'h2', k, pl, benchedBoth.has(pl) ? 'benched-both' : '');
                }).join('') +
              '</div></div>';
  html +=   '</div>';

  // Tournament-totals strip (replaces the old per-game strip).
  // Shows every player as a ratio-coloured cell — red under, yellow near,
  // green over — sorted ascending by tournament minutes.
  html +=   '<div class="game-min-strip totals">';
  html +=     '<h4>Tournament totals</h4>';
  html +=     '<div class="strip-row">';
  const sortedForStrip = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });
  const anyHi = anyHighlightActive();
  html += sortedForStrip.map(pl => {
    const totMin = Math.round(playerTotalSec(pl) / 60);
    const r = playerRatio(pl);
    const c = ratioColors(r);
    const hl = isHighlighted(pl);
    const dim = anyHi && !hl;
    const cls = 'strip-cell' + (hl ? ' highlighted' : '') + (dim ? ' any-highlighted' : '');
    return '<button class="' + cls + '" ' +
      'data-player="' + pl.replace(/"/g, '&quot;') + '" ' +
      'style="--cell-bg:' + c.bg + ';--cell-fg:' + c.fg + '" ' +
      'title="' + pl + ' — ' + totMin + "'" + '">' +
      '<span class="strip-init">' + playerInitials(pl) + '</span>' +
    '</button>';
  }).join('');
  html +=     '</div>';
  html +=   '</div>';

  html += '</div>';

  // Undo / Redo — placed AFTER the game field, MatchOps-style SVG icons
  html += '<div class="game-toolbar after-pitch">';
  html +=   '<button class="icon-btn" id="btn-undo" ' + (canUndo ? '' : 'disabled') + ' title="Undo" aria-label="Undo">' +
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
                '<path d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"/>' +
              '</svg>' +
            '</button>';
  html +=   '<button class="icon-btn" id="btn-redo" ' + (canRedo ? '' : 'disabled') + ' title="Redo" aria-label="Redo">' +
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
                '<path d="m15 15 6-6m0 0-6-6m6 6H9a6 6 0 0 0 0 12h3"/>' +
              '</svg>' +
            '</button>';
  html += '</div>';

  view.innerHTML = html;

  // Handlers
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('bench-toggle').addEventListener('click', () => {
    benchOpenFor = benchOpen ? null : gIdx;
    renderGameDetail();
  });
  // Strip cells → highlight / open per-player sheet
  view.querySelectorAll('.game-min-strip .strip-cell').forEach(cell => {
    const p = cell.dataset.player;
    if (!p) return;
    cell.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleHighlight(p);
      renderActiveTab();
    });
  });

  // Chip handlers
  view.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('dragstart', onDragStart);
    slot.addEventListener('dragover', onDragOver);
    slot.addEventListener('dragleave', onDragLeave);
    slot.addEventListener('drop', onDrop);
    slot.addEventListener('dragend', onDragEnd);
    slot.addEventListener('click', onChipClick);
    slot.addEventListener('contextmenu', (e) => { e.preventDefault(); openChipSheet(slot); });
    // long-press for touch
    let t = null;
    slot.addEventListener('touchstart', () => { t = setTimeout(() => openChipSheet(slot), 500); });
    slot.addEventListener('touchend',   () => { if (t) { clearTimeout(t); t = null; } });
    slot.addEventListener('touchmove',  () => { if (t) { clearTimeout(t); t = null; } });
  });
}

/* ─── Minutes tab — quick-scan chip grid + multi-player focus stack ─── */
function renderMinutesTab() {
  const total = PLAYERS.length;
  const activeGames = included.filter(Boolean).length;
  document.getElementById('minutes-count').textContent = total + ' players · ' + activeGames + '/5 games counted';

  const list = document.getElementById('minutes-cards');
  list.className = 'pt-grid';
  const sorted = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });

  // Which players to show in the focus stack:
  //  - any currently highlighted players (comparison mode), OR
  //  - worst-off player as the default when nothing is selected.
  const highlighted = [...highlightedPlayers]
    .filter(p => PLAYERS.includes(p))
    .sort((a, b) => {
      const d = playerTotalSec(a) - playerTotalSec(b);
      if (d !== 0) return d;
      return a.localeCompare(b);
    });
  const focusPlayers = highlighted.length > 0 ? highlighted : [sorted[0]];
  const focusSet = new Set(focusPlayers);

  const anyHi = anyHighlightActive();
  list.innerHTML = sorted.map(p => {
    const totMin = Math.round(playerTotalSec(p) / 60);
    const r = playerRatio(p);
    const c = ratioColors(r);
    const isPrio = PRIORITY.has(p);
    const hl = isHighlighted(p);
    const dim = anyHi && !hl;
    const isFocused = focusSet.has(p);
    const cls = 'pt-chip' +
      (isPrio ? ' prio' : '') +
      (hl ? ' highlighted' : '') +
      (dim && !isFocused ? ' any-highlighted' : '') +
      (isFocused && !hl ? ' focused' : ''); // only decorate focus when not already highlighted
    return '<button class="' + cls + '" ' +
      'data-player="' + p.replace(/"/g, '&quot;') + '" ' +
      'style="--pt-bg:' + c.bg + ';--pt-fg:' + c.fg + '">' +
      '<span class="pt-name">' + p + '</span>' +
      '<span class="pt-total">' + totMin + "'" + '</span>' +
    '</button>';
  }).join('');

  list.querySelectorAll('.pt-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const p = chip.dataset.player;
      toggleHighlight(p);
      renderMinutesTab();
    });
  });

  renderMinutesFocus(focusPlayers, activeGames, highlighted.length > 0);
}

function renderFocusCard(focused, activeGames) {
  const totalSec = playerTotalSec(focused);
  const totalMin = Math.round(totalSec / 60);
  const r = playerRatio(focused);
  const pct = r !== null ? Math.round(r * 100) : 0;
  const barW = r !== null ? Math.min(100, Math.max(0, Math.round(r * 80))) : 0;
  const c = ratioColors(r);
  const isPrio = PRIORITY.has(focused);
  const expected = activeGames ? (12000 * activeGames / 11) : 0;
  const deltaMin = expected ? Math.round((totalSec - expected) / 60) : 0;
  const deltaStr = expected
    ? (deltaMin === 0 ? 'on fair share' : (deltaMin > 0 ? '+' + deltaMin + " min vs average" : deltaMin + " min vs average"))
    : 'no games counted';

  const gamesHtml = [0, 1, 2, 3, 4].map(i => {
    const sec = playerMinsPerGame(focused, i);
    const posInfo = playerGamePositions(focused, i);
    let cls = 'focus-game';
    if (!included[i]) cls += ' excluded';
    if (sec === 1500) cls += ' full';
    else if (sec === 750) cls += ' half';
    else cls += ' zero';
    const mins = Math.round(sec / 60);
    const posText = posInfo.text || '\u2014';
    return '<div class="' + cls + '">' +
      '<span class="fg-label">G' + (i + 1) + '</span>' +
      '<span class="fg-pos">' + posText + '</span>' +
      '<span class="fg-mins">' + mins + "'" + '</span>' +
    '</div>';
  }).join('');

  return '<div class="focus-card" data-player="' + focused.replace(/"/g, '&quot;') + '">' +
    '<div class="focus-head">' +
      '<div class="focus-name">' + focused + (isPrio ? ' <span class="focus-star">★</span>' : '') + '</div>' +
      '<div class="focus-total">' + totalMin + "'" + '</div>' +
    '</div>' +
    '<div class="focus-bar">' +
      '<div class="focus-bar-track"><div class="focus-bar-fill" style="--bar-bg:' + c.bg + ';--bar-w:' + barW + '%"></div></div>' +
      '<div class="focus-bar-label">' + (r !== null ? pct + '% of fair share · ' + deltaStr : 'no games counted') + '</div>' +
    '</div>' +
    '<div class="focus-games">' + gamesHtml + '</div>' +
  '</div>';
}

function renderMinutesFocus(players, activeGames, hasSelection) {
  const pane = document.getElementById('minutes-focus');
  if (!pane) return;
  const cardsHtml = players.map(p => renderFocusCard(p, activeGames)).join('');
  const footerHtml = hasSelection
    ? '<div class="focus-actions"><button class="btn" id="focus-jump">View on pitch</button></div>'
    : '';
  pane.innerHTML = cardsHtml + footerHtml;

  const jump = document.getElementById('focus-jump');
  if (jump) jump.addEventListener('click', () => setTab('games'));
}

/* ─── Plans tab ─── */
function renderPlans() {
  const view = document.getElementById('plans-view');
  const map = loadVersions();
  const names = Object.keys(map).sort((a,b) => new Date(map[b].savedAt) - new Date(map[a].savedAt));
  let html = '';

  // Current plan
  html += '<div class="plans-section">';
  html +=   '<h4>Current plan</h4>';
  if (currentVersionName) {
    html +=  '<div class="current-plan-row">' +
               '<span class="icon">📂</span>' +
               '<div class="meta"><div class="name">' + currentVersionName + '</div>' +
                 '<div class="ts">Working copy — unsaved edits are in the auto-save slot</div></div>' +
             '</div>';
    html +=  '<button class="btn primary" id="plan-save-changes">Save changes to "' + currentVersionName + '"</button>';
    html +=  '<button class="btn" id="plan-save-as">Save as new version…</button>';
  } else {
    html +=  '<div class="current-plan-row">' +
               '<span class="icon">✏️</span>' +
               '<div class="meta"><div class="name">Unsaved working copy</div>' +
                 '<div class="ts">Auto-saves locally in your browser</div></div>' +
             '</div>';
    html +=  '<button class="btn primary" id="plan-save-as">Save as new version…</button>';
  }
  html += '</div>';

  // Versions list
  html += '<div class="plans-section">';
  html +=   '<h4>Saved versions (' + names.length + ')</h4>';
  if (names.length === 0) {
    html += '<div class="version-empty">No saved versions yet.</div>';
  } else {
    html += '<div class="version-list">';
    names.forEach(n => {
      const v = map[n];
      const d = new Date(v.savedAt);
      const ts = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      const isCurrent = currentVersionName === n;
      html += '<div class="version-row ' + (isCurrent ? 'current' : '') + '" data-name="' + encodeURIComponent(n) + '">' +
        '<span class="vname" title="' + n.replace(/"/g,'&quot;') + '">' + (isCurrent ? '📂 ' : '') + n + '</span>' +
        '<span class="vtime">' + ts + '</span>' +
        '<button class="vbtn" data-action="load" title="Load">↵</button>' +
        '<button class="vbtn" data-action="rename" title="Rename">✎</button>' +
        '<button class="vbtn delete" data-action="delete" title="Delete">✕</button>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Backup
  html += '<div class="plans-section">';
  html +=   '<h4>Backup</h4>';
  html +=   '<div class="btn-row">' +
              '<button class="btn" id="plan-export">Export .json</button>' +
              '<button class="btn" id="plan-import">Import .json</button>' +
            '</div>';
  html +=   '<button class="btn" id="plan-share">Copy share URL</button>';
  html += '</div>';

  // Danger
  html += '<div class="plans-section danger">';
  html +=   '<h4>Danger zone</h4>';
  html +=   '<button class="btn danger" id="plan-reset">Reset to original plan</button>';
  html += '</div>';

  view.innerHTML = html;

  // Handlers
  const bSaveChanges = document.getElementById('plan-save-changes');
  if (bSaveChanges) bSaveChanges.addEventListener('click', () => {
    saveVersion(currentVersionName, true); renderPlans();
  });
  document.getElementById('plan-save-as').addEventListener('click', () => {
    const suggested = currentVersionName ? (currentVersionName + ' (copy)') : 'Plan ' + new Date().toLocaleString();
    const input = prompt('Save as:', suggested);
    if (!input) return;
    const n = input.trim(); if (!n) return;
    if (saveVersion(n)) { currentVersionName = n; saveAll(); renderPlans(); }
  });
  view.querySelectorAll('.version-row').forEach(row => {
    const name = decodeURIComponent(row.dataset.name);
    row.querySelector('[data-action="load"]').addEventListener('click', (e) => { e.stopPropagation(); applyVersion(name); });
    row.querySelector('[data-action="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameVersion(name); });
    row.querySelector('[data-action="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteVersion(name); });
    // Tap the name area → load
    row.querySelector('.vname').addEventListener('click', () => applyVersion(name));
  });
  document.getElementById('plan-export').addEventListener('click', exportJson);
  document.getElementById('plan-import').addEventListener('click', () => document.getElementById('import-file').click());
  document.getElementById('plan-share').addEventListener('click', shareUrl);
  document.getElementById('plan-reset').addEventListener('click', resetPlan);
}

function safeFilenamePart(s) {
  return (s || '')
    .replace(/[\/\\?%*:|"<>]/g, '-')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 60);
}
function exportJson() {
  const snapshot = {
    formatVersion: 2,
    savedAt: new Date().toISOString(),
    games: state, included, currentVersionName,
    versions: loadVersions(),
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const verPart = currentVersionName ? safeFilenamePart(currentVersionName) + '_' : '';
  a.href = url;
  a.download = 'matchops-planner_' + verPart + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.games || data.games.length !== 5) { alert('Invalid file.'); return; }
      const hasVer = data.versions && Object.keys(data.versions).length > 0;
      const n = hasVer ? Object.keys(data.versions).length : 0;
      if (!confirm('Replace current plan' + (hasVer ? (' AND import ' + n + ' version(s)?') : '?'))) return;
      state = data.games;
      included = (data.included || DEFAULT_INCLUDED).slice(0,5);
      while (included.length < 5) included.push(true);
      currentVersionName = data.currentVersionName || null;
      if (hasVer) {
        const merged = Object.assign({}, loadVersions(), data.versions);
        saveVersionsMap(merged);
      }
      saveAll(); pushHistory(); renderActiveTab();
    } catch (err) { alert('Parse error: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
});
async function shareUrl() {
  const snapshot = { games: state, included };
  try {
    const str = JSON.stringify(snapshot);
    // URL-safe base64
    const b64 = btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const url = location.origin + location.pathname + '#plan=' + b64;
    if (navigator.clipboard) await navigator.clipboard.writeText(url);
    alert('Share URL copied to clipboard (length ' + url.length + ' chars). Paste it into a message; opening that URL will offer to import the plan.');
  } catch (e) { alert('Could not create share URL: ' + e.message); }
}
function resetPlan() {
  if (!confirm('Reset all games to the original plan? This clears saved state (versions kept).')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  location.reload();
}

/* Try importing from URL hash on load */
(function tryImportFromHash() {
  const m = location.hash.match(/#plan=([A-Za-z0-9_\-]+)/);
  if (!m) return;
  try {
    const b64 = m[1].replace(/-/g,'+').replace(/_/g,'/') + '='.repeat((4 - m[1].length % 4) % 4);
    const str = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(str);
    if (!data.games || data.games.length !== 5) return;
    if (confirm('A shared plan is in the URL. Load it?')) {
      state = data.games;
      included = (data.included || DEFAULT_INCLUDED).slice(0,5);
      while (included.length < 5) included.push(true);
      currentVersionName = null;
      saveAll(); pushHistory();
    }
    if (window.history && window.history.replaceState) window.history.replaceState(null, '', location.pathname);
  } catch (e) {}
})();

/* ══════════════════ Drag & tap handlers ══════════════════ */
let dragSource = null;
function onDragStart(e) {
  const s = e.currentTarget;
  dragSource = { game: s.dataset.game, half: s.dataset.half, key: s.dataset.key };
  e.dataTransfer.effectAllowed = 'move';
  s.style.opacity = '0.4';
}
function onDragOver(e) {
  if (!dragSource) return;
  const s = e.currentTarget;
  if (s.dataset.game !== dragSource.game) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  s.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const t = e.currentTarget; t.classList.remove('drag-over');
  if (!dragSource) return;
  if (t.dataset.game !== dragSource.game) return;
  if (t.dataset.half === dragSource.half && t.dataset.key === dragSource.key) return;
  performSwap(parseInt(dragSource.game,10), dragSource.half, dragSource.key, t.dataset.half, t.dataset.key);
}
function onDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
  dragSource = null;
}
function onChipClick(e) {
  const s = e.currentTarget;
  const gIdx = parseInt(s.dataset.game, 10);
  const half = s.dataset.half, key = s.dataset.key;
  const player = state[gIdx][half][key];
  if (!player) return;

  if (!tapSelected) { tapSelected = { game: gIdx, half, key }; renderGameDetail(); return; }
  if (tapSelected.game === gIdx && tapSelected.half === half && tapSelected.key === key) { tapSelected = null; renderGameDetail(); return; }
  if (tapSelected.game !== gIdx) { tapSelected = { game: gIdx, half, key }; renderGameDetail(); return; }

  const src = tapSelected; tapSelected = null;
  performSwap(gIdx, src.half, src.key, half, key);
}

/* ══════════════════ Bottom sheet ══════════════════ */
function openSheet(title, sub, actions) {
  document.getElementById('sheet-title').textContent = title;
  document.getElementById('sheet-sub').textContent = sub || '';
  const actionsBox = document.getElementById('sheet-actions');
  actionsBox.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn' + (a.variant ? ' ' + a.variant : '');
    b.textContent = a.label;
    b.addEventListener('click', () => { closeSheet(); setTimeout(a.onClick, 160); });
    actionsBox.appendChild(b);
  });
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);

function openChipSheet(slot) {
  const gIdx = parseInt(slot.dataset.game, 10);
  const half = slot.dataset.half, key = slot.dataset.key;
  const g = state[gIdx];
  const player = g[half][key];
  if (!player) return;
  const isFieldPos = POSITIONS.includes(key);
  const actions = [];
  actions.push({
    label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
    onClick: () => { toggleHighlight(player); renderActiveTab(); }
  });
  if (isFieldPos) {
    const h1p = g.h1[key], h2p = g.h2[key];
    if (h1p && h2p && h1p !== h2p) {
      actions.push({ label: 'Keep ' + h1p + ' for full game', variant: 'primary', onClick: () => mergeH(gIdx, key, 'h1') });
      actions.push({ label: 'Keep ' + h2p + ' for full game', variant: 'primary', onClick: () => mergeH(gIdx, key, 'h2') });
    } else if (h1p && h1p === h2p) {
      actions.push({ label: 'Split into starter + sub', variant: 'primary', onClick: () => splitMerged(gIdx, key) });
    }
  }
  const sub = 'Position: ' + key + ' · ' + (half === 'h1' ? '1st half' : '2nd half');
  openSheet(player, sub, actions);
}
function openPlayerSheet(player) {
  const total = playerTotalSec(player);
  const r = playerRatio(player);
  const pct = r !== null ? Math.round(r*100) + '% of fair share' : '';
  const actions = [
    { label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
      onClick: () => { toggleHighlight(player); renderActiveTab(); } },
    { label: 'Jump to Games tab', onClick: () => setTab('games') },
  ];
  openSheet(player, formatMin(total) + ' total · ' + pct, actions);
}
function mergeH(gIdx, pos, keepHalf) {
  const g = state[gIdx];
  const keeper = g[keepHalf][pos];
  const displaced = g[keepHalf === 'h1' ? 'h2' : 'h1'][pos];
  if (!keeper || displaced === keeper) return;
  const otherHalf = keepHalf === 'h1' ? 'h2' : 'h1';
  const target = findKeyInHalf(g, otherHalf, keeper, pos);
  if (target) {
    const tmp = g[otherHalf][pos]; g[otherHalf][pos] = keeper; g[otherHalf][target] = tmp;
  } else {
    g[otherHalf][pos] = keeper; g[otherHalf].bench0 = displaced;
  }
  saveAll(); pushHistory(); renderActiveTab();
}
function splitMerged(gIdx, pos) {
  const g = state[gIdx];
  const tmp = g.h2[pos]; g.h2[pos] = g.h2.bench0; g.h2.bench0 = tmp;
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Tab navigation ══════════════════ */
function setTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector('.nav-item[data-tab="' + name + '"]').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderActiveTab();
}
document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => setTab(n.dataset.tab)));
document.getElementById('plan-name').addEventListener('click', () => setTab('plans'));

/* ══════════════════ PWA install prompt ══════════════════ */
(function installPrompt() {
  const INSTALL_DISMISSED_KEY = 'matchops-planner-install-dismissed';
  let deferred = null;

  function isIos() {
    const ua = navigator.userAgent || '';
    return /iPad|iPhone|iPod/.test(ua) || (ua.includes('Mac') && 'ontouchend' in document);
  }
  function isStandalone() {
    return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
      || navigator.standalone === true;
  }
  function dismissed() {
    return localStorage.getItem(INSTALL_DISMISSED_KEY) === '1';
  }
  function show(text, actionLabel, onAction) {
    const banner = document.getElementById('install-banner');
    if (!banner) return;
    banner.querySelector('.install-text').textContent = text;
    const btn = banner.querySelector('.install-action');
    btn.textContent = actionLabel;
    btn.onclick = onAction;
    banner.hidden = false;
  }
  function hide() {
    const banner = document.getElementById('install-banner');
    if (banner) banner.hidden = true;
  }

  document.getElementById('install-dismiss').addEventListener('click', () => {
    localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
    hide();
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    if (isStandalone() || dismissed()) return;
    show('Install this planner as an app', 'Install', async () => {
      if (!deferred) return;
      deferred.prompt();
      try { await deferred.userChoice; } catch (_) {}
      deferred = null;
      hide();
    });
  });
  window.addEventListener('appinstalled', () => {
    deferred = null;
    hide();
  });

  // iOS fallback: no beforeinstallprompt exists; show a one-shot hint
  window.addEventListener('load', () => {
    if (isStandalone() || dismissed() || !isIos()) return;
    show('Add to Home Screen: Share \u2192 Add to Home Screen', 'Got it', () => {
      localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
      hide();
    });
  });
})();

/* ══════════════════ Game carousel — slide animation + swipe ══════════════════ */
function animateGameSwitch(direction) {
  // direction: 'next' → content slides in from the right;
  //            'prev' → content slides in from the left
  const el = document.getElementById('game-detail');
  if (!el) return;
  el.classList.remove('slide-from-right', 'slide-from-left');
  // force reflow so re-adding the same class restarts the animation
  void el.offsetWidth;
  el.classList.add(direction === 'next' ? 'slide-from-right' : 'slide-from-left');
}

(function attachSwipeCarousel() {
  const host = document.getElementById('game-detail');
  if (!host) return;
  let startX = 0, startY = 0, startT = 0, tracking = false;
  host.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    tracking = true;
  }, { passive: true });
  host.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4 && dt < 700) {
      if (dx < 0 && activeGame < SCHEDULE.length - 1) {
        activeGame++; renderGamesTab(); animateGameSwitch('next');
      } else if (dx > 0 && activeGame > 0) {
        activeGame--; renderGamesTab(); animateGameSwitch('prev');
      }
    }
  }, { passive: true });
})();

/* ══════════════════ Service worker ══════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      const update = () => reg.update().catch(() => {});
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') update(); });
      window.addEventListener('focus', update);
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        if (!w) return;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) w.postMessage({ type: 'SKIP_WAITING' });
        });
      });
    }).catch(() => {});
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => { if (!reloaded) { reloaded = true; location.reload(); } });
  });
}

renderActiveTab();
