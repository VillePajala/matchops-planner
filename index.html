<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MatchOps Planner</title>
<meta name="description" content="Tournament lineup and substitution planner.">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════ Design tokens (MatchOps family) ══════════════════ */
:root {
  --bg-base: #0f172a;
  --bg-panel: #1e293b;
  --bg-panel-soft: rgba(30,41,59,0.92);
  --bg-panel-strong: rgba(30,41,59,0.98);
  --bg-elev: rgba(51,65,85,0.7);
  --border-soft: rgba(71,85,105,0.4);
  --border: rgba(71,85,105,0.6);
  --border-strong: rgba(100,116,139,0.8);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-mute: #64748b;
  --heading: #facc15;      /* yellow-400 */
  --accent: #fbbf24;       /* amber-400 */
  --accent-strong: #f59e0b;/* amber-500 */
  --accent-deep: #d97706;  /* amber-600 */
  --primary-text-on-amber: #1e293b;
  --success: #22c55e;
  --warn: #fb923c;
  --danger: #ef4444;
  --info: #38bdf8;
  --info-strong: #0ea5e9;
  --glow-sky: rgba(56,189,248,0.08);
  --glow-indigo: rgba(99,102,241,0.08);
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-pill: 999px;
  --app-bar-h: 56px;
  --bottom-nav-h: 66px;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  background: var(--bg-base);
}
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  color: var(--text);
  background:
    radial-gradient(at 20% 10%, var(--glow-sky), transparent 55%),
    radial-gradient(at 85% 95%, var(--glow-indigo), transparent 55%),
    var(--bg-base);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font-family: inherit; }
button { border: none; background: none; color: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.7); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.8); }

/* ══════════════════ App shell ══════════════════ */
.app-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(var(--app-bar-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.03);
  z-index: 50;
}
.app-bar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to bottom, var(--glow-sky), transparent 50%);
}
.app-bar > * { position: relative; z-index: 1; }

.app-logo {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: var(--r-md);
  background: linear-gradient(to bottom, var(--accent), var(--accent-deep));
  color: var(--primary-text-on-amber);
  font-weight: 700; font-size: 16px; letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(251,191,36,0.35);
}
.app-title {
  flex: 1;
  font-size: 18px; font-weight: 700; color: var(--accent);
  letter-spacing: 0.3px;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.version-badge {
  display: none; /* shows when currentVersionName is set */
  align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--r-pill);
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.45);
  color: #7dd3fc;
  font-size: 11px; font-weight: 700;
  max-width: 160px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.version-badge.has-version { display: inline-flex; }
.save-status {
  font-size: 10px; color: var(--success); font-weight: 600;
  transition: opacity 0.3s;
}

.content {
  padding-top: calc(var(--app-bar-h) + env(safe-area-inset-top) + 12px);
  padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom) + 12px);
  padding-left: max(12px, env(safe-area-inset-left));
  padding-right: max(12px, env(safe-area-inset-right));
  min-height: 100vh; min-height: 100dvh;
}
.tab-panel { display: none; animation: fadeSlideIn 0.22s ease-out; }
.tab-panel.active { display: block; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: max(6px, env(safe-area-inset-left));
  padding-right: max(6px, env(safe-area-inset-right));
  display: flex; align-items: stretch;
  background: linear-gradient(to top, rgba(15,23,42,0.98), rgba(30,41,59,0.95));
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.3);
}
.bottom-nav::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: rgba(99,102,241,0.06);
  mix-blend-mode: soft-light;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 6px 4px;
  color: var(--text-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color 0.15s, transform 0.15s;
  position: relative;
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
  content: ''; position: absolute; top: 0; left: 22%; right: 22%;
  height: 3px; border-radius: 0 0 3px 3px;
  background: linear-gradient(to right, var(--accent-strong), var(--accent));
  box-shadow: 0 0 10px var(--accent);
}
.nav-item:active { transform: scale(0.94); }

/* ══════════════════ Games tab ══════════════════ */
.ribbon {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 2px 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  margin: 0 -6px 12px;
  padding-left: 6px; padding-right: 6px;
}
.ribbon-game {
  flex: 0 0 auto; scroll-snap-align: start;
  padding: 10px 14px; border-radius: var(--r-md);
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  color: var(--text-dim);
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  min-width: 128px;
  transition: all 0.15s ease;
}
.ribbon-game .ribbon-label {
  font-size: 10px; font-weight: 700; color: var(--text-mute);
  letter-spacing: 0.6px; text-transform: uppercase;
}
.ribbon-game .ribbon-opp {
  font-size: 14px; font-weight: 600; color: var(--text);
}
.ribbon-game .ribbon-time {
  font-size: 10px; color: var(--text-mute); font-variant-numeric: tabular-nums;
}
.ribbon-game.active {
  background: linear-gradient(to bottom, rgba(251,191,36,0.2), rgba(217,119,6,0.15));
  border-color: var(--accent);
  color: var(--text);
  box-shadow: 0 2px 12px rgba(251,191,36,0.2);
}
.ribbon-game.active .ribbon-label,
.ribbon-game.active .ribbon-opp { color: var(--accent); }
.ribbon-game.excluded { opacity: 0.45; }
.ribbon-game:active { transform: scale(0.97); }

/* Game toolbar (history + include toggle) */
.game-toolbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 10px;
}
.game-toolbar .toolbar-left {
  display: flex; align-items: center; gap: 8px; flex: 1;
  min-width: 0;
}
.game-toolbar .toolbar-meta {
  font-size: 11px; color: var(--text-dim);
  font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
}
.include-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: var(--r-pill);
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.3px;
}
.include-toggle input { accent-color: var(--success); width: 13px; height: 13px; }
.include-toggle.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.5); color: var(--success); }
.icon-btn {
  width: 34px; height: 34px; border-radius: var(--r-md);
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  color: var(--text-dim); font-size: 16px;
  transition: all 0.15s;
}
.icon-btn:not(:disabled):hover { background: rgba(71,85,105,0.9); color: var(--text); }
.icon-btn:not(:disabled):active { transform: scale(0.94); }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Pitch card */
.pitch-card {
  background: linear-gradient(to bottom, var(--bg-panel-strong), rgba(15,23,42,0.96));
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 12px;
  box-shadow: var(--shadow-md);
  position: relative;
  margin-bottom: 12px;
}
.pitch-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-lg);
  background: linear-gradient(to bottom, var(--glow-sky), transparent 45%);
}
.pitch-card > * { position: relative; z-index: 1; }

.pitch {
  display: grid; grid-template-rows: repeat(6, auto); grid-template-columns: 1fr 1fr;
  gap: 8px;
  background:
    radial-gradient(at 50% 50%, rgba(255,255,255,0.05), transparent 60%),
    linear-gradient(to bottom, #166534, #14532d);
  padding: 12px 10px;
  border-radius: var(--r-md);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
  position: relative;
  margin-bottom: 10px;
}
.pitch::before {
  /* center line */
  content: ''; position: absolute; left: 10px; right: 10px; top: 50%;
  border-top: 1px dashed rgba(255,255,255,0.18);
  pointer-events: none;
}
.pitch::after {
  /* center circle */
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px dashed rgba(255,255,255,0.18);
  pointer-events: none;
}
.pos-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 4px 5px 5px;
  width: 156px;
  position: relative; z-index: 1;
}
.pos-box.pos-st  { grid-row: 1; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-cam { grid-row: 2; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-lm  { grid-row: 3; grid-column: 1; justify-self: end; }
.pos-box.pos-rm  { grid-row: 3; grid-column: 2; justify-self: start; }
.pos-box.pos-cdm { grid-row: 4; grid-column: 1 / 3; justify-self: center; }
.pos-box.pos-lb  { grid-row: 5; grid-column: 1; justify-self: end; }
.pos-box.pos-rb  { grid-row: 5; grid-column: 2; justify-self: start; }
.pos-box.pos-gk  { grid-row: 6; grid-column: 1 / 3; justify-self: center; }

.pos-label {
  display: flex; align-items: center; gap: 3px;
  font-size: 9px; color: var(--accent); font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px;
}
.pos-spacer { flex: 0 0 20px; }
.pos-name { flex: 1; text-align: center; }

.chip-row { display: flex; gap: 3px; }
.slot {
  padding: 6px 4px 9px;
  font-size: 13px; font-weight: 600;
  text-align: center; user-select: none;
  border-radius: 5px;
  min-height: 34px; line-height: 1.2;
  flex: 1; min-width: 0;
  background: #f1f5f9; color: var(--primary-text-on-amber);
  border: 1.5px solid #cbd5e1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  position: relative;
  cursor: grab;
  transition: transform 0.1s ease, box-shadow 0.15s ease;
}
.slot:active { cursor: grabbing; transform: scale(0.97); }
.slot.drag-over { border-color: var(--success) !important; box-shadow: 0 0 0 3px rgba(34,197,94,0.4); }
.slot.tap-selected {
  outline: 3px solid var(--accent-strong); outline-offset: 2px;
  box-shadow: 0 0 14px rgba(245,158,11,0.6);
  z-index: 2;
}
.slot.highlighted { outline: 3px solid #f97316; outline-offset: 2px; z-index: 1; }
.slot:not(.highlighted).any-highlighted { opacity: 0.3; }

.slot[data-half="h2"] { background: #fde68a; color: #78350f; border-color: #f59e0b; }
.chip-row.full-game .slot[data-half="h1"] {
  background: linear-gradient(to bottom, #86efac, #4ade80);
  color: #14532d; border-color: #22c55e; flex: 1; font-weight: 700;
}
.chip-row.full-game .slot[data-half="h2"] { display: none; }

.slot.benched-both {
  background: rgba(239,68,68,0.4) !important;
  border-color: var(--danger) !important;
  color: #fecaca !important;
  font-weight: 700;
}
.slot.plays-both { box-shadow: inset 0 0 0 2px var(--danger); }

/* per-chip minute bar */
.chip-min-bar {
  position: absolute; bottom: 1px; left: 3px; right: 3px;
  height: 3px; border-radius: 2px;
  background: rgba(0,0,0,0.25);
  overflow: hidden;
}
.chip-min-fill {
  height: 100%; border-radius: 2px;
  background: hsl(var(--chip-hue, 60), 75%, 45%);
  width: var(--chip-ratio, 0%);
}

/* Bench drawer */
.bench-drawer-toggle {
  width: 100%; padding: 10px 12px;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  color: var(--text-dim);
  border-radius: var(--r-md);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
}
.bench-drawer-toggle:hover { background: rgba(71,85,105,0.85); }
.bench-drawer-toggle .chev { transition: transform 0.2s; }
.bench-drawer-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
.bench-section {
  display: none; flex-direction: column; gap: 8px;
  margin-top: 8px; padding: 10px;
  background: rgba(15,23,42,0.5); border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
}
.bench-section.open { display: flex; }
.bench-row .bench-label {
  font-size: 9px; color: var(--text-mute); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
}
.bench-row .chip-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.bench-row .slot[data-half="h1"] {
  background: rgba(148,163,184,0.25); color: #cbd5e1;
  border-color: rgba(148,163,184,0.4);
}
.bench-row .slot[data-half="h2"] {
  background: rgba(245,158,11,0.25); color: #fbbf24;
  border-color: rgba(245,158,11,0.5);
}

/* Mini minute bar (per-game strip) */
.game-min-strip {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
}
.game-min-strip h4 {
  margin: 0 0 8px; font-size: 10px; font-weight: 700;
  color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.6px;
}
.game-min-strip .strip-row {
  display: grid; grid-template-columns: repeat(11, 1fr); gap: 3px;
}
.game-min-strip .strip-cell {
  height: 20px; border-radius: 3px; position: relative;
  background: rgba(30,41,59,0.8); border: 1px solid var(--border-soft);
  cursor: pointer;
}
.game-min-strip .strip-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: hsl(var(--cell-hue, 60), 70%, 45%);
  height: var(--cell-h, 0%);
  border-radius: 0 0 2px 2px;
}
.game-min-strip .strip-cell .strip-init {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 8px; font-weight: 700; color: var(--text);
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

/* ══════════════════ Minutes tab — player cards ══════════════════ */
.cards-list { display: flex; flex-direction: column; gap: 10px; }
.player-card {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  grid-template-areas:
    'avatar name total'
    'avatar bar bar'
    'games games games';
  gap: 6px 12px;
  padding: 12px;
  background: linear-gradient(to bottom, var(--bg-panel-soft), rgba(15,23,42,0.85));
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-md);
  position: relative;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.player-card:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
.player-card:active { transform: scale(0.995); }
.player-card.priority { border-color: rgba(34,197,94,0.45); }
.player-card.under { border-color: rgba(239,68,68,0.45); }
.card-avatar {
  grid-area: avatar;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
  background: var(--avatar-bg, var(--bg-elev));
  color: var(--avatar-fg, var(--text));
  border: 2px solid var(--avatar-ring, var(--border));
  box-shadow: 0 0 0 3px var(--bg-base), 0 0 12px var(--avatar-glow, transparent);
}
.card-name {
  grid-area: name;
  font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
  align-self: center; color: var(--text);
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-total {
  grid-area: total;
  align-self: center; text-align: right;
  font-size: 16px; font-weight: 700; color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.card-total .ratio {
  display: block; font-size: 10px; font-weight: 600; color: var(--text-mute);
  letter-spacing: 0.3px;
}
.card-bar {
  grid-area: bar;
  height: 6px; border-radius: 4px; background: rgba(15,23,42,0.8);
  border: 1px solid var(--border-soft);
  overflow: hidden;
}
.card-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(to right, hsl(var(--card-hue, 60), 70%, 40%), hsl(var(--card-hue, 60), 75%, 55%));
  width: var(--card-width, 0%);
  transition: width 0.3s;
}
.card-games {
  grid-area: games;
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
  margin-top: 6px;
}
.game-dot {
  padding: 4px 2px;
  border-radius: 4px;
  background: rgba(15,23,42,0.7);
  border: 1px solid var(--border-soft);
  font-size: 10px; font-weight: 700;
  text-align: center; color: var(--text-mute);
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.game-dot .dot-label { font-size: 9px; color: var(--text-mute); letter-spacing: 0.3px; }
.game-dot .dot-mins { font-size: 10px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.game-dot.excluded { opacity: 0.4; text-decoration: line-through; }
.game-dot.full { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); color: #86efac; }
.game-dot.half { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.4); color: #fde68a; }
.game-dot.zero { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
.game-dot .gk-badge-tiny {
  font-size: 7px; font-weight: 700;
  padding: 1px 3px; border-radius: 2px;

/* Section title (used on tabs) */

  margin: 0 0 10px; font-size: 11px; font-weight: 700;

.btn {

.btn.primary {

}

.btn.danger {

}

.btn + .btn { margin-top: 8px; }
.btn-row { display: flex; gap: 8px; }

.current-plan-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; margin-bottom: 12px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.3);

}
.current-plan-row .icon { font-size: 22px; }

.current-plan-row .name {

}

.version-list { display: flex; flex-direction: column; gap: 6px; }

/* ══════════════════ Bottom sheet ══════════════════ */
.sheet-backdrop {

/* ══════════════════ Narrow screens ══════════════════ */

  }

<body>

<!-- ═══════════════════ App bar ═══════════════════ -->
<header class="app-bar">
  <div class="app-logo">M</div>
  <div class="app-title">Tournament planner</div>

<input type="file" id="import-file" accept="application/json" style="display:none">

<script>
'use strict';

/* ══════════════════ Constants + seed ══════════════════ */
const PLAYERS = ['Verne','Petja','Jasper','Niilo H.','Jooa','Tiitus','Mikhail','Tomas','Alexandra','Onni','Roope'];
const POSITIONS = ['GK','LB','RB','CDM','LM','RM','CAM','ST'];
const BENCH_KEYS = ['bench0','bench1','bench2'];
const PRIORITY = new Set(['Onni','Jasper','Alexandra']);
const HALF_MIN = 750; // seconds per half

const SCHEDULE = [
  { time: '09:30', field: 'TN1', opp: 'FC Lahti' },
  { time: '11:30', field: 'TN2', opp: 'Lautp' },
  { time: '13:00', field: 'TN1', opp: 'FC Lahti 2' },
  { time: 'TBD',   field: 'TBD', opp: 'Playoff' },
  { time: 'TBD',   field: 'TBD', opp: 'Placement' },
];

const SEED = [
  { h1:{GK:'Verne',LB:'Niilo H.',RB:'Jooa',CDM:'Roope',LM:'Mikhail',RM:'Onni',CAM:'Petja',ST:'Alexandra',bench0:'Jasper',bench1:'Tiitus',bench2:'Tomas'},
    h2:{GK:'Verne',LB:'Niilo H.',RB:'Jooa',CDM:'Tomas',LM:'Jasper',RM:'Onni',CAM:'Tiitus',ST:'Mikhail',bench0:'Roope',bench1:'Alexandra',bench2:'Petja'} },
  { h1:{GK:'Petja',LB:'Tomas',RB:'Niilo H.',CDM:'Verne',LM:'Alexandra',RM:'Onni',CAM:'Tiitus',ST:'Mikhail',bench0:'Roope',bench1:'Jooa',bench2:'Jasper'},
    h2:{GK:'Petja',LB:'Tomas',RB:'Jooa',CDM:'Roope',LM:'Alexandra',RM:'Jasper',CAM:'Tiitus',ST:'Mikhail',bench0:'Verne',bench1:'Niilo H.',bench2:'Onni'} },
  { h1:{GK:'Verne',LB:'Tomas',RB:'Niilo H.',CDM:'Roope',LM:'Alexandra',RM:'Onni',CAM:'Jasper',ST:'Mikhail',bench0:'Petja',bench1:'Jooa',bench2:'Tiitus'},
    h2:{GK:'Verne',LB:'Petja',RB:'Jooa',CDM:'Roope',LM:'Alexandra',RM:'Onni',CAM:'Jasper',ST:'Tiitus',bench0:'Tomas',bench1:'Niilo H.',bench2:'Mikhail'} },
  { h1:{GK:'Verne',LB:'Petja',RB:'Niilo H.',CDM:'Jooa',LM:'Roope',RM:'Onni',CAM:'Tiitus',ST:'Mikhail',bench0:'Tomas',bench1:'Jasper',bench2:'Alexandra'},
    h2:{GK:'Verne',LB:'Tomas',RB:'Niilo H.',CDM:'Jooa',LM:'Alexandra',RM:'Onni',CAM:'Jasper',ST:'Mikhail',bench0:'Petja',bench1:'Roope',bench2:'Tiitus'} },
  { h1:{GK:'Jasper',LB:'Petja',RB:'Niilo H.',CDM:'Roope',LM:'Alexandra',RM:'Onni',CAM:'Tiitus',ST:'Mikhail',bench0:'Verne',bench1:'Jooa',bench2:'Tomas'},
    h2:{GK:'Jasper',LB:'Petja',RB:'Jooa',CDM:'Roope',LM:'Alexandra',RM:'Mikhail',CAM:'Tiitus',ST:'Tomas',bench0:'Verne',bench1:'Niilo H.',bench2:'Onni'} },
];

const STORAGE_KEY = 'matchops-planner-state-v2';
const VERSIONS_KEY = 'matchops-planner-versions-v1';
const DEFAULT_INCLUDED = [true, true, true, true, true];

/* ══════════════════ State ══════════════════ */
const loaded = loadAll();
let state = loaded.games;
let included = loaded.included;
let currentVersionName = loaded.currentVersionName;
let benchOpenFor = null;     // which game index has bench expanded (null = collapsed)
let activeGame = 0;          // which game the ribbon is focused on
let activeTab = 'games';     // 'games' | 'minutes' | 'plans'
const highlightedPlayers = new Set();
let tapSelected = null;      // { game, half, key }

// Undo/redo history
const history = [];
let historyIndex = -1;
const HISTORY_MAX = 40;

function snapshotStateForHistory() {
  return { games: JSON.parse(JSON.stringify(state)), included: included.slice() };
}
function pushHistory() {
  history.splice(historyIndex + 1);
  history.push(snapshotStateForHistory());
  if (history.length > HISTORY_MAX) history.shift();
  historyIndex = history.length - 1;
  renderActiveTab();
}
function applyHistorySnapshot(snap) {
  state = JSON.parse(JSON.stringify(snap.games));
  included = snap.included.slice();
  saveAll();
  renderActiveTab();
}
function undo() { if (historyIndex > 0) { historyIndex--; applyHistorySnapshot(history[historyIndex]); } }
function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyHistorySnapshot(history[historyIndex]); } }
pushHistory(); // initial state

/* ══════════════════ Persistence ══════════════════ */
function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && Array.isArray(p.games) && p.games.length === 5) {
        return {
          games: p.games,
          included: Array.isArray(p.included) ? p.included.slice(0,5).concat(DEFAULT_INCLUDED.slice(p.included.length)) : DEFAULT_INCLUDED.slice(),
          currentVersionName: p.currentVersionName || null,
        };
      }
    }
  } catch (e) {}
  return { games: JSON.parse(JSON.stringify(SEED)), included: DEFAULT_INCLUDED.slice(), currentVersionName: null };
}
function saveAll() {
  const snapshot = { games: state, included, currentVersionName, savedAt: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  showSaved(); updateVersionBadge();
}
let saveStatusTimer = null;
function showSaved() {
  const el = document.getElementById('save-status');
  if (!el) return;
  const now = new Date();
  el.textContent = '✓ ' + now.toTimeString().slice(0,5);
  el.style.opacity = '1';
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(() => { el.style.opacity = '0'; }, 2400);
}

/* ══════════════════ Versions ══════════════════ */
function loadVersions() {
  try { const raw = localStorage.getItem(VERSIONS_KEY); if (raw) return JSON.parse(raw) || {}; } catch (e) {}
  return {};
}
function saveVersionsMap(m) { localStorage.setItem(VERSIONS_KEY, JSON.stringify(m)); }
function snapshotForVersion() {
  return { games: JSON.parse(JSON.stringify(state)), included: included.slice(), savedAt: new Date().toISOString() };
}
function saveVersion(name, silent) {
  const m = loadVersions();
  if (!silent && m[name] && !confirm('"' + name + '" already exists. Overwrite?')) return false;
  m[name] = snapshotForVersion();
  saveVersionsMap(m);
  return true;
}
function deleteVersion(name) {
  if (!confirm('Delete "' + name + '"?')) return;
  const m = loadVersions(); delete m[name]; saveVersionsMap(m);
  if (currentVersionName === name) { currentVersionName = null; saveAll(); }
  if (activeTab === 'plans') renderPlans();
}
function renameVersion(oldName) {
  const m = loadVersions(); if (!m[oldName]) return;
  const input = prompt('Rename "' + oldName + '" to:', oldName);
  if (input === null) return;
  const n = input.trim(); if (!n || n === oldName) return;
  if (m[n] && !confirm('"' + n + '" exists. Overwrite?')) return;
  m[n] = m[oldName]; delete m[oldName]; saveVersionsMap(m);
  if (currentVersionName === oldName) { currentVersionName = n; saveAll(); }
  if (activeTab === 'plans') renderPlans();
}
function applyVersion(name) {
  const m = loadVersions(); const v = m[name]; if (!v) return;
  if (!confirm('Load "' + name + '"? Your current state will be replaced.')) return;
  state = JSON.parse(JSON.stringify(v.games));
  included = (v.included || DEFAULT_INCLUDED).slice(0,5);
  while (included.length < 5) included.push(true);
  currentVersionName = name;
  highlightedPlayers.clear();
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Helpers ══════════════════ */
function findKeyInHalf(g, half, player, excludeKey) {
  for (const p of POSITIONS) if (p !== excludeKey && g[half][p] === player) return p;
  for (const b of BENCH_KEYS) if (b !== excludeKey && g[half][b] === player) return b;
  return null;
}
function playerMinsPerGame(player, gameIdx) {
  const g = state[gameIdx]; let secs = 0;
  for (const half of ['h1','h2']) for (const pos of POSITIONS) if (g[half][pos] === player) { secs += HALF_MIN; break; }
  return secs;
}
function playerGKInGame(player, gameIdx) {
  const g = state[gameIdx];
  const h1 = g.h1.GK === player, h2 = g.h2.GK === player;
  if (h1 && h2) return 'full'; if (h1) return 'h1'; if (h2) return 'h2'; return null;
}
function playerTotalSec(player) {
  return [0,1,2,3,4].reduce((s,i) => s + (included[i] ? playerMinsPerGame(player,i) : 0), 0);
}
function playerTotalSecAll(player) {
  return [0,1,2,3,4].reduce((s,i) => s + playerMinsPerGame(player,i), 0);
}
function playerRatio(player) {
  const active = included.filter(Boolean).length;
  if (!active) return null;
  const expected = 12000 * active / 11;
  return playerTotalSec(player) / expected;
}
function hueForRatio(r) {
  const c = Math.max(0.4, Math.min(1.5, r));
  return Math.round((c - 0.4) / 1.1 * 150);
}
function formatMin(sec) { const m = Math.floor(sec/60), s = sec%60; return m + ':' + s.toString().padStart(2,'0'); }
function benchedBothHalves(gi) {
  const g = state[gi];
  const b1 = new Set(BENCH_KEYS.map(k => g.h1[k]).filter(Boolean));
  const b2 = new Set(BENCH_KEYS.map(k => g.h2[k]).filter(Boolean));
  const f1 = new Set(POSITIONS.map(p => g.h1[p]).filter(Boolean));
  const f2 = new Set(POSITIONS.map(p => g.h2[p]).filter(Boolean));
  return [...b1].filter(p => b2.has(p) && !f1.has(p) && !f2.has(p));
}
function playerInitials(name) {
  return name.split(/[\s.]+/).filter(Boolean).map(s => s[0]).slice(0,2).join('').toUpperCase();
}
function anyHighlightActive() { return highlightedPlayers.size > 0; }
function isHighlighted(p) { return p && highlightedPlayers.has(p); }
function toggleHighlight(p) {
  if (!p) return;
  if (highlightedPlayers.has(p)) highlightedPlayers.delete(p);
  else highlightedPlayers.add(p);
}

/* ══════════════════ Swap engine (shared by drag, tap, and bottom sheet) ══════════════════ */
function performSwap(gIdx, srcHalf, srcKey, tgtHalf, tgtKey) {
  const g = state[gIdx];
  const srcPlayer = g[srcHalf][srcKey];
  const tgtPlayer = g[tgtHalf][tgtKey];
  if (!srcPlayer) return;
  if (srcHalf === tgtHalf && srcKey === tgtKey) return;

  // Same position flip (both halves of same pos, two different players)
  if (srcKey === tgtKey && srcHalf !== tgtHalf && POSITIONS.includes(srcKey) && srcPlayer && tgtPlayer && srcPlayer !== tgtPlayer) {
    const pA = srcPlayer, pB = tgtPlayer;
    for (const half of ['h1','h2']) for (const k of POSITIONS.concat(BENCH_KEYS)) {
      if (g[half][k] === pA) g[half][k] = pB; else if (g[half][k] === pB) g[half][k] = pA;
    }
  } else if (srcHalf === tgtHalf) {
    const isFieldPos = POSITIONS.includes(tgtKey);
    const targetWasMerged = isFieldPos && g.h1[tgtKey] === g.h2[tgtKey] && g.h1[tgtKey] !== '';
    g[tgtHalf][tgtKey] = srcPlayer; g[srcHalf][srcKey] = tgtPlayer;
    if (targetWasMerged && srcPlayer !== tgtPlayer) {
      const oh = tgtHalf === 'h1' ? 'h2' : 'h1';
      const srcOther = findKeyInHalf(g, oh, srcPlayer, tgtKey);
      if (srcOther) {
        const tmp = g[oh][tgtKey]; g[oh][tgtKey] = srcPlayer; g[oh][srcOther] = tmp;
      }
    }
  } else {
    // cross-half
    const srcInTgt = findKeyInHalf(g, tgtHalf, srcPlayer, null);
    if (srcInTgt) {
      const tmp = g[tgtHalf][tgtKey]; g[tgtHalf][tgtKey] = srcPlayer; g[tgtHalf][srcInTgt] = tmp;
    } else {
      g[tgtHalf][tgtKey] = srcPlayer; g[tgtHalf].bench0 = tgtPlayer;
    }
  }
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Rendering ══════════════════ */
function renderActiveTab() {
  if (activeTab === 'games') renderGamesTab();
  else if (activeTab === 'minutes') renderMinutesTab();
  else if (activeTab === 'plans') renderPlans();
  updateVersionBadge();
}

/* ─── Version badge ─── */
function updateVersionBadge() {
  const b = document.getElementById('version-badge');
  if (!b) return;
  if (currentVersionName) {
    b.textContent = '📂 ' + currentVersionName;
    b.classList.add('has-version');
  } else {
    b.textContent = '';
    b.classList.remove('has-version');
  }
}

/* ─── Games tab ─── */
function renderGamesTab() {
  renderRibbon();
  renderGameDetail();
}
function renderRibbon() {
  const container = document.getElementById('ribbon');
  container.innerHTML = '';
  SCHEDULE.forEach((sched, i) => {
    const btn = document.createElement('button');
    btn.className = 'ribbon-game' + (i === activeGame ? ' active' : '') + (included[i] ? '' : ' excluded');
    btn.dataset.game = i;
    btn.innerHTML =
      '<span class="ribbon-label">Game ' + (i+1) + '</span>' +
      '<span class="ribbon-opp">' + sched.opp + '</span>' +
      '<span class="ribbon-time">' + sched.time + (sched.field && sched.field !== 'TBD' ? ' · ' + sched.field : '') + '</span>';
    btn.addEventListener('click', () => { activeGame = i; renderGamesTab(); });
    container.appendChild(btn);
  });
  // scroll active into view
  const activeEl = container.querySelector('.ribbon-game.active');
  if (activeEl && activeEl.scrollIntoView) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function chipHtml(gameIdx, half, key, player, extraClass) {
  const hl = isHighlighted(player) ? 'highlighted' : '';
  const dim = anyHighlightActive() && player && !isHighlighted(player) ? 'any-highlighted' : '';
  const tap = tapSelected && tapSelected.game === gameIdx && tapSelected.half === half && tapSelected.key === key ? 'tap-selected' : '';
  const cls = ['slot', hl, dim, tap, extraClass || ''].filter(Boolean).join(' ');
  // per-chip minute bar
  let barHtml = '';
  if (player) {
    const r = playerRatio(player);
    const hue = r !== null ? hueForRatio(r) : 60;
    const pct = r !== null ? Math.min(100, Math.max(0, r * 80)) : 0; // display up to 100% when r=1.25
    barHtml = '<div class="chip-min-bar"><div class="chip-min-fill" style="--chip-hue:' + hue + ';--chip-ratio:' + pct + '%"></div></div>';
  }
  return '<div class="' + cls + '" data-game="' + gameIdx + '" data-half="' + half + '" data-key="' + key + '" draggable="true">' +
    '<span>' + (player || '') + '</span>' + barHtml + '</div>';
}

function renderGameDetail() {
  const gIdx = activeGame;
  const g = state[gIdx];
  const sched = SCHEDULE[gIdx];
  const view = document.getElementById('game-detail');
  const benchedBoth = new Set(benchedBothHalves(gIdx));
  const onFieldH1 = new Set(POSITIONS.map(p => g.h1[p]).filter(Boolean));
  const onFieldH2 = new Set(POSITIONS.map(p => g.h2[p]).filter(Boolean));
  const benchOpen = benchOpenFor === gIdx;

  // Toolbar: include toggle + undo/redo
  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  let html = '';
  html += '<div class="game-toolbar">';
  html +=   '<div class="toolbar-left">';
  html +=     '<label class="include-toggle' + (included[gIdx] ? ' active' : '') + '">' +
                '<input type="checkbox" id="game-include"' + (included[gIdx] ? ' checked' : '') + '>' +
                '<span>Include in totals</span>' +
              '</label>';
  html +=   '</div>';
  html +=   '<button class="icon-btn" id="btn-undo" ' + (canUndo ? '' : 'disabled') + ' title="Undo">↶</button>';
  html +=   '<button class="icon-btn" id="btn-redo" ' + (canRedo ? '' : 'disabled') + ' title="Redo">↷</button>';
  html += '</div>';

  // Pitch card
  html += '<div class="pitch-card">';
  html +=   '<div class="pitch">';
  html += POSITIONS.map(p => {
    const h1 = g.h1[p] || '', h2 = g.h2[p] || '';
    const full = h1 && h1 === h2;
    const h1PlaysBoth = !full && h1 && onFieldH2.has(h1) ? 'plays-both' : '';
    const h2PlaysBoth = !full && h2 && onFieldH1.has(h2) ? 'plays-both' : '';
    return '<div class="pos-box pos-' + p.toLowerCase() + '">' +
      '<div class="pos-label"><span class="pos-spacer"></span><span class="pos-name">' + p + '</span><span class="pos-spacer"></span></div>' +
      '<div class="chip-row' + (full ? ' full-game' : '') + '">' +
        chipHtml(gIdx, 'h1', p, h1, h1PlaysBoth) +
        chipHtml(gIdx, 'h2', p, h2, h2PlaysBoth) +
      '</div>' +
    '</div>';
  }).join('');
  html +=   '</div>';

  // Bench drawer toggle
  const benchCount = BENCH_KEYS.filter(k => g.h1[k] || g.h2[k]).length * 2;
  html +=   '<button class="bench-drawer-toggle" id="bench-toggle" aria-expanded="' + benchOpen + '">' +
              '<span>Bench (' + benchCount + ' slots)</span><span class="chev">▼</span>' +
            '</button>';
  html +=   '<div class="bench-section' + (benchOpen ? ' open' : '') + '" id="bench-section">';
  html +=     '<div class="bench-row"><div class="bench-label">Bench H1</div><div class="chip-row">' +
                BENCH_KEYS.map(k => {
                  const pl = g.h1[k] || '';
                  return chipHtml(gIdx, 'h1', k, pl, benchedBoth.has(pl) ? 'benched-both' : '');
                }).join('') +
              '</div></div>';
  html +=     '<div class="bench-row"><div class="bench-label">Bench H2</div><div class="chip-row">' +
                BENCH_KEYS.map(k => {
                  const pl = g.h2[k] || '';
                  return chipHtml(gIdx, 'h2', k, pl, benchedBoth.has(pl) ? 'benched-both' : '');
                }).join('') +
              '</div></div>';
  html +=   '</div>';

  // Mini minute strip
  html +=   '<div class="game-min-strip">';
  html +=     '<h4>This game — minutes per player</h4>';
  html +=     '<div class="strip-row">';
  html += PLAYERS.map(pl => {
    const sec = playerMinsPerGame(pl, gIdx);
    const maxSec = 25 * 60;
    const pct = (sec / maxSec) * 100;
    const r = playerRatio(pl);
    const hue = r !== null ? hueForRatio(r) : 60;
    return '<div class="strip-cell" title="' + pl + ' — ' + formatMin(sec) + '">' +
      '<div class="strip-fill" style="--cell-hue:' + hue + ';--cell-h:' + pct + '%"></div>' +
      '<span class="strip-init">' + playerInitials(pl) + '</span>' +
    '</div>';
  }).join('');
  html +=     '</div>';
  html +=   '</div>';

  html += '</div>';

  view.innerHTML = html;

  // Handlers
  document.getElementById('game-include').addEventListener('change', (e) => {
    included[gIdx] = e.target.checked; saveAll(); pushHistory(); renderActiveTab();
  });
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('bench-toggle').addEventListener('click', () => {
    benchOpenFor = benchOpen ? null : gIdx;
    renderGameDetail();
  });

  // Chip handlers
  view.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('dragstart', onDragStart);
    slot.addEventListener('dragover', onDragOver);
    slot.addEventListener('dragleave', onDragLeave);
    slot.addEventListener('drop', onDrop);
    slot.addEventListener('dragend', onDragEnd);
    slot.addEventListener('click', onChipClick);
    slot.addEventListener('contextmenu', (e) => { e.preventDefault(); openChipSheet(slot); });
    // long-press for touch
    let t = null;
    slot.addEventListener('touchstart', () => { t = setTimeout(() => openChipSheet(slot), 500); });
    slot.addEventListener('touchend',   () => { if (t) { clearTimeout(t); t = null; } });
    slot.addEventListener('touchmove',  () => { if (t) { clearTimeout(t); t = null; } });
  });
}

/* ─── Minutes tab ─── */
function renderMinutesTab() {
  const total = PLAYERS.length;
  const activeGames = included.filter(Boolean).length;
  document.getElementById('minutes-count').textContent = total + ' players · ' + activeGames + '/5 games counted';

  const list = document.getElementById('minutes-cards');
  const sorted = PLAYERS.slice().sort((a,b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });
  list.innerHTML = sorted.map(p => {
    const totalSec = playerTotalSec(p);
    const r = playerRatio(p);
    const hue = r !== null ? hueForRatio(r) : 60;
    const pct = r !== null ? Math.min(100, Math.max(0, r * 80)) : 0;
    const isPrio = PRIORITY.has(p);
    const status = r === null ? 'ok' : (r < 0.7 ? 'under' : (r > 1.1 ? 'priority' : 'ok'));
    const avatarBg = 'hsl(' + hue + ', 55%, 30%)';
    const avatarFg = 'hsl(' + hue + ', 90%, 80%)';
    const avatarRing = 'hsl(' + hue + ', 75%, 55%)';
    const avatarGlow = status === 'priority' ? 'rgba(34,197,94,0.4)' : (status === 'under' ? 'rgba(239,68,68,0.4)' : 'transparent');

    const gamesHtml = [0,1,2,3,4].map(i => {
      const sec = playerMinsPerGame(p, i);
      const gk = playerGKInGame(p, i);
      let cls = 'game-dot';
      if (!included[i]) cls += ' excluded';
      if (sec === 1500) cls += ' full';
      else if (sec === 750) cls += ' half';
      else cls += ' zero';
      const gkBadge = gk ? '<span class="gk-badge-tiny">' + (gk === 'full' ? 'GK' : (gk === 'h1' ? 'GK·H1' : 'GK·H2')) + '</span>' : '';
      return '<div class="' + cls + '">' +
        '<span class="dot-label">G' + (i+1) + '</span>' +
        '<span class="dot-mins">' + formatMin(sec) + '</span>' +
        gkBadge +
      '</div>';
    }).join('');

    return '<div class="player-card ' + status + '" data-player="' + p.replace(/"/g,'&quot;') + '" ' +
      'style="--card-hue:' + hue + ';--card-width:' + pct + '%;' +
      '--avatar-bg:' + avatarBg + ';--avatar-fg:' + avatarFg + ';--avatar-ring:' + avatarRing + ';--avatar-glow:' + avatarGlow + '">' +
      '<div class="card-avatar">' + playerInitials(p) + '</div>' +
      '<div class="card-name">' + p + (isPrio ? ' ★' : '') + '</div>' +
      '<div class="card-total">' + formatMin(totalSec) + (r !== null ? '<span class="ratio">' + Math.round(r*100) + '% of fair share</span>' : '') + '</div>' +
      '<div class="card-bar"><div class="card-bar-fill"></div></div>' +
      '<div class="card-games">' + gamesHtml + '</div>' +
    '</div>';
  }).join('');

  list.querySelectorAll('.player-card').forEach(card => {
    card.addEventListener('click', () => {
      const p = card.dataset.player;
      toggleHighlight(p);
      openPlayerSheet(p);
    });
  });
}

/* ─── Plans tab ─── */
function renderPlans() {
  const view = document.getElementById('plans-view');
  const map = loadVersions();
  const names = Object.keys(map).sort((a,b) => new Date(map[b].savedAt) - new Date(map[a].savedAt));
  let html = '';

  // Current plan
  html += '<div class="plans-section">';
  html +=   '<h4>Current plan</h4>';
  if (currentVersionName) {
    html +=  '<div class="current-plan-row">' +
               '<span class="icon">📂</span>' +
               '<div class="meta"><div class="name">' + currentVersionName + '</div>' +
                 '<div class="ts">Working copy — unsaved edits are in the auto-save slot</div></div>' +
             '</div>';
    html +=  '<button class="btn primary" id="plan-save-changes">Save changes to "' + currentVersionName + '"</button>';
    html +=  '<button class="btn" id="plan-save-as">Save as new version…</button>';
  } else {
    html +=  '<div class="current-plan-row">' +
               '<span class="icon">✏️</span>' +
               '<div class="meta"><div class="name">Unsaved working copy</div>' +
                 '<div class="ts">Auto-saves locally in your browser</div></div>' +
             '</div>';
    html +=  '<button class="btn primary" id="plan-save-as">Save as new version…</button>';
  }
  html += '</div>';

  // Versions list
  html += '<div class="plans-section">';
  html +=   '<h4>Saved versions (' + names.length + ')</h4>';
  if (names.length === 0) {
    html += '<div class="version-empty">No saved versions yet.</div>';
  } else {
    html += '<div class="version-list">';
    names.forEach(n => {
      const v = map[n];
      const d = new Date(v.savedAt);
      const ts = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      const isCurrent = currentVersionName === n;
      html += '<div class="version-row ' + (isCurrent ? 'current' : '') + '" data-name="' + encodeURIComponent(n) + '">' +
        '<span class="vname" title="' + n.replace(/"/g,'&quot;') + '">' + (isCurrent ? '📂 ' : '') + n + '</span>' +
        '<span class="vtime">' + ts + '</span>' +
        '<button class="vbtn" data-action="load" title="Load">↵</button>' +
        '<button class="vbtn" data-action="rename" title="Rename">✎</button>' +
        '<button class="vbtn delete" data-action="delete" title="Delete">✕</button>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Backup
  html += '<div class="plans-section">';
  html +=   '<h4>Backup</h4>';
  html +=   '<div class="btn-row">' +
              '<button class="btn" id="plan-export">Export .json</button>' +
              '<button class="btn" id="plan-import">Import .json</button>' +
            '</div>';
  html +=   '<button class="btn" id="plan-share">Copy share URL</button>';
  html += '</div>';

  // Danger
  html += '<div class="plans-section danger">';
  html +=   '<h4>Danger zone</h4>';
  html +=   '<button class="btn danger" id="plan-reset">Reset to original plan</button>';
  html += '</div>';

  view.innerHTML = html;

  // Handlers
  const bSaveChanges = document.getElementById('plan-save-changes');
  if (bSaveChanges) bSaveChanges.addEventListener('click', () => {
    saveVersion(currentVersionName, true); renderPlans();
  });
  document.getElementById('plan-save-as').addEventListener('click', () => {
    const suggested = currentVersionName ? (currentVersionName + ' (copy)') : 'Plan ' + new Date().toLocaleString();
    const input = prompt('Save as:', suggested);
    if (!input) return;
    const n = input.trim(); if (!n) return;
    if (saveVersion(n)) { currentVersionName = n; saveAll(); renderPlans(); }
  });
  view.querySelectorAll('.version-row').forEach(row => {
    const name = decodeURIComponent(row.dataset.name);
    row.querySelector('[data-action="load"]').addEventListener('click', (e) => { e.stopPropagation(); applyVersion(name); });
    row.querySelector('[data-action="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameVersion(name); });
    row.querySelector('[data-action="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteVersion(name); });
    // Tap the name area → load
    row.querySelector('.vname').addEventListener('click', () => applyVersion(name));
  });
  document.getElementById('plan-export').addEventListener('click', exportJson);
  document.getElementById('plan-import').addEventListener('click', () => document.getElementById('import-file').click());
  document.getElementById('plan-share').addEventListener('click', shareUrl);
  document.getElementById('plan-reset').addEventListener('click', resetPlan);
}

function exportJson() {
  const snapshot = {
    formatVersion: 2,
    savedAt: new Date().toISOString(),
    games: state, included, currentVersionName,
    versions: loadVersions(),
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'matchops-planner-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.games || data.games.length !== 5) { alert('Invalid file.'); return; }
      const hasVer = data.versions && Object.keys(data.versions).length > 0;
      const n = hasVer ? Object.keys(data.versions).length : 0;
      if (!confirm('Replace current plan' + (hasVer ? (' AND import ' + n + ' version(s)?') : '?'))) return;
      state = data.games;
      included = (data.included || DEFAULT_INCLUDED).slice(0,5);
      while (included.length < 5) included.push(true);
      currentVersionName = data.currentVersionName || null;
      if (hasVer) {
        const merged = Object.assign({}, loadVersions(), data.versions);
        saveVersionsMap(merged);
      }
      saveAll(); pushHistory(); renderActiveTab();
    } catch (err) { alert('Parse error: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
});
async function shareUrl() {
  const snapshot = { games: state, included };
  try {
    const str = JSON.stringify(snapshot);
    // URL-safe base64
    const b64 = btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const url = location.origin + location.pathname + '#plan=' + b64;
    if (navigator.clipboard) await navigator.clipboard.writeText(url);
    alert('Share URL copied to clipboard (length ' + url.length + ' chars). Paste it into a message; opening that URL will offer to import the plan.');
  } catch (e) { alert('Could not create share URL: ' + e.message); }
}
function resetPlan() {
  if (!confirm('Reset all games to the original plan? This clears saved state (versions kept).')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  location.reload();
}

/* Try importing from URL hash on load */
(function tryImportFromHash() {
  const m = location.hash.match(/#plan=([A-Za-z0-9_\-]+)/);
  if (!m) return;
  try {
    const b64 = m[1].replace(/-/g,'+').replace(/_/g,'/') + '='.repeat((4 - m[1].length % 4) % 4);
    const str = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(str);
    if (!data.games || data.games.length !== 5) return;
    if (confirm('A shared plan is in the URL. Load it?')) {
      state = data.games;
      included = (data.included || DEFAULT_INCLUDED).slice(0,5);
      while (included.length < 5) included.push(true);
      currentVersionName = null;
      saveAll(); pushHistory();
    }
    if (window.history && window.history.replaceState) window.history.replaceState(null, '', location.pathname);
  } catch (e) {}
})();

/* ══════════════════ Drag & tap handlers ══════════════════ */
let dragSource = null;
function onDragStart(e) {
  const s = e.currentTarget;
  dragSource = { game: s.dataset.game, half: s.dataset.half, key: s.dataset.key };
  e.dataTransfer.effectAllowed = 'move';
  s.style.opacity = '0.4';
}
function onDragOver(e) {
  if (!dragSource) return;
  const s = e.currentTarget;
  if (s.dataset.game !== dragSource.game) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  s.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const t = e.currentTarget; t.classList.remove('drag-over');
  if (!dragSource) return;
  if (t.dataset.game !== dragSource.game) return;
  if (t.dataset.half === dragSource.half && t.dataset.key === dragSource.key) return;
  performSwap(parseInt(dragSource.game,10), dragSource.half, dragSource.key, t.dataset.half, t.dataset.key);
}
function onDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
  dragSource = null;
}
function onChipClick(e) {
  const s = e.currentTarget;
  const gIdx = parseInt(s.dataset.game, 10);
  const half = s.dataset.half, key = s.dataset.key;
  const player = state[gIdx][half][key];
  if (!player) return;

  if (!tapSelected) { tapSelected = { game: gIdx, half, key }; renderGameDetail(); return; }
  if (tapSelected.game === gIdx && tapSelected.half === half && tapSelected.key === key) { tapSelected = null; renderGameDetail(); return; }
  if (tapSelected.game !== gIdx) { tapSelected = { game: gIdx, half, key }; renderGameDetail(); return; }

  const src = tapSelected; tapSelected = null;
  performSwap(gIdx, src.half, src.key, half, key);
}

/* ══════════════════ Bottom sheet ══════════════════ */
function openSheet(title, sub, actions) {
  document.getElementById('sheet-title').textContent = title;
  document.getElementById('sheet-sub').textContent = sub || '';
  const actionsBox = document.getElementById('sheet-actions');
  actionsBox.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn' + (a.variant ? ' ' + a.variant : '');
    b.textContent = a.label;
    b.addEventListener('click', () => { closeSheet(); setTimeout(a.onClick, 160); });
    actionsBox.appendChild(b);
  });
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);

function openChipSheet(slot) {
  const gIdx = parseInt(slot.dataset.game, 10);
  const half = slot.dataset.half, key = slot.dataset.key;
  const g = state[gIdx];
  const player = g[half][key];
  if (!player) return;
  const isFieldPos = POSITIONS.includes(key);
  const actions = [];
  actions.push({
    label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
    onClick: () => { toggleHighlight(player); renderActiveTab(); }
  });
  if (isFieldPos) {
    const h1p = g.h1[key], h2p = g.h2[key];
    if (h1p && h2p && h1p !== h2p) {
      actions.push({ label: 'Keep ' + h1p + ' for full game', variant: 'primary', onClick: () => mergeH(gIdx, key, 'h1') });
      actions.push({ label: 'Keep ' + h2p + ' for full game', variant: 'primary', onClick: () => mergeH(gIdx, key, 'h2') });
    } else if (h1p && h1p === h2p) {
      actions.push({ label: 'Split into starter + sub', variant: 'primary', onClick: () => splitMerged(gIdx, key) });
    }
  }
  const sub = 'Position: ' + key + ' · ' + (half === 'h1' ? '1st half' : '2nd half');
  openSheet(player, sub, actions);
}
function openPlayerSheet(player) {
  const total = playerTotalSec(player);
  const r = playerRatio(player);
  const pct = r !== null ? Math.round(r*100) + '% of fair share' : '';
  const actions = [
    { label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
      onClick: () => { toggleHighlight(player); renderActiveTab(); } },
    { label: 'Jump to Games tab', onClick: () => setTab('games') },
  ];
  openSheet(player, formatMin(total) + ' total · ' + pct, actions);
}
function mergeH(gIdx, pos, keepHalf) {
  const g = state[gIdx];
  const keeper = g[keepHalf][pos];
  const displaced = g[keepHalf === 'h1' ? 'h2' : 'h1'][pos];
  if (!keeper || displaced === keeper) return;
  const otherHalf = keepHalf === 'h1' ? 'h2' : 'h1';
  const target = findKeyInHalf(g, otherHalf, keeper, pos);
  if (target) {
    const tmp = g[otherHalf][pos]; g[otherHalf][pos] = keeper; g[otherHalf][target] = tmp;
  } else {
    g[otherHalf][pos] = keeper; g[otherHalf].bench0 = displaced;
  }
  saveAll(); pushHistory(); renderActiveTab();
}
function splitMerged(gIdx, pos) {
  const g = state[gIdx];
  const tmp = g.h2[pos]; g.h2[pos] = g.h2.bench0; g.h2.bench0 = tmp;
  saveAll(); pushHistory(); renderActiveTab();
}

/* ══════════════════ Tab navigation ══════════════════ */
function setTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector('.nav-item[data-tab="' + name + '"]').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderActiveTab();
}
document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => setTab(n.dataset.tab)));
document.getElementById('version-badge').addEventListener('click', () => setTab('plans'));

/* ══════════════════ Service worker ══════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      const update = () => reg.update().catch(() => {});
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') update(); });
      window.addEventListener('focus', update);
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        if (!w) return;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) w.postMessage({ type: 'SKIP_WAITING' });
        });
      });
    }).catch(() => {});
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => { if (!reloaded) { reloaded = true; location.reload(); } });
  });
}

/* ══════════════════ Init ══════════════════ */
renderActiveTab();
