  // Chip handlers
  view.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('dragstart', onDragStart);
    slot.addEventListener('dragover', onDragOver);
    slot.addEventListener('dragleave', onDragLeave);
    slot.addEventListener('drop', onDrop);
    slot.addEventListener('dragend', onDragEnd);
    slot.addEventListener('click', onChipClick);
    slot.addEventListener('contextmenu', (e) => { e.preventDefault(); openChipSheet(slot); });
    // long-press for touch
    let t = null;
    slot.addEventListener('touchstart', () => { t = setTimeout(() => openChipSheet(slot), 500); });
    slot.addEventListener('touchend',   () => { if (t) { clearTimeout(t); t = null; } });
    slot.addEventListener('touchmove',  () => { if (t) { clearTimeout(t); t = null; } });
  });
  // Position-level gear buttons in each pos-label header.
  view.querySelectorAll('[data-pos-menu]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const [g, r] = btn.dataset.posMenu.split('|');
      const gIdx = parseInt(g, 10);
      if (!Number.isFinite(gIdx) || !r) return;
      openPositionSheet(gIdx, r);
    });
  });
}

/* ─── Minutes tab — quick-scan chip grid + multi-player focus stack ─── */
/* Compute tournament-level warnings to surface above the player chip grid. */
function computeMinutesWarnings() {
  const out = [];
  // 1. Zero-minute players in any *included* game — surfaces "you forgot Liam in game 3".
  const zeroByPlayer = new Map(); // player → list of game indices where 0 mins (and game is included)
  for (let i = 0; i < tournament.games.length; i++) {
    if (!included[i]) continue;
    for (const p of PLAYERS) {
      if (playerSecondsInGame(p, i) === 0) {
        if (!zeroByPlayer.has(p)) zeroByPlayer.set(p, []);
        zeroByPlayer.get(p).push(i + 1);
      }
    }
  }
  if (zeroByPlayer.size > 0) {
    const players = [...zeroByPlayer.keys()].sort();
    const summary = players.map(p => p + ' (G' + zeroByPlayer.get(p).join(',') + ')').slice(0, 3).join(', ')
      + (players.length > 3 ? ` +${players.length - 3} more` : '');
    out.push({ kind: 'zero', label: players.length + ' player' + (players.length === 1 ? '' : 's') + ' with 0 minutes', detail: summary, players });
  }
  // 2. Max-min spread across included games.
  if (PLAYERS.length > 0 && included.some(Boolean)) {
    const totals = PLAYERS.map(p => ({ p, sec: playerTotalSec(p) })).sort((a, b) => a.sec - b.sec);
    const min = totals[0], max = totals[totals.length - 1];
    const spreadMin = Math.round((max.sec - min.sec) / 60);
    if (spreadMin > 15) {
      out.push({
        kind: 'spread',
        label: spreadMin + " min spread (" + Math.round(min.sec / 60) + " - " + Math.round(max.sec / 60) + ")",
        detail: 'Least: ' + min.p + ' · Most: ' + max.p,
        players: [min.p, max.p],
      });
    }
  }
  // 3. GK rotation — flag if only one player kept goal across all included games.
  const keepers = new Set();
  for (let i = 0; i < tournament.games.length; i++) {
    if (!included[i]) continue;
    const g = tournament.games[i];
    for (const seg of getCellSegments(g, 'GK')) {
      if (seg.player) keepers.add(seg.player);
    }
  }
  if (keepers.size === 1) {
    const sole = [...keepers][0];
    out.push({
      kind: 'gk',
      label: 'Only ' + sole + ' plays GK',
      detail: 'Consider rotating goalkeepers',
      players: [sole],
    });
  }
  return out;
}
function renderMinutesWarnings() {
  const host = document.getElementById('minutes-warnings');
  if (!host) return;
  const warnings = computeMinutesWarnings();
  if (warnings.length === 0) { host.innerHTML = ''; return; }
  let html = '<div class="warnings-strip">';
  warnings.forEach((w, i) => {
    const cls = 'warning-chip warning-' + w.kind;
    html += '<button class="' + cls + '" data-warning-idx="' + i + '" title="' + escapeHtml(w.detail) + '">' +
      '<span class="warning-label">' + escapeHtml(w.label) + '</span>' +
      '<span class="warning-detail">' + escapeHtml(w.detail) + '</span>' +
    '</button>';
  });
  html += '</div>';
  host.innerHTML = html;
  host.querySelectorAll('.warning-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const idx = parseInt(chip.dataset.warningIdx, 10);
      const w = warnings[idx];
      if (!w) return;
      // Toggle: if already highlighting these exact players, clear; else replace.
      const targetSet = new Set(w.players);
      const current = new Set(highlightedPlayers);
      const sameSet = targetSet.size === current.size && [...targetSet].every(p => current.has(p));
      highlightedPlayers.clear();
      if (!sameSet) w.players.forEach(p => highlightedPlayers.add(p));
      renderMinutesTab();
    });
  });
}

function renderMinutesTab() {
  const total = PLAYERS.length;
  const activeGames = included.filter(Boolean).length;
  document.getElementById('minutes-count').textContent = total + ' players · ' + activeGames + '/' + tournament.games.length + ' games counted';
  renderMinutesWarnings();

  const list = document.getElementById('minutes-cards');
  list.className = 'pt-grid';
  const sorted = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });

  // Which players to show in the focus stack:
  //  - any currently highlighted players (comparison mode), OR
  //  - worst-off player as the default when nothing is selected.
  const highlighted = [...highlightedPlayers]
    .filter(p => PLAYERS.includes(p))
    .sort((a, b) => {
      const d = playerTotalSec(a) - playerTotalSec(b);
      if (d !== 0) return d;
      return a.localeCompare(b);
    });
  const focusPlayers = highlighted.length > 0 ? highlighted : [sorted[0]];
  const focusSet = new Set(focusPlayers);

  const anyHi = anyHighlightActive();
  list.innerHTML = sorted.map(p => {
    const totMin = Math.round(playerTotalSec(p) / 60);
    const r = playerRatio(p);
    const c = ratioColors(r);
    const isPrio = PRIORITY.has(p);
    const hl = isHighlighted(p);
    const dim = anyHi && !hl;
    const isFocused = focusSet.has(p);
    const cls = 'pt-chip' +
      (isPrio ? ' prio' : '') +
      (hl ? ' highlighted' : '') +
      (dim && !isFocused ? ' any-highlighted' : '') +
      (isFocused && !hl ? ' focused' : ''); // only decorate focus when not already highlighted
    return '<button class="' + cls + '" ' +
      'data-player="' + p.replace(/"/g, '&quot;') + '" ' +
      'style="--pt-bg:' + c.bg + ';--pt-fg:' + c.fg + '">' +
      '<span class="pt-name">' + escapeHtml(p) + '</span>' +
      '<span class="pt-total">' + totMin + "'" + '</span>' +
    '</button>';
  }).join('');

  list.querySelectorAll('.pt-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const p = chip.dataset.player;
      toggleHighlight(p);
      renderMinutesTab();
    });
  });

  renderMinutesFocus(focusPlayers, activeGames, highlighted.length > 0);
}

function renderFocusCard(focused, activeGames) {
  const totalSec = playerTotalSec(focused);
  const totalMin = Math.round(totalSec / 60);
  const r = playerRatio(focused);
  const pct = r !== null ? Math.round(r * 100) : 0;
  const barW = r !== null ? Math.min(100, Math.max(0, Math.round(r * 80))) : 0;
  const c = ratioColors(r);
  const isPrio = PRIORITY.has(focused);
  const formation = getFormation(tournament.formationId);
  const onFieldCount = formation.roles.length;
  const rosterSize = Math.max(onFieldCount, tournament.rosterSize || PLAYERS.length);
  let totalAvail = 0;
  for (let i = 0; i < tournament.games.length; i++) {
    if (!included[i]) continue;
    totalAvail += (tournament.games[i].durationMin || 25) * 60 * onFieldCount;
  }
  const expected = totalAvail / rosterSize;
  const deltaMin = expected ? Math.round((totalSec - expected) / 60) : 0;
  const deltaStr = expected
    ? (deltaMin === 0 ? 'on fair share' : (deltaMin > 0 ? '+' + deltaMin + " min vs average" : deltaMin + " min vs average"))
    : 'no games counted';

  const gamesHtml = tournament.games.map((g, i) => {
    const sec = playerMinsPerGame(focused, i);
    const posInfo = playerGamePositions(focused, i);
    const totalGameSec = gameTotalSec(g);
    const ratio = totalGameSec > 0 ? sec / totalGameSec : 0;
    let cls = 'focus-game';
    if (!included[i]) cls += ' excluded';
    if (ratio >= 0.95) cls += ' full';
    else if (ratio >= 0.05) cls += ' half';
    else cls += ' zero';
    const mins = Math.round(sec / 60);
    const posText = posInfo.text || '\u2014';
    return '<div class="' + cls + '">' +
      '<span class="fg-label">G' + (i + 1) + '</span>' +
      '<span class="fg-pos">' + escapeHtml(posText) + '</span>' +
      '<span class="fg-mins">' + mins + "'" + '</span>' +
    '</div>';
  }).join('');

  return '<div class="focus-card" data-player="' + focused.replace(/"/g, '&quot;') + '">' +
    '<div class="focus-head">' +
      '<div class="focus-name">' + escapeHtml(focused) + (isPrio ? ' <span class="focus-star">★</span>' : '') + '</div>' +
      '<div class="focus-total">' + totalMin + "'" + '</div>' +
    '</div>' +
    '<div class="focus-bar">' +
      '<div class="focus-bar-track"><div class="focus-bar-fill" style="--bar-bg:' + c.bg + ';--bar-w:' + barW + '%"></div></div>' +
      '<div class="focus-bar-label">' + (r !== null ? pct + '% of fair share · ' + deltaStr : 'no games counted') + '</div>' +
    '</div>' +
    '<div class="focus-games">' + gamesHtml + '</div>' +
  '</div>';
}

}

function safeFilenamePart(s) {
  return (s || '')
    .replace(/[\/\\?%*:|"<>]/g, '-')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 60);
}
function exportJson() {
  const snapshot = {
    formatVersion: 1,
    kind: 'matchops-planner-export',
    savedAt: new Date().toISOString(),
    tournament,
    included,
    currentVersionName,
    versions: loadVersions(),
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const verPart = currentVersionName ? safeFilenamePart(currentVersionName) + '_' : '';
  a.href = url;
  a.download = 'matchops-planner_' + verPart + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function _coerceImportToTournament(data) {
  // Accepts: v1 envelope { formatVersion:1, tournament, ... }
  //          v2-style export { formatVersion:2, games:[...] } → migrated
  //          legacy export { games:[...] } (no formatVersion) → migrated
  if (data && data.formatVersion === 1 && data.tournament) {
    return { t: data.tournament, included: data.included, currentVersionName: data.currentVersionName, versions: data.versions };
  }
  if (data && Array.isArray(data.games)) {
    const t = migrateV2ToV3({ games: data.games });
    if (!t) return null;
    return { t, included: data.included, currentVersionName: data.currentVersionName, versions: data.versions };
  }
  return null;
}
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const coerced = _coerceImportToTournament(data);
      if (!coerced || !hasValidShape(coerced.t)) {
        alert('Invalid file: tournament shape not recognised.');
        return;
      }
      const importUnknowns = collectUnknownPlayers(coerced.t);
      // Filter imported versions to ones that structurally validate
      const importedVersions = {};
      if (coerced.versions && typeof coerced.versions === 'object') {
        for (const name of Object.keys(coerced.versions)) {
          const v = coerced.versions[name];
          // Versions can be in v1 (with .tournament) or legacy v2 (with .games) shape
          let vt = null;
          if (v && v.tournament && hasValidShape(v.tournament)) vt = v.tournament;
          else if (v && Array.isArray(v.games)) {
            const m = migrateV2ToV3({ games: v.games });
            if (m && hasValidShape(m)) vt = m;
          }
          if (vt) importedVersions[name] = { tournament: vt, included: v.included || defaultIncluded(vt.games.length), savedAt: v.savedAt || new Date().toISOString() };
        }
      }
      const importedCount = Object.keys(importedVersions).length;
      const hasVer = importedCount > 0;
      const unknownsPart = importUnknowns.length
        ? '\n\nImported plan references unknown players: ' + importUnknowns.join(', ') + '. Resolve in Plans then Roster after loading.'
        : '';
      if (!confirm('Replace current plan' + (hasVer ? (' AND import ' + importedCount + ' version(s)?') : '?') + unknownsPart)) return;
      tournament = coerced.t;
      included = _normalizeIncluded(coerced.included, tournament.games.length);
      currentVersionName = typeof coerced.currentVersionName === 'string' ? coerced.currentVersionName : null;
      if (activeGame >= tournament.games.length) activeGame = 0;
      if (hasVer) {
        const merged = Object.assign({}, loadVersions(), importedVersions);
        saveVersionsMap(merged);
      }
      saveAll(); pushHistory(); renderActiveTab(); refreshStateBanner();
    } catch (err) { alert('Parse error: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
});
async function shareUrl() {
  const snapshot = { formatVersion: 1, kind: 'matchops-planner-share', tournament, included };
  try {
    const str = JSON.stringify(snapshot);
    const b64 = btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const url = location.origin + location.pathname + '#plan=' + b64;
    if (navigator.clipboard) await navigator.clipboard.writeText(url);

function resetPlan() {

/* Try importing from URL hash on load */
(function tryImportFromHash() {
  const m = location.hash.match(/#plan=([A-Za-z0-9_\-]+)/);
  if (!m) return;
  try {
    const b64 = m[1].replace(/-/g,'+').replace(/_/g,'/') + '='.repeat((4 - m[1].length % 4) % 4);
    const str = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(str);
    const coerced = _coerceImportToTournament(data);
    if (!coerced || !validateGamesShape(coerced.t)) return; // reject silently
    if (confirm('A shared plan is in the URL. Load it?')) {
      tournament = coerced.t;
      included = _normalizeIncluded(coerced.included, tournament.games.length);
      currentVersionName = null;
      if (activeGame >= tournament.games.length) activeGame = 0;
      saveAll(); pushHistory();
    }
    if (window.history && window.history.replaceState) window.history.replaceState(null, '', location.pathname);
  } catch (e) {}
})();

/* ══════════════════ Drag & tap handlers ══════════════════ */
let dragSource = null;
function onDragStart(e) {
  const s = e.currentTarget;
  dragSource = {
    game: s.dataset.game,
    role: s.dataset.role,
    startSec: parseInt(s.dataset.start, 10) || 0,
    benchPlayer: s.dataset.role === '__BENCH__' ? (s.dataset.benchPlayer || '') : undefined,
  };
  e.dataTransfer.effectAllowed = 'move';
  s.style.opacity = '0.4';
}
function onDragOver(e) {
  if (!dragSource) return;
  const s = e.currentTarget;
  if (s.dataset.game !== dragSource.game) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  s.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const t = e.currentTarget; t.classList.remove('drag-over');
  if (!dragSource) return;
  if (t.dataset.game !== dragSource.game) return;
  const tgtRole = t.dataset.role;
  const tgtStart = parseInt(t.dataset.start, 10) || 0;
  if (tgtRole === dragSource.role && tgtStart === dragSource.startSec) return;
  // benchPlayer override: read from whichever endpoint is the bench chip.
  const tgtBenchPlayer = tgtRole === '__BENCH__' ? (t.dataset.benchPlayer || '') : undefined;
  const benchOverride = dragSource.benchPlayer || tgtBenchPlayer;
  performSwap(parseInt(dragSource.game,10), dragSource.role, dragSource.startSec, tgtRole, tgtStart, benchOverride);
}
function onDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
  dragSource = null;
}
function onChipClick(e) {
  const s = e.currentTarget;
  const gIdx = parseInt(s.dataset.game, 10);
  const role = s.dataset.role;
  const startSec = parseInt(s.dataset.start, 10) || 0;
  const benchPlayer = role === '__BENCH__' ? (s.dataset.benchPlayer || '') : undefined;
  const player = role === '__BENCH__'
    ? benchPlayer
    : _segmentPlayer(tournament.games[gIdx], role, startSec);
  if (!player && role !== '__BENCH__') return;

  const same = (a, b) => a && b && a.game === b.game && a.role === b.role && a.startSec === b.startSec
    && a.benchPlayer === b.benchPlayer;
  const cur = { game: gIdx, role, startSec, benchPlayer };
  if (!tapSelected) { tapSelected = cur; renderGameDetail(); return; }
  if (same(tapSelected, cur)) { tapSelected = null; renderGameDetail(); return; }
  if (tapSelected.game !== gIdx) { tapSelected = cur; renderGameDetail(); return; }

  const src = tapSelected;
  tapSelected = null;
  performSwap(gIdx, src.role, src.startSec, role, startSec, src.benchPlayer);
}

let _sheetReturnFocus = null;
function openSheet(title, sub, actions, opts) {
  opts = opts || {};
  const wasOpen = isSheetOpen();
  _sheetReturnFocus = (document.activeElement instanceof HTMLElement) ? document.activeElement : null;
  document.getElementById('sheet-title').textContent = title;
  document.getElementById('sheet-sub').textContent = sub || '';
  const body = document.getElementById('sheet-body');
  body.innerHTML = opts.bodyHtml || '';
  if (opts.onBodyMount) opts.onBodyMount(body);
  const actionsBox = document.getElementById('sheet-actions');
  actionsBox.innerHTML = '';
  (actions || []).forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn' + (a.variant ? ' ' + a.variant : '');
    b.textContent = a.label;
    b.addEventListener('click', () => { closeSheet(); setTimeout(a.onClick, 160); });
    actionsBox.appendChild(b);
  });
  document.getElementById('sheet-backdrop').classList.add('open');
  const sheet = document.getElementById('bottom-sheet');
  sheet.classList.add('open');
  // Lock body scroll so the page behind doesn't move when the sheet's
  // own scrolling reaches its edge (or when the user wheels on the
  // backdrop). Skip if already open (e.g. one openSheet replacing another).
  if (!wasOpen) lockBodyScroll();
  setTimeout(() => {
    const first = sheet.querySelector('input, select, textarea, button:not([disabled])');
    (first || sheet).focus();
  }, 60);
}
function closeSheet() {
  const wasOpen = isSheetOpen();
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
  if (wasOpen) unlockBodyScroll();
  const r = _sheetReturnFocus; _sheetReturnFocus = null;
  if (r && document.body.contains(r)) {
    setTimeout(() => { try { r.focus(); } catch (_) {} }, 60);
  }
}
function isSheetOpen() {
  return document.getElementById('bottom-sheet').classList.contains('open');
}
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
document.addEventListener('keydown', (e) => {

/* Shared sheet builder used by both the planning-grid chip and the detail-view
   timeline segment. Reuses the same actions: Track, Add sub at minute, Remove. */
function openSegmentSheet(gIdx, role, startSec, isBench, benchPlayer) {
  const g = tournament.games[gIdx];
  if (!g) return;
  const player = isBench ? (benchPlayer || '') : _segmentPlayer(g, role, startSec);
  if (!player) return;

  const actions = [];
  actions.push({
    label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
    onClick: () => { toggleHighlight(player); renderActiveTab(); if (detailGameIdx >= 0) renderDetailModal(); }
  });

  if (!isBench) {
    const segs = getCellSegments(g, role);
    const seg = segs.find(s => s.startSec === startSec) || segs[0];

    actions.push({
      label: 'Add sub at minute…', variant: 'primary',
      onClick: () => openAddSubSheet(gIdx, role, seg)
    });

    if (startSec > 0) {
      const sub = (g.scheduledSubs || []).find(s => s.role === role && s.timeSec === startSec);
      if (sub) {
        const subMin = Math.round(sub.timeSec / 60 * 2) / 2;
        const subMinStr = subMin % 1 === 0 ? String(subMin) : subMin.toFixed(1);
        actions.push({
          label: 'Move sub to minute…',
          onClick: () => openMoveSubSheet(gIdx, role, sub)
        });
        actions.push({
          label: 'Replace incoming player…',
          onClick: () => openReplacePlayerSheet(gIdx, role, sub)
        });
        const subLabel = 'Remove sub at ' + subMinStr + "' (" + (sub.outPlayer || '?') + ' → ' + (sub.inPlayer || '?') + ')';
        actions.push({ label: subLabel, variant: 'danger', onClick: () => { removeSub(gIdx, sub.id); } });
      }
    }
  }

  const subLine = isBench
    ? 'Bench at kickoff'
    : ('Position: ' + role + (startSec > 0 ? (' · from ' + Math.round(startSec / 60) + "'") : ' · from kickoff'));
  openSheet(player, subLine, actions);
}
function openChipSheet(slot) {

  const role = slot.dataset.role;
  const startSec = parseInt(slot.dataset.start, 10) || 0;

/* Move an existing sub to a different minute. The new time must sit strictly
   between the previous and next sub at the same role (so the sub list remains
   ordered without renaming "first half" or "second half" semantics). */
function openMoveSubSheet(gameIdx, role, sub) {
  const g = tournament.games[gameIdx];
  if (!g) return;
  const durationMin = gameTotalMin(g);
  const otherSubs = (g.scheduledSubs || []).filter(s => s.role === role && s.id !== sub.id);
  const earlier = otherSubs.filter(s => s.timeSec < sub.timeSec).sort((a, b) => b.timeSec - a.timeSec);
  const later = otherSubs.filter(s => s.timeSec > sub.timeSec).sort((a, b) => a.timeSec - b.timeSec);
  const prevSec = earlier.length > 0 ? earlier[0].timeSec : 0;
  const nextSec = later.length > 0 ? later[0].timeSec : durationMin * 60;
  const minLow = Math.ceil((prevSec / 60 + 0.5) * 2) / 2;
  const minHigh = Math.floor((nextSec / 60 - 0.5) * 2) / 2;
  const currentMin = Math.round(sub.timeSec / 60 * 2) / 2;

  const titleText = 'Move sub at ' + role;
  const subText = (sub.outPlayer || '?') + ' → ' + (sub.inPlayer || '?');

  const renderForm = (host) => {
    host.innerHTML = '';
    const minRow = document.createElement('div');
    minRow.className = 'sheet-min-row';
    const labelEl = document.createElement('label');
    labelEl.htmlFor = 'move-min';
    labelEl.textContent = 'Minute';
    const minInput = document.createElement('input');
    minInput.type = 'number';
    minInput.id = 'move-min';
    minInput.min = String(minLow);
    minInput.max = String(minHigh);
    minInput.step = '0.5';
    minInput.value = String(currentMin);
    minRow.appendChild(labelEl);
    minRow.appendChild(minInput);
    host.appendChild(minRow);

    const hint = document.createElement('div');
    hint.className = 'sheet-section-label';
    hint.textContent = "Allowed range: " + minLow + "'–" + minHigh + "'";
    host.appendChild(hint);
  };

  openSheet(titleText, subText, [
    { label: 'Cancel', onClick: () => {} },
    {
      label: 'Move', variant: 'primary',
      onClick: () => {
        const inputEl = document.getElementById('move-min');
        if (!inputEl) return;
        const m = parseFloat(inputEl.value);
        if (!isFinite(m) || m < minLow || m > minHigh) {
          alert("Minute must be between " + minLow + " and " + minHigh + ".");
          return;
        }
        sub.timeSec = Math.round(m * 60);
        if (Array.isArray(g.scheduledSubs)) {
          g.scheduledSubs.sort((a, b) => a.role.localeCompare(b.role) || a.timeSec - b.timeSec);
        }
        saveAll(); pushHistory(); _rerenderAfterMutate();
      }
    }
  ], {
    onBodyMount: (host) => renderForm(host)
  });
}

/* Swap the inPlayer of an existing sub with a different bench player at that
   same minute (no time change). */
function openReplacePlayerSheet(gameIdx, role, sub) {
  const g = tournament.games[gameIdx];
  if (!g) return;
  const benchAtTime = benchAtSec(g, sub.timeSec);
  const candidates = benchAtTime.filter(p => p !== sub.inPlayer);
  const subMin = Math.round(sub.timeSec / 60 * 2) / 2;
  const subMinStr = subMin % 1 === 0 ? String(subMin) : subMin.toFixed(1);

  const titleText = 'Replace ' + (sub.inPlayer || '?');
  const subText = "At " + subMinStr + "' (position " + role + ")";

  const renderForm = (host) => {
    host.innerHTML = '';
    const sectionLabel = document.createElement('div');
    sectionLabel.className = 'sheet-section-label';
    sectionLabel.textContent = candidates.length === 0
      ? 'No other bench players available at this minute.'
      : 'Tap a player to swap in instead:';
    host.appendChild(sectionLabel);

    const grid = document.createElement('div');
    grid.className = 'sheet-bench-grid';
    candidates.forEach(p => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn sheet-bench-chip';
      btn.textContent = p;
      btn.addEventListener('click', () => {
        if (wouldCauseDoublePosition(g, role, sub.timeSec, p)) {

          return;
        }
        sub.inPlayer = p;
        saveAll(); pushHistory(); _rerenderAfterMutate();
        closeSheet();
      });
      grid.appendChild(btn);
    });
    host.appendChild(grid);
  };

  openSheet(titleText, subText, [
    { label: 'Cancel', onClick: () => {} }
  ], {
    onBodyMount: (host) => renderForm(host)
  });
}

/* Inline form: pick minute + bench player without nested prompts. */
function openAddSubSheet(gameIdx, role, seg) {
  const g = tournament.games[gameIdx];
  if (!g) return;
  const segStartMin = seg.startSec / 60;
  const segEndMin = seg.endSec / 60;
  const halfMin = gameHalfTimeMin(g);
  const defaultMin = (halfMin > segStartMin && halfMin < segEndMin)
    ? halfMin
    : Math.round((segStartMin + segEndMin) / 2 * 2) / 2;
  const minLow = Math.ceil((segStartMin + 0.5) * 2) / 2;
  const minHigh = Math.floor((segEndMin - 0.5) * 2) / 2;

  const titleText = 'Sub at ' + role;
  const subText = 'Replaces ' + (seg.player || '—') + ' (segment ' + segStartMin.toFixed(1).replace(/\.0$/, '') + "'–" + segEndMin.toFixed(1).replace(/\.0$/, '') + "')";

  const renderForm = (host, currentMin) => {
    const minClamped = Math.max(minLow, Math.min(minHigh, currentMin));
    const benchAtThatTime = benchAtSec(g, Math.round(minClamped * 60));
    host.innerHTML = '';

    const minRow = document.createElement('div');
    minRow.className = 'sheet-min-row';
    const labelEl = document.createElement('label');
    labelEl.htmlFor = 'sub-min';
    labelEl.textContent = "Minute";
    const minInput = document.createElement('input');
    minInput.type = 'number';
    minInput.id = 'sub-min';
    minInput.min = String(minLow);
    minInput.max = String(minHigh);
    minInput.step = '0.5';
    minInput.value = String(minClamped);
    minRow.appendChild(labelEl);
    minRow.appendChild(minInput);
    host.appendChild(minRow);

    const sectionLabel = document.createElement('div');
    sectionLabel.className = 'sheet-section-label';
    sectionLabel.textContent = benchAtThatTime.length === 0
      ? 'No bench players available at this minute.'
      : 'Tap a player to bring on:';
    host.appendChild(sectionLabel);

    const grid = document.createElement('div');
    grid.className = 'sheet-bench-grid';
    benchAtThatTime.forEach(p => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn sheet-bench-chip';
      btn.textContent = p;
      btn.addEventListener('click', () => {
        const m = parseFloat(document.getElementById('sub-min').value);
        if (!isFinite(m) || m <= segStartMin || m >= segEndMin) {
          alert('Minute must be inside the current segment (' + segStartMin.toFixed(1) + '–' + segEndMin.toFixed(1) + ').');
          return;
        }
        addSubAtMinute(gameIdx, role, Math.round(m * 60), p);
        closeSheet();
      });
      grid.appendChild(btn);
    });
    host.appendChild(grid);

    minInput.addEventListener('change', () => {
      const m = parseFloat(minInput.value);
      if (isFinite(m)) renderForm(host, m);
    });
  };

  openSheet(titleText, subText, [
    { label: 'Cancel', onClick: () => {} }
  ], {
    onBodyMount: (host) => renderForm(host, defaultMin)
  });
}

    if (!confirm('Switching to formation "' + newF.name + '" will reset role assignments to defaults for any role that does not exist in the new formation. Continue?')) {
      e.target.value = tournament.formationId;
      return;
    }
    const newRoleNames = new Set(newF.roles.map(r => r.name));
    for (const g of tournament.games) {
      const newXI = {};
      const usedPlayers = new Set();
      for (const rname of newRoleNames) {
        const carry = (g.startingXI[rname] && newRoleNames.has(rname)) ? g.startingXI[rname] : '';
        if (carry) { newXI[rname] = carry; usedPlayers.add(carry); }
      }
      // Fill empty roles with first available roster players (alphabetical, deterministic).
      const roster = PLAYERS.slice();
      for (const rname of newRoleNames) {
        if (!newXI[rname]) {
          const next = roster.find(p => !usedPlayers.has(p));
          if (next) { newXI[rname] = next; usedPlayers.add(next); }
          else newXI[rname] = '';
        }
      }
      g.startingXI = newXI;
      g.scheduledSubs = (g.scheduledSubs || []).filter(s => newRoleNames.has(s.role));
    }
    tournament.formationId = newId;
    saveAll(); pushHistory(); renderActiveTab();
  });
  view.querySelectorAll('a[data-jump="plans"]').forEach(a => {
    a.addEventListener('click', (e) => { e.preventDefault(); setTab('plans'); });
  });
  // Keep tournament.rosterSize in sync (used by fair-share math).
  tournament.rosterSize = PLAYERS.length;
  view.querySelectorAll('.settings-game-row').forEach(row => {
    const idx = parseInt(row.dataset.gameRow, 10);
    const applyPeriods = (g) => {
      const periodsSel = row.querySelector('[data-f="periods"]');
      const lenInp = row.querySelector('[data-f="periodLen"]');
      const periods = parseInt(periodsSel.value, 10) === 2 ? 2 : 1;
      const len = parseFloat(lenInp.value);
      if (!isFinite(len) || len <= 0) return false;
      setGamePeriodModel(g, periods, len);
      // Drop subs that fall outside the new total duration.
      const totalSec = gameTotalSec(g);
      g.scheduledSubs = (g.scheduledSubs || []).filter(s => s.timeSec > 0 && s.timeSec < totalSec);
      return true;
    };
    row.querySelectorAll('input[data-f], select[data-f]').forEach(inp => {
      inp.addEventListener('change', () => {
        const g = tournament.games[idx];
        if (!g) return;
        const f = inp.dataset.f;
        if (f === 'periods' || f === 'periodLen') {
          applyPeriods(g);
        } else {
          g[f] = inp.value.trim();
        }
        saveAll(); pushHistory(); renderActiveTab();
      });
    });
    const del = row.querySelector('[data-del-game]');
    if (del) del.addEventListener('click', () => {
      if (tournament.games.length <= 1) { alert('At least one game is required.'); return; }
      if (!confirm('Delete game ' + (idx + 1) + '?')) return;
      tournament.games.splice(idx, 1);
      included.splice(idx, 1);
      if (activeGame >= tournament.games.length) activeGame = Math.max(0, tournament.games.length - 1);
      saveAll(); pushHistory(); renderActiveTab();
    });
    const dup = row.querySelector('[data-dup-game]');
    if (dup) dup.addEventListener('click', () => {
      const src = tournament.games[idx];
      if (!src) return;
      const clone = JSON.parse(JSON.stringify(src));
      clone.id = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      clone.label = 'Game ' + (tournament.games.length + 1);
      clone.opponent = 'TBD';
      clone.time = 'TBD';
      // Fresh sub IDs so the clone's history is independent.
      if (Array.isArray(clone.scheduledSubs)) {
        clone.scheduledSubs.forEach(s => { s.id = newSubId(); });
      }
      tournament.games.splice(idx + 1, 0, clone);
      included.splice(idx + 1, 0, true);
      saveAll(); pushHistory(); renderActiveTab();
    });
  });
  const addBtn = document.getElementById('set-add-game');
  if (addBtn) addBtn.addEventListener('click', () => {
    const fId = tournament.formationId;
    const f = getFormation(fId);
    const xi = {};
    const used = new Set();
    for (const r of f.roles) {
      const next = PLAYERS.find(p => !used.has(p));
      xi[r.name] = next || '';
      if (next) used.add(next);
    }
    tournament.games.push({
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      label: 'Game ' + (tournament.games.length + 1),
      opponent: 'TBD', time: 'TBD', field: '',
      numberOfPeriods: 2, periodDurationMinutes: 12.5,
      durationMin: 25, halfTimeMin: 12.5,
      startingXI: xi, scheduledSubs: []
    });
    included.push(true);
    saveAll(); pushHistory(); renderActiveTab();
  });
  const fsBtn = document.getElementById('set-fairshare');
  if (fsBtn) fsBtn.addEventListener('click', () => {
    const includedCount = included.filter(Boolean).length;
    if (includedCount === 0) { alert('No games are included. Toggle game inclusion in the ribbon (Games tab) first.'); return; }
    if (!confirm('Rebuild starting XI + half-time subs across ' + includedCount + ' included game(s) to balance minutes? Existing subs will be replaced. Use Undo to roll back.')) return;
    suggestFairShareLineup();
  });
}

/* Greedy fair-share balancer: rebuild startingXI + half-time subs across all
   included games so that total minutes are roughly even per player. Iterates
   games in order, picking the lowest-accumulated-minutes players for each
   game's starting XI, and (for 2-period games) swapping the highest-used
   field players for the lowest-used bench players at half-time. */
/* Role-aware fair-share balancer.
 *
 * Strategy:
 *   1. For each included game, sort players ascending by accumulated minutes
 *      (PRIORITY tiebreak — priority players prefer to be on the field on
 *      a tie). The most under-played players become this game's full-gamers.
 *   2. Assign roles in priority order: PRESERVED roles (GK, defenders,
 *      defensive/attacking central mids) get the lowest-minute players —
 *      they play the full game. PREFERRED roles (wingers, strikers,
 *      flank-runners) get the next batch — they're the half-game players
 *      and will be subbed off at half-time.
 *   3. K = min(bench size, number of preferred roles). For each of the K
 *      most-preferred-to-sub roles, schedule a half-time sub: the
 *      first-half player goes off, the next bench player (lowest minutes
 *      so far) comes on.
 *   4. GK is never subbed by default. If there are no preferred roles
 *      (e.g. small-sided 5v5 where the user said all roles are equal),
 *      fall back to subbing in any subbable role except GK.
 */
function suggestFairShareLineup() {
  const formation = getFormation(tournament.formationId);
  if (!formation) return;
  const onFieldCount = formation.roles.length;
  if (PLAYERS.length < onFieldCount) {
    alert('Roster has only ' + PLAYERS.length + ' player(s) but formation needs ' + onFieldCount + '. Add players first.');
    return;
  }
  // Reset all included games up front; walk forward and accumulate as we go.
  for (let gi = 0; gi < tournament.games.length; gi++) {
    if (!included[gi]) continue;
    const g = tournament.games[gi];
    g.scheduledSubs = [];
    for (const r of formation.roles) g.startingXI[r.name] = '';
  }
  const acc = new Map(PLAYERS.map(p => [p, 0]));
  const cmpField = (a, b) => {
    const da = acc.get(a) - acc.get(b);
    if (da !== 0) return da;
    const aPrio = PRIORITY.has(a), bPrio = PRIORITY.has(b);
    if (aPrio !== bPrio) return aPrio ? -1 : 1;
    return a.localeCompare(b);
  };

  // Roles ranked for *assignment* (preserved before preferred so under-played
  // players land in full-game roles).
  const rolesForAssignment = formation.roles.slice().sort((a, b) => {
    const rank = (r) => r.sub === 'never' ? 0 : (r.sub === 'preserved' ? 1 : 2);
    return rank(a) - rank(b);
  });
  // Roles ranked for *subbing* (preferred first; preserved as fallback when
  // bench is bigger than preferred-role count). GK ('never') never subbed.
  const subbableInOrder = formation.roles.filter(r => r.sub !== 'never').slice().sort((a, b) => {
    const rank = (r) => r.sub === 'preferred' ? 0 : 1;
    return rank(a) - rank(b);
  });

  for (let gi = 0; gi < tournament.games.length; gi++) {
    if (!included[gi]) continue;
    const g = tournament.games[gi];
    const halfSec = gameHalfTimeSec(g);
    const np = gameNumberOfPeriods(g);
    const sortedAsc = PLAYERS.slice().sort(cmpField);

    // Starting XI: onFieldCount lowest-min players. Assigned in role-priority
    // order so preserved roles get the lowest-min (= fullgamers).
    const fieldPlayers = sortedAsc.slice(0, onFieldCount);
    const benchPlayers = sortedAsc.slice(onFieldCount);
    rolesForAssignment.forEach((r, i) => {
      g.startingXI[r.name] = fieldPlayers[i] || '';
    });

    if (np === 2 && halfSec > 0 && benchPlayers.length > 0 && subbableInOrder.length > 0) {
      const benchByLeast = benchPlayers.slice().sort((a, b) => acc.get(a) - acc.get(b));
      const K = Math.min(benchByLeast.length, subbableInOrder.length);
      for (let k = 0; k < K; k++) {
        const role = subbableInOrder[k];
        const off = g.startingXI[role.name];
        const on = benchByLeast[k];
        if (!off || !on || off === on) continue;
        if (wouldCauseDoublePosition(g, role.name, halfSec, on)) continue;
        g.scheduledSubs.push({
          id: newSubId(),
          role: role.name, timeSec: halfSec,
          outPlayer: off, inPlayer: on,
        });
      }
      g.scheduledSubs.sort((a, b) => a.role.localeCompare(b.role) || a.timeSec - b.timeSec);
    }

    // Update accumulator with this game's actual minutes (post-subs).
    for (const r of formation.roles) {
      for (const seg of getCellSegments(g, r.name)) {
        if (seg.player) acc.set(seg.player, (acc.get(seg.player) || 0) + (seg.endSec - seg.startSec));
      }
    }
  }
  saveAll(); pushHistory(); _rerenderAfterMutate();
}

/* ══════════════════ Detail view modal (per-game pitch + scrubber + timeline) ══════════════════ */
/* Body-scroll lock with refcount, so nested overlays (sheet opened from
   within a modal) don't fight each other on close. Captures scrollY and
   pins the body via position:fixed; restores both on the last unlock. */
let _scrollLockY = 0;
let _scrollLockCount = 0;
function lockBodyScroll() {
  if (_scrollLockCount === 0) {
    _scrollLockY = window.scrollY || window.pageYOffset || 0;
    document.body.style.position = 'fixed';
    document.body.style.top = '-' + _scrollLockY + 'px';
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
  }
  _scrollLockCount++;
}
function unlockBodyScroll() {
  _scrollLockCount = Math.max(0, _scrollLockCount - 1);
  if (_scrollLockCount === 0) {
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    window.scrollTo(0, _scrollLockY);
  }
}

function openDetailModal(gIdx) {
  detailGameIdx = gIdx;
  detailScrubSec = 0;
  document.getElementById('detail-overlay').classList.add('open');
  lockBodyScroll();
  renderDetailModal();
}
function closeDetailModal() {
  if (detailGameIdx < 0) return; // already closed; don't unlock twice
  detailGameIdx = -1;
  document.getElementById('detail-overlay').classList.remove('open');
  unlockBodyScroll();
}

/* Football-style time format: "12'" for whole minutes, "12'30\"" with seconds. */
function formatGameTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  if (s === 0) return m + "'";
  return m + "'" + String(s).padStart(2, '0') + '"';
}
/* Group formation roles into football tiers using relY zones — matches
   MatchOps-Local's positionLabels.ts thresholds. Returns { GK, DEF, MID, ATT }
   each with the roles that fall into that band. */
function groupRolesByTier(roles) {
  const tiers = { GK: [], DEF: [], MID: [], ATT: [] };
  for (const r of roles) {
    if (r.name === 'GK' || r.relY >= 0.90) tiers.GK.push(r);
    else if (r.relY >= 0.65) tiers.DEF.push(r);
    else if (r.relY >= 0.40) tiers.MID.push(r);
    else tiers.ATT.push(r);
  }
  return tiers;
}
/* Bench composition over time — produces segments between every change point
   (each sub time + kickoff + game end). Each segment lists the bench at the
   START of its interval (constant within the interval since no subs fire mid-segment). */
function getBenchTimeline(g) {
  const durationSec = gameTotalSec(g);
  const points = new Set([0, durationSec]);
  for (const s of (g.scheduledSubs || [])) {
    if (typeof s.timeSec === 'number' && s.timeSec > 0 && s.timeSec < durationSec) {
      points.add(s.timeSec);
    }
  }
  const sorted = [...points].sort((a, b) => a - b);
  const segs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const startSec = sorted[i];
    const endSec = sorted[i + 1];
    if (endSec <= startSec) continue;
    segs.push({ startSec, endSec, bench: benchAtSec(g, startSec) });
  }
  return segs;
}
/* Sorted, deduped list of "interesting times" the scrubber can snap to:
   kickoff, every sub time, half-time, end of game. Used by ‹ / › step buttons. */
function gameInterestingTimes(g) {
  const set = new Set([0, gameTotalSec(g)]);
  const half = gameHalfTimeSec(g);
  if (half > 0) set.add(half);
  for (const s of (g.scheduledSubs || [])) {
    if (typeof s.timeSec === 'number' && s.timeSec > 0) set.add(s.timeSec);
  }
  return [...set].sort((a, b) => a - b);
}

function renderDetailModal() {
  if (detailGameIdx < 0) return;
  const g = tournament.games[detailGameIdx];
  if (!g) { closeDetailModal(); return; }
  const formation = getFormation(tournament.formationId);
  const durationSec = gameTotalSec(g);
  const halfSec = gameHalfTimeSec(g);
  const sec = Math.max(0, Math.min(durationSec, detailScrubSec || 0));

  document.getElementById('detail-title').textContent =
    (g.label || ('Game ' + (detailGameIdx + 1))) + ' · ' + (tournament.teamName || '') + ' vs ' + (g.opponent || 'TBD');
  document.getElementById('detail-sub').textContent =
    formation.name + ' · ' + gameTotalMin(g) + " min" + (halfSec ? (' · half-time at ' + formatGameTime(halfSec)) : '');

  const body = document.getElementById('detail-body');
  let html = '';

  // Pitch — discs colour-coded by playerRatio + highlight propagation
  const field = fieldAtSec(g, sec);
  const anyHi = anyHighlightActive();
  html += '<div class="detail-pitch-wrap" id="dt-pitch">';
  for (const role of formation.roles) {
    const player = field[role.name] || '';
    const left = (role.relX * 100).toFixed(2) + '%';
    const top = (role.relY * 100).toFixed(2) + '%';
    const r = player ? playerRatio(player) : null;
    const c = ratioColors(r);
    const hl = isHighlighted(player);
    const dim = anyHi && player && !hl;
    const cls = 'detail-disc' + (hl ? ' highlighted' : '') + (dim ? ' dimmed' : '');
    html += '<div class="' + cls + '" data-disc-player="' + escapeHtml(player) + '" ' +
              'style="left:' + left + ';top:' + top + ';--disc-bg:' + c.bg + ';--disc-fg:' + c.fg + ';">' +
              '<span class="dd-role">' + escapeHtml(role.name) + '</span>' +
              '<span class="dd-name">' + escapeHtml(player) + '</span>' +
            '</div>';
  }
  html += '</div>';

  // Scrubber with ‹ / › step buttons. Snap points = kickoff, sub times, half-time, end.
  html += '<div class="detail-scrubber">';
  html +=   '<button type="button" class="dt-step-btn" id="dt-prev" title="Previous interest point" aria-label="Previous">‹</button>';
  html +=   '<input type="range" id="dt-scrub" min="0" max="' + durationSec + '" step="1" value="' + sec + '">';
  html +=   '<button type="button" class="dt-step-btn" id="dt-next" title="Next interest point" aria-label="Next">›</button>';
  html +=   '<span class="dt-time">' + formatGameTime(sec) + '</span>';
  html += '</div>';

  // Timeline strip — tier-grouped (ATT / MID / DEF / GK / BENCH from top down)
  // so the order matches the pitch above.
  const tiers = groupRolesByTier(formation.roles);
  const tierOrder = ['ATT', 'MID', 'DEF', 'GK'];
  html += '<div class="detail-timeline">';
  html +=   '<h4>Timeline</h4>';
  for (const tierKey of tierOrder) {
    if (!tiers[tierKey].length) continue;
    html += '<div class="dt-tier-label">' + tierKey + '</div>';
    for (const role of tiers[tierKey]) {
      html += renderDetailTrackRow(g, role.name, durationSec, halfSec, sec);
    }
  }
  // Bench row at the bottom — answers "who's available off the bench right now?"
  html += '<div class="dt-tier-label">BENCH</div>';
  html += renderDetailBenchRow(g, durationSec, halfSec, sec);
  html += '</div>';

  body.innerHTML = html;

  // Scrubber input — drag to scrub
  const scrub = document.getElementById('dt-scrub');
  if (scrub) {
    scrub.addEventListener('input', (e) => {
      detailScrubSec = parseInt(e.target.value, 10) || 0;
      renderDetailModal();
    });
  }
  // Prev / next snap buttons
  const times = gameInterestingTimes(g);
  document.getElementById('dt-prev').addEventListener('click', () => {
    let prev = times[0];
    for (const t of times) { if (t < sec) prev = t; }
    detailScrubSec = prev;
    renderDetailModal();
  });
  document.getElementById('dt-next').addEventListener('click', () => {
    let next = times[times.length - 1];
    for (let i = times.length - 1; i >= 0; i--) { if (times[i] > sec) next = times[i]; }
    detailScrubSec = next;
    renderDetailModal();
  });
  // Click a disc — highlight that player across all views (totals strip + timeline).
  body.querySelectorAll('.detail-disc').forEach(disc => {
    disc.addEventListener('click', () => {
      const p = disc.dataset.discPlayer;
      if (!p) return;
      toggleHighlight(p);
      renderActiveTab();
      renderDetailModal();
    });
  });
  // Tap a timeline segment → segment sheet (per-segment actions).
  body.querySelectorAll('.dt-seg[data-role]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const role = el.dataset.role;
      const startSec = parseInt(el.dataset.start, 10) || 0;
      openSegmentSheet(detailGameIdx, role, startSec, false, '');
    });
  });
  // Tap empty track area → opens the segment sheet for whichever segment that
  // minute falls inside (giving you Add sub at minute… with the right range).
  body.querySelectorAll('.dt-track').forEach(track => {
    track.addEventListener('click', (e) => {
      const rect = track.getBoundingClientRect();
      if (rect.width <= 0) return;
      const x = (e.clientX - rect.left) / rect.width;
      const tappedSec = Math.max(0, Math.min(durationSec - 1, Math.round(x * durationSec)));
      const labelEl = track.parentElement && track.parentElement.querySelector('.dt-track-label');
      if (!labelEl) return;
      const roleName = labelEl.textContent.trim();
      if (roleName === 'BENCH') {
        // Tap the bench row → not directly meaningful; ignore.
        return;
      }
      const role = formation.roles.find(r => r.name === roleName);
      if (!role) return;
      const segs = getCellSegments(g, role.name);
      const seg = segs.find(s => tappedSec >= s.startSec && tappedSec < s.endSec) || segs[0];
      openSegmentSheet(detailGameIdx, role.name, seg.startSec, false, '');
    });
  });
}

/* Render one role's timeline row (one segment per played interval). */
function renderDetailTrackRow(g, role, durationSec, halfSec, scrubSec) {
  const segs = getCellSegments(g, role);
  const anyHi = anyHighlightActive();
  let html = '<div class="dt-track-row"><span class="dt-track-label">' + escapeHtml(role) + '</span><div class="dt-track">';
  for (const seg of segs) {
    const left = (seg.startSec / durationSec * 100).toFixed(2) + '%';
    const w = ((seg.endSec - seg.startSec) / durationSec * 100).toFixed(2) + '%';
    const sub = seg.segIdx > 0 ? ' data-seg="sub"' : '';
    const segMin = (seg.endSec - seg.startSec) / 60;
    const tot = seg.player ? Math.round(playerTotalSec(seg.player) / 60) : 0;
    const hl = isHighlighted(seg.player);
    const dim = anyHi && seg.player && !hl;
    const segCls = 'dt-seg' + (hl ? ' dt-seg-hl' : '') + (dim ? ' dt-seg-dim' : '');
    // Show tournament total minutes inside the segment when there's room.
    const showTotal = segMin >= 4 && seg.player;
    const segText = seg.player ? (escapeHtml(seg.player) + (showTotal ? (' · ' + tot + "'") : '')) : '';
    html += '<div class="' + segCls + '" data-role="' + escapeHtml(role) + '" data-start="' + seg.startSec + '" ' +
            'style="left:' + left + ';width:' + w + ';"' + sub + '>' + segText + '</div>';
  }
  if (halfSec > 0) {
    const hLeft = (halfSec / durationSec * 100).toFixed(2) + '%';
    html += '<div class="dt-half" style="left:' + hLeft + ';"></div>';
  }
  const pinLeft = (scrubSec / durationSec * 100).toFixed(2) + '%';
  html += '<div class="dt-pin" style="left:' + pinLeft + ';"></div>';
  html += '</div></div>';
  return html;
}
function renderDetailBenchRow(g, durationSec, halfSec, scrubSec) {
  const segs = getBenchTimeline(g);
  let html = '<div class="dt-track-row"><span class="dt-track-label">BENCH</span><div class="dt-track dt-track-bench">';
  for (const seg of segs) {
    const left = (seg.startSec / durationSec * 100).toFixed(2) + '%';
    const w = ((seg.endSec - seg.startSec) / durationSec * 100).toFixed(2) + '%';
    const text = seg.bench.length === 0 ? '(none)' : seg.bench.join(', ');
    const title = 'Bench at ' + formatGameTime(seg.startSec) + ': ' + (seg.bench.join(', ') || 'empty');
    html += '<div class="dt-seg dt-seg-bench" style="left:' + left + ';width:' + w + ';" title="' + escapeHtml(title) + '">' + escapeHtml(text) + '</div>';
  }
  if (halfSec > 0) {
    const hLeft = (halfSec / durationSec * 100).toFixed(2) + '%';
    html += '<div class="dt-half" style="left:' + hLeft + ';"></div>';
  }
  const pinLeft = (scrubSec / durationSec * 100).toFixed(2) + '%';
  html += '<div class="dt-pin" style="left:' + pinLeft + ';"></div>';
  html += '</div></div>';
  return html;
}
document.getElementById('detail-close').addEventListener('click', closeDetailModal);


(function installPrompt() {
  const INSTALL_DISMISSED_KEY = 'matchops-planner-install-dismissed';
  let deferred = null;

  function isIos() {
    const ua = navigator.userAgent || '';
    return /iPad|iPhone|iPod/.test(ua) || (ua.includes('Mac') && 'ontouchend' in document);
  }
  function isStandalone() {
    return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
      || navigator.standalone === true;
  }
  function dismissed() {
    return localStorage.getItem(INSTALL_DISMISSED_KEY) === '1';
  }
  function show(text, actionLabel, onAction) {
    const banner = document.getElementById('install-banner');
    if (!banner) return;
    banner.querySelector('.install-text').textContent = text;
    const btn = banner.querySelector('.install-action');
    btn.textContent = actionLabel;
    btn.onclick = onAction;
    banner.hidden = false;
  }
  function hide() {
    const banner = document.getElementById('install-banner');
    if (banner) banner.hidden = true;
  }

  document.getElementById('install-dismiss').addEventListener('click', () => {
    localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
    hide();
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    if (isStandalone() || dismissed()) return;
    show('Install this planner as an app', 'Install', async () => {
      if (!deferred) return;
      deferred.prompt();
      try { await deferred.userChoice; } catch (_) {}
      deferred = null;
      hide();
    });
  });
  window.addEventListener('appinstalled', () => {
    deferred = null;
    hide();
  });

  // iOS fallback: no beforeinstallprompt exists; show a one-shot hint
  window.addEventListener('load', () => {
    if (isStandalone() || dismissed() || !isIos()) return;
    show('Add to Home Screen: Share \u2192 Add to Home Screen', 'Got it', () => {
      localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
      hide();
    });
  });
})();

/* ══════════════════ Game carousel — slide animation + swipe ══════════════════ */
function animateGameSwitch(direction) {
  // direction: 'next' → content slides in from the right;
  //            'prev' → content slides in from the left
  const el = document.getElementById('game-detail');
  if (!el) return;
  el.classList.remove('slide-from-right', 'slide-from-left');
  // force reflow so re-adding the same class restarts the animation
  void el.offsetWidth;
  el.classList.add(direction === 'next' ? 'slide-from-right' : 'slide-from-left');
}

(function attachSwipeCarousel() {
  const host = document.getElementById('game-detail');
  if (!host) return;
  let startX = 0, startY = 0, startT = 0, tracking = false;
  host.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    tracking = true;
  }, { passive: true });
  host.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4 && dt < 700) {
      if (dx < 0 && activeGame < tournament.games.length - 1) {
        activeGame++; tapSelected = null; renderGamesTab(); animateGameSwitch('next');
      } else if (dx > 0 && activeGame > 0) {
        activeGame--; tapSelected = null; renderGamesTab(); animateGameSwitch('prev');
      }
    }
  }, { passive: true });
})();

/* ══════════════════ Service worker ══════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      const update = () => reg.update().catch(() => {});
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') update(); });
      window.addEventListener('focus', update);
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        if (!w) return;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) w.postMessage({ type: 'SKIP_WAITING' });
        });
      });
    }).catch(() => {});
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => { if (!reloaded) { reloaded = true; location.reload(); } });
  });
}

/* ══════════════════ State-recovery banner ══════════════════ */
function showStateBanner(text, actionLabel, onAction) {
  const banner = document.getElementById('state-banner');
  if (!banner) return;
  banner.querySelector('.install-text').textContent = text;
  const btn = document.getElementById('state-banner-action');
  if (actionLabel && onAction) {
    btn.textContent = actionLabel;
    btn.onclick = onAction;
    btn.hidden = false;
  } else {
    btn.hidden = true;
  }
  banner.hidden = false;
}
function hideStateBanner() {
  const banner = document.getElementById('state-banner');
  if (banner) banner.hidden = true;
}
function refreshStateBanner() {
  const unknowns = collectUnknownPlayers(tournament);
  if (unknowns.length) {
    showStateBanner(
      'Plan references unknown players: ' + unknowns.join(', ') + '. Open Plans → Roster to resolve.',
      'Open Roster',
      () => setTab('plans')
    );
    return;
  }
  // Same-player-at-two-roles check. Can happen via tap-swap, formation switch,
  // or by editing a saved plan that pre-dates the addSubAtMinute guard.
  const dups = scanDoublePositions(tournament);
  if (dups.length) {
    const first = dups[0];
    const game = tournament.games[first.gameIdx];
    const min = Math.round(first.atSec / 60 * 2) / 2;
    const minStr = min % 1 === 0 ? String(min) : min.toFixed(1);
    showStateBanner(
      first.player + ' is at two positions (' + first.roles.join(' & ') + ') at ' + minStr + "' in " + (game.label || ('Game ' + (first.gameIdx + 1))) + (dups.length > 1 ? ' (+' + (dups.length - 1) + ' more)' : ''),
      'Open game',
      () => { activeGame = first.gameIdx; setTab('games'); }
    );
    return;
  }
  if (loadWarning) {
    showStateBanner(loadWarning.message, null, null);
    loadWarning = null;
    return;
  }
  hideStateBanner();
}
document.getElementById('state-banner-dismiss').addEventListener('click', () => {
  loadWarning = null;
  hideStateBanner();
});

/* ══════════════════ Init ══════════════════ */
renderActiveTab();
refreshStateBanner();
</script>
