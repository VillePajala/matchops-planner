<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MatchOps Planner</title>
<meta name="description" content="Tournament lineup and substitution planner.">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════ Design tokens (MatchOps family) ══════════════════ */
:root {
  --bg-base: #0f172a;
  --bg-panel: #1e293b;
  --bg-panel-soft: rgba(30,41,59,0.92);
  --bg-panel-strong: rgba(30,41,59,0.98);
  --bg-elev: rgba(51,65,85,0.7);
  --border-soft: rgba(71,85,105,0.4);
  --border: rgba(71,85,105,0.6);
  --border-strong: rgba(100,116,139,0.8);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-mute: #64748b;
  --heading: #facc15;      /* yellow-400 */
  --accent: #fbbf24;       /* amber-400 */
  --accent-strong: #f59e0b;/* amber-500 */
  --accent-deep: #d97706;  /* amber-600 */
  --primary-text-on-amber: #1e293b;
  --success: #22c55e;
  --warn: #fb923c;
  --danger: #ef4444;
  --info: #38bdf8;
  --info-strong: #0ea5e9;
  --glow-sky: rgba(56,189,248,0.08);
  --glow-indigo: rgba(99,102,241,0.08);
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-pill: 999px;
  --app-bar-h: 56px;
  --bottom-nav-h: 66px;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  background: var(--bg-base);
  overflow-x: hidden;
}
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  color: var(--text);
  background:
    radial-gradient(at 20% 10%, var(--glow-sky), transparent 55%),
    radial-gradient(at 85% 95%, var(--glow-indigo), transparent 55%),
    var(--bg-base);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font-family: inherit; }
button { border: none; background: none; color: inherit; cursor: pointer; }
* { scrollbar-width: thin; scrollbar-color: rgba(51,65,85,0.5) transparent; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background-color: rgba(51,65,85,0.5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background-color: rgba(71,85,105,0.8); }

/* ══════════════════ App shell ══════════════════ */
.app-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(var(--app-bar-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.03);
  z-index: 50;
}
.app-bar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to bottom, var(--glow-sky), transparent 50%);
}
.app-bar > * { position: relative; z-index: 1; }

.app-logo {
  width: 36px; height: 36px;
  flex-shrink: 0;
  object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.35));
}
.app-title {
  flex: 1 1 auto;
  min-width: 0;
  font-family: 'Rajdhani', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.4px;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.save-status {
  font-size: 10px; color: var(--success); font-weight: 600;
  flex-shrink: 0;
  transition: opacity 0.3s;
}
/* Plan name — plain text line under the ribbon, no pill/icon */
.plan-name {
  display: none;
  padding: 0 4px;
  margin: -4px 0 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  color: var(--text-mute);
  background: none; border: none;
  text-align: left;
  max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.plan-name.has-version { display: block; }
.plan-name:hover { color: var(--text-dim); }

/* Install-as-PWA prompt banner (browser-driven install + iOS hint) */
.install-banner {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 10px;
  padding: 10px 12px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.4);
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--text);
}
.install-banner[hidden] { display: none !important; }
.install-banner .install-text {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.install-banner .install-action {
  background: var(--accent); color: var(--primary-text-on-amber);
  border: 1px solid var(--accent);
  padding: 5px 12px; border-radius: 6px;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  cursor: pointer;
}
.install-banner .install-dismiss {
  background: transparent; color: var(--text-mute);
  padding: 2px 6px; border: none;
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  cursor: pointer;
}
@media (max-width: 420px) {
  .app-title { font-size: 17px; }
  .save-status { display: none; } /* reclaim space on narrow */
}
@media (max-width: 340px) {
  .app-title { font-size: 15px; }
}

.content {
  padding-top: calc(var(--app-bar-h) + env(safe-area-inset-top) + 12px);
  padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom) + 12px);
  padding-left: max(12px, env(safe-area-inset-left));
  padding-right: max(12px, env(safe-area-inset-right));
  min-height: 100vh; min-height: 100dvh;
}
.tab-panel { display: none; animation: fadeSlideIn 0.22s ease-out; }
.tab-panel.active { display: block; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Clip horizontal overflow only around the slide-animated panel so
   the ribbon above keeps room for its box-shadows. */
.game-detail-wrap {
  overflow: clip;
  overflow-x: clip;
  /* small side padding so shadows / outlines on inner cards aren't
     shaved by the clip box */
  padding: 0 2px;
  margin: 0 -2px;
}
#game-detail {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: translate3d(0, 0, 0);
}
/* Game-carousel slide animations (swipe or ribbon tap).
   Short, GPU-accelerated, small travel distance — no layout shift. */
#game-detail.slide-from-right {
  animation: gameSlideFromRight 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
#game-detail.slide-from-left {
  animation: gameSlideFromLeft 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  will-change: transform, opacity;
}
@keyframes gameSlideFromRight {
  from { opacity: 0.85; transform: translate3d(6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}
@keyframes gameSlideFromLeft {
  from { opacity: 0.85; transform: translate3d(-6%, 0, 0); }
  to   { opacity: 1;    transform: translate3d(0, 0, 0); }
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: max(6px, env(safe-area-inset-left));
  padding-right: max(6px, env(safe-area-inset-right));
  display: flex; align-items: stretch;
  background: linear-gradient(to top, rgba(15,23,42,0.98), rgba(30,41,59,0.95));
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.3);
}
.bottom-nav::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: rgba(99,102,241,0.06);
  mix-blend-mode: soft-light;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 6px 4px;
  color: var(--text-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color 0.15s, transform 0.15s;
  position: relative;
}
.nav-item .nav-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
}
.nav-item .nav-icon svg {
  width: 22px; height: 22px;
  stroke: currentColor; fill: none;
  stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
  content: ''; position: absolute; top: 0; left: 22%; right: 22%;
  height: 3px; border-radius: 0 0 3px 3px;
  background: linear-gradient(to right, var(--accent-strong), var(--accent));
  box-shadow: 0 0 10px var(--accent);
}
.nav-item:active { transform: scale(0.94); }

/* ══════════════════ Games tab ══════════════════ */
.ribbon {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 2px 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  margin: 0 -6px 12px;
  padding-left: 6px; padding-right: 6px;
}
.ribbon-game {
  flex: 0 0 auto; scroll-snap-align: start;
  padding: 11px 34px 11px 14px; border-radius: var(--r-md);
  background:
    linear-gradient(180deg, rgba(51,65,85,0.55) 0%, rgba(30,41,59,0.75) 55%, rgba(15,23,42,0.85) 100%);
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  display: flex; flex-direction: column; align-items: flex-start; gap: 3px;
  min-width: 144px;
  position: relative; overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 2px rgba(0,0,0,0.35);
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}
.ribbon-game::before {
  /* thin top accent bar — transparent by default, amber when active */
  content: ''; position: absolute; left: 0; right: 0; top: 0;
  height: 2px; background: transparent;
  transition: background 0.18s ease;
}
.ribbon-game::after {
  /* hairline divider between label and opp rows for a classic card look */
  content: ''; position: absolute; left: 14px; right: 34px;
  top: 28px; height: 1px;
  background: linear-gradient(to right, rgba(148,163,184,0.18), rgba(148,163,184,0.04));
  pointer-events: none;
}
.ribbon-game .ribbon-label {
  font-size: 10px; font-weight: 700; color: var(--text-mute);
  letter-spacing: 0.8px; text-transform: uppercase;
}
.ribbon-game .ribbon-opp {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-top: 4px;
}
.ribbon-game .ribbon-time {
  font-size: 10px; color: var(--text-mute); font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.ribbon-game.active {
  background:
    linear-gradient(180deg, rgba(51,65,85,0.92) 0%, rgba(30,41,59,0.95) 60%, rgba(15,23,42,0.95) 100%);
  border-color: rgba(251,191,36,0.6);
  color: var(--text);
  box-shadow:
    0 6px 18px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(251,191,36,0.18),
    inset 0 0 0 1px rgba(251,191,36,0.08);
}
.ribbon-game.active::before {
  background: linear-gradient(to right, transparent 0%, var(--accent) 18%, var(--accent) 82%, transparent 100%);
}
.ribbon-game.active::after {
  background: linear-gradient(to right, rgba(251,191,36,0.55), rgba(251,191,36,0.08));
}
.ribbon-game.active .ribbon-label { color: var(--accent); letter-spacing: 1px; }
.ribbon-game.active .ribbon-opp  { color: var(--text); }
.ribbon-game.active .ribbon-time { color: var(--text-dim); }
.ribbon-game.excluded { opacity: 0.45; }
.ribbon-game.excluded .ribbon-opp { text-decoration: line-through; text-decoration-color: rgba(148,163,184,0.55); }
.ribbon-game:active { transform: scale(0.97); }

/* Include-in-totals dot (top-right corner of each ribbon card) */
.ribbon-include {
  position: absolute; top: 8px; right: 8px;
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid rgba(148,163,184,0.5);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  z-index: 2;
}
.ribbon-include::after {
  /* enlarge tap target without moving the visible dot */
  content: ''; position: absolute; inset: -8px;
}
.ribbon-include.on {
  background: var(--success); border-color: var(--success);
  box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
}
.ribbon-include.on::before {
  content: '✓'; font-size: 10px; font-weight: 900; color: #0f172a; line-height: 1;
}

/* Game toolbar (undo/redo) — now placed AFTER the pitch card */
.game-toolbar {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  margin-bottom: 10px;
}
.game-toolbar.after-pitch {
  margin-top: 4px;
  margin-bottom: 16px;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--r-md);
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  color: var(--text-dim);
  transition: all 0.15s;
}
.icon-btn svg {
  width: 18px; height: 18px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.icon-btn:not(:disabled):hover { background: rgba(71,85,105,0.9); color: var(--text); }
.icon-btn:not(:disabled):active { transform: scale(0.94); }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Pitch card */
.pitch-card {
  background: linear-gradient(180deg, rgba(30,41,59,0.88) 0%, rgba(15,23,42,0.95) 100%);
  border: 1px solid rgba(71,85,105,0.55);
  border-radius: var(--r-lg);
  padding: 14px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
}
.pitch-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-lg);
  background:
    radial-gradient(at 15% 0%, rgba(56,189,248,0.08), transparent 40%),
    radial-gradient(at 85% 100%, rgba(251,191,36,0.05), transparent 45%);
}
.pitch-card > * { position: relative; z-index: 1; }

.pitch {
  display: flex; flex-direction: column;
  gap: 6px;
  background: linear-gradient(to bottom, #4caf50, #388e3c);
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 10px;
}
.pitch-row {
  display: flex; justify-content: center; gap: 8px;
  align-items: stretch;
}
.pos-box {
  background: rgba(0,0,0,0.18);
  border-radius: 4px;
  padding: 3px 4px 4px;
  flex: 0 0 auto;
  min-width: 92px;
  max-width: 165px;
  width: 155px;
}

.pos-label {
  font-size: 8px; font-weight: 700;
  color: white;
  letter-spacing: 0.4px; text-transform: uppercase;
  text-align: center; margin-bottom: 2px;
}
.pos-spacer { display: none; }
.pos-name { display: inline; }

.chip-row { display: flex; gap: 2px; position: relative; min-height: 28px; }
.chip-row .ht-divider {
  position: absolute; top: -2px; bottom: -2px; width: 0;
  border-left: 1px dashed rgba(255,255,255,0.55);
  pointer-events: none;
  z-index: 3;
}

/* ─── MatchOps planner chip: simple, clear, effective ─── */
.slot {
  padding: 4px 3px 9px;
  font-size: 12px; font-weight: 500;
  text-align: center; user-select: none;
  border-radius: 3px;
  min-height: 28px; line-height: 1.2;
  flex: 1; min-width: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  position: relative;
  cursor: grab;
  background: white;
  color: #333;
  border: 1.5px solid #ccc;
  transition: transform 0.1s, border-color 0.15s;
}
.slot[data-half="h2"], .slot[data-seg="sub"] {
  background: #fff3cd;
  border-color: #ffc107;
  color: #333;
}
.slot[data-seg="full"] {
  background: #d4edda;
  border-color: #28a745;
  color: #155724;
  font-weight: 600;
}
/* Legacy data-half rules removed; full-game styling now lives on the chip-row itself. */

.slot:active { cursor: grabbing; transform: scale(0.96); }
.slot.drag-over { border-color: #2d5; background: #c8e6c9; }
.slot.tap-selected {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  z-index: 2;
}
.slot.highlighted {
  outline: 3px solid #f57c00;
  outline-offset: 2px;
  z-index: 1;
}
.slot:not(.highlighted).any-highlighted { opacity: 0.35; }

.slot.benched-both {
  background: #ffcdd2 !important;
  border-color: #c62828 !important;
  color: #b71c1c !important;
  font-weight: 700;
  box-shadow: 0 0 0 1px #c62828 inset;
}
.slot.plays-both { box-shadow: inset 0 0 0 2px #c62828; }

/* per-chip minute bar — thin, unobtrusive */
.chip-min-bar {
  position: absolute; bottom: 2px; left: 3px; right: 3px;
  height: 2px; border-radius: 1px;
  background: rgba(0,0,0,0.12);
  overflow: hidden;
  z-index: 1;
}
.chip-min-fill {
  height: 100%; border-radius: 1px;
  background: hsl(var(--chip-hue, 60), 65%, 40%);
  width: var(--chip-ratio, 0%);
}

/* Bench drawer */
.bench-drawer-toggle {
  width: 100%; padding: 11px 14px;
  background: linear-gradient(180deg, rgba(51,65,85,0.55), rgba(30,41,59,0.7));
  border: 1px solid rgba(71,85,105,0.5);
  color: var(--text-dim);
  border-radius: var(--r-md);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.bench-drawer-toggle:hover { color: var(--text); border-color: rgba(148,163,184,0.4); }
.bench-drawer-toggle .chev { transition: transform 0.2s; color: var(--accent); }
.bench-drawer-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
.bench-section {
  display: none; flex-direction: column; gap: 10px;
  margin-top: 8px; padding: 12px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border-radius: var(--r-md);
  border: 1px solid rgba(71,85,105,0.4);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.bench-section.open { display: flex; }
.bench-row .bench-label {
  font-size: 10px; color: var(--accent); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.bench-row .chip-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
/* Bench chips — light variants of the same palette (MatchOps planner) */
.bench-row .slot[data-half="h1"] {
  background: #e8e8e8;
  border-color: #bbb;
  color: #333;
}
.bench-row .slot[data-half="h2"] {
  background: #ffecb3;
  border-color: #d4a017;
  color: #333;
}
.bench-row .chip-min-bar { background: rgba(0,0,0,0.12); }

/* Mini minute bar (per-game strip) */
.game-min-strip {
  margin-top: 14px;
  padding: 12px 14px;
  background: linear-gradient(180deg, rgba(15,23,42,0.65), rgba(15,23,42,0.5));
  border: 1px solid rgba(71,85,105,0.4);
  border-radius: var(--r-md);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.game-min-strip h4 {
  margin: 0 0 10px; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  font-family: 'Rajdhani', system-ui, sans-serif;
}
.game-min-strip .strip-row {
  display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px;
}
.game-min-strip .strip-cell {
  height: 28px; border-radius: 4px; position: relative;
  background: var(--cell-bg, rgba(30,41,59,0.85));
  color: var(--cell-fg, #e2e8f0);
  border: 1px solid rgba(0,0,0,0.22);
  cursor: pointer;
  overflow: hidden;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.15s, transform 0.1s;
}
.game-min-strip .strip-cell:hover { filter: brightness(1.08); }
.game-min-strip .strip-cell:active { transform: scale(0.96); }
.game-min-strip .strip-cell.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}
.game-min-strip .strip-cell.any-highlighted:not(.highlighted) { opacity: 0.42; }
.game-min-strip .strip-cell .strip-init {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.3px;
  color: inherit;
}

/* ══════════════════ Minutes tab — quick-scan chip grid ══════════════════ */
.pt-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 720px) {
  .pt-grid { grid-template-columns: repeat(3, 1fr); }
}
.pt-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  min-height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.22);
  background: var(--pt-bg);
  color: var(--pt-fg);
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.2px;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
  transition: transform 0.1s, filter 0.15s;
}
.pt-chip:hover { filter: brightness(1.06); }
.pt-chip:active { transform: scale(0.97); }
.pt-chip .pt-name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-chip .pt-total {
  font-weight: 700; font-size: 16px;
  font-variant-numeric: tabular-nums;
  opacity: 0.92;
  flex-shrink: 0;
}
.pt-chip.prio .pt-name::after {
  content: ' ★';
  opacity: 0.55;
  font-weight: 700;
}
.pt-chip.highlighted {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  filter: brightness(1.1);
}
.pt-chip.any-highlighted:not(.highlighted) { opacity: 0.48; }
/* Focus (pane tracks this chip) = subtle bottom accent bar, not an outline,
   so a toggle-off of the highlight removes the strong amber ring and you
   can clearly see the chip is no longer selected. */
.pt-chip.focused {
  box-shadow: 0 1px 2px rgba(0,0,0,0.28),
              inset 0 1px 0 rgba(255,255,255,0.08),
              inset 0 -3px 0 var(--accent);
}

/* Focus pane — stacks one card per highlighted player (comparison mode).
   When nothing is highlighted, falls back to a single worst-off card. */
#minutes-focus {
  margin-top: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
#minutes-focus:empty { display: none; }
.focus-card {
  padding: 14px;
  background: linear-gradient(180deg, rgba(30,41,59,0.92), rgba(15,23,42,0.95));
  border: 1px solid rgba(71,85,105,0.5);
  border-top: 2px solid var(--accent);
  border-radius: var(--r-md);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  position: relative;
}
.focus-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; margin-bottom: 10px;
}
.focus-name {
  font-size: 18px; font-weight: 700;
  color: var(--text); letter-spacing: 0.3px;
  font-family: 'Rajdhani', system-ui, sans-serif;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0;
}
.focus-star { color: var(--accent); opacity: 0.85; }
.focus-total {
  font-size: 20px; font-weight: 700; color: var(--accent);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.focus-bar { margin-bottom: 12px; }
.focus-bar-track {
  height: 6px; border-radius: 3px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(71,85,105,0.5);
  overflow: hidden;
}
.focus-bar-fill {
  height: 100%; border-radius: 3px;
  background: var(--bar-bg, #38bdf8);
  width: var(--bar-w, 0%);
  transition: width 0.25s ease;
}
.focus-bar-label {
  margin-top: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  color: var(--text-mute); text-transform: uppercase;
}
.focus-games {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
  margin-bottom: 12px;
}
.focus-game {
  padding: 6px 3px 6px;
  border-radius: 5px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(71,85,105,0.5);
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-height: 66px;
  font-weight: 700;
}
.focus-game .fg-label { font-size: 9px; color: var(--text-mute); letter-spacing: 0.4px; }
.focus-game .fg-pos {
  font-size: 11px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.4px;
  font-family: 'Rajdhani', system-ui, sans-serif;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%;
}
.focus-game .fg-mins { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
.focus-game.full   { background: rgba(34,197,94,0.18);  border-color: rgba(34,197,94,0.5);  }
.focus-game.full  .fg-mins { color: #86efac; }
.focus-game.half   { background: rgba(251,191,36,0.14); border-color: rgba(251,191,36,0.45); }
.focus-game.half  .fg-mins { color: #fde68a; }
.focus-game.zero   { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.4);  }
.focus-game.zero  .fg-mins { color: #fca5a5; }
.focus-game.excluded { opacity: 0.4; text-decoration: line-through; }

.focus-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.focus-actions .btn { flex: 1; width: auto; min-width: 140px; }

/* Section title (used on tabs) */
.section-title {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 0 12px;
  font-size: 18px; font-weight: 700;
  color: var(--heading); letter-spacing: 0.5px;
}
.section-title .count { color: var(--text-dim); font-size: 13px; font-weight: 600; }

/* ══════════════════ Plans tab ══════════════════ */
.plans-section {
  display: flex; flex-direction: column; gap: 8px;
  background: linear-gradient(to bottom, var(--bg-panel-soft), rgba(15,23,42,0.85));
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: var(--shadow-md);
}
.plans-section::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: var(--r-md);
  background: linear-gradient(to bottom, var(--glow-sky), transparent 40%);
}
.plans-section > * { position: relative; z-index: 1; }
.plans-section h4 {
  margin: 0 0 4px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-mute);
}
.plans-section.danger h4 { color: #fca5a5; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 16px;
  border-radius: var(--r-md);
  font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  transition: all 0.15s ease;
  width: 100%;
}
.btn:active { transform: scale(0.97); }
.btn:hover { background: rgba(71,85,105,0.9); }
.btn.primary {
  background: linear-gradient(to bottom, var(--accent-strong), var(--accent-deep));
  color: var(--primary-text-on-amber); border-color: var(--accent);
  box-shadow: 0 2px 10px rgba(251,191,36,0.25);
}
.btn.primary:hover { background: linear-gradient(to bottom, var(--accent), var(--accent-strong)); }
.btn.danger {
  background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); color: #fca5a5;
}
.btn.danger:hover { background: rgba(239,68,68,0.25); }
/* Section-level flex-gap handles spacing; legacy .btn + .btn margin is no-op inside plans */
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; width: auto; }
.plans-section .current-plan-row { margin-bottom: 0; }

.current-plan-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; margin-bottom: 12px;
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: var(--r-md);
}
.current-plan-row .icon { font-size: 22px; }
.current-plan-row .meta { flex: 1; min-width: 0; }
.current-plan-row .name {
  font-weight: 700; font-size: 14px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.current-plan-row .ts { font-size: 11px; color: var(--text-dim); }

.version-list { display: flex; flex-direction: column; gap: 6px; }
.version-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: var(--r-md);
  background: rgba(15,23,42,0.6);
  border: 1px solid var(--border-soft);
  transition: background 0.15s;
}
.version-row:hover { background: rgba(30,41,59,0.8); }
.version-row.current {
  background: rgba(56,189,248,0.12);
  border-color: rgba(56,189,248,0.5);
}
.version-row .vname { flex: 1; font-weight: 700; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.version-row .vtime { font-size: 10px; color: var(--text-mute); white-space: nowrap; }
.version-row .vbtn {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  background: transparent; color: var(--text-dim);
  display: inline-flex; align-items: center; justify-content: center;
}
.version-row .vbtn:hover { background: rgba(71,85,105,0.5); color: var(--text); }
.version-row .vbtn.delete:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }
.version-empty { padding: 14px; text-align: center; color: var(--text-mute); font-style: italic; }

/* ══════════════════ Bottom sheet ══════════════════ */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: none;
  animation: fadeIn 0.2s;
}
.sheet-backdrop.open { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(to bottom, var(--bg-panel-strong), rgba(15,23,42,0.98));
  border-top: 1px solid var(--border);
  border-top-left-radius: 20px; border-top-right-radius: 20px;
  padding: 14px 14px calc(18px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  max-height: 75vh; overflow-y: auto;
}
.bottom-sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(148,163,184,0.4);
  margin: 0 auto 14px;
}
.sheet-title {
  text-align: center; font-size: 16px; font-weight: 700; color: var(--accent);
  margin: 0 0 6px;
}
.sheet-sub { text-align: center; font-size: 12px; color: var(--text-dim); margin: 0 0 14px; }
.sheet-actions { display: flex; flex-direction: column; gap: 8px; }

/* ══════════════════ Misc ══════════════════ */
.empty-state {
  padding: 40px 16px; text-align: center; color: var(--text-dim);
  border: 2px dashed var(--border-soft); border-radius: var(--r-md);
}
input[type="checkbox"] { accent-color: var(--success); cursor: pointer; }

/* ══════════════════ Settings tab ══════════════════ */
.settings-section { margin-bottom: 14px; }
.settings-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.settings-field label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; color: var(--text-mute);
}
.settings-field input,
.settings-field select {
  padding: 9px 10px;
  background: rgba(15,23,42,0.7);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  font-size: 14px;
}
.settings-field input:focus,
.settings-field select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
.settings-field .hint { font-size: 11px; color: var(--text-mute); }
.game-settings-card {
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 10px 12px 12px;
  margin-bottom: 10px;
  background: rgba(15,23,42,0.55);
}
.game-settings-card .gsc-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; font-weight: 700; color: var(--accent);
  margin-bottom: 8px;
}
.game-settings-card .gsc-head .gsc-actions { display: flex; gap: 4px; }
.game-settings-card .gsc-row { display: flex; gap: 8px; flex-wrap: wrap; }
.game-settings-card .gsc-row .settings-field { flex: 1; min-width: 110px; margin-bottom: 8px; }
.gsc-mini-btn {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.gsc-mini-btn:hover { background: rgba(71,85,105,0.4); color: var(--text); }
.gsc-mini-btn.danger:hover { background: rgba(239,68,68,0.2); color: #fca5a5; border-color: rgba(239,68,68,0.5); }

/* ══════════════════ Detail overlay ══════════════════ */
.detail-overlay {
  position: fixed; inset: 0; z-index: 80;
  background: linear-gradient(to bottom, var(--bg-panel-strong), rgba(15,23,42,0.99));
  display: none;
  flex-direction: column;
  overflow-y: auto;
  padding: 0;
}
.detail-overlay.open { display: flex; }
.detail-header {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: linear-gradient(to bottom, rgba(30,41,59,0.98), rgba(15,23,42,0.95));
  border-bottom: 1px solid var(--border);
}
.detail-header .dt-title { flex: 1; font-size: 16px; font-weight: 700; color: var(--accent); }
.detail-header .dt-sub { font-size: 12px; color: var(--text-dim); }
.detail-close {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  background: var(--bg-elev); color: var(--text-dim);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
}
.detail-body { padding: 14px; }
.detail-pitch-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto 14px;
  aspect-ratio: 0.66;
  background: linear-gradient(to bottom, #4caf50, #388e3c);
  border-radius: 6px;
  overflow: hidden;
}
.detail-pitch-wrap::before {
  /* center circle + halfway line, subtle */
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: rgba(255,255,255,0.35);
}
.detail-disc {
  position: absolute;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.96);
  color: #1e293b;
  border: 2px solid #fff;
  min-width: 64px; max-width: 96px;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 11px; font-weight: 700;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.detail-disc .dd-role {
  display: block;
  font-size: 8px; font-weight: 800;
  color: #64748b; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.detail-disc .dd-name {
  display: block;
  font-size: 11px; font-weight: 700;
}
.detail-scrubber {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  margin-bottom: 12px;
}
.detail-scrubber input[type="range"] { flex: 1; }
.detail-scrubber .dt-time {
  font-variant-numeric: tabular-nums;
  font-weight: 700; color: var(--accent);
  min-width: 64px; text-align: right;
}
.detail-timeline {
  display: flex; flex-direction: column; gap: 5px;
  padding: 10px 12px;
  background: rgba(15,23,42,0.55);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
}
.detail-timeline h4 {
  margin: 0 0 4px; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
}
.dt-track-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
}
.dt-track-row .dt-track-label {
  flex: 0 0 46px;
  font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.4px;
}
.dt-track {
  position: relative; flex: 1; height: 22px;
  background: rgba(0,0,0,0.35);
  border-radius: 3px;
  border: 1px solid var(--border-soft);
}
.dt-track .dt-seg {
  position: absolute; top: 0; bottom: 0;
  background: rgba(255,255,255,0.85); color: #1e293b;
  border-right: 1px solid rgba(0,0,0,0.2);
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  padding: 0 3px;
}
.dt-track .dt-seg[data-seg="sub"] { background: #fff3cd; }
.dt-track .dt-pin {
  position: absolute; top: -3px; bottom: -3px;
  width: 2px; background: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
}
.dt-track .dt-half {
  position: absolute; top: 0; bottom: 0;
  width: 0; border-left: 1px dashed rgba(255,255,255,0.45);
}

/* ══════════════════ Pitch card header (game label + open-detail button) ══════════════════ */
.pitch-card-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.pitch-card-header .pitch-card-title {
  font-size: 13px; font-weight: 700;
  color: var(--text); letter-spacing: 0.3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pitch-card-header .pitch-detail-btn {
  width: 32px; height: 32px;
  flex-shrink: 0;
}
.pitch-card-header .pitch-detail-btn svg { width: 16px; height: 16px; }

/* ══════════════════ Settings tab ══════════════════ */
.settings-section {
  display: flex; flex-direction: column; gap: 10px;
  background: linear-gradient(to bottom, var(--bg-panel-soft), rgba(15,23,42,0.85));
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: var(--shadow-md);
}
.settings-section h4 {
  margin: 0 0 4px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-mute);
}
.settings-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
}
.settings-row label {
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  min-width: 84px;
}
.settings-row input[type="text"],
.settings-row input[type="number"],
.settings-row select {
  flex: 1;
  padding: 6px 8px;
  background: rgba(15,23,42,0.85);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
}
.settings-game-row {
  display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr) 60px 60px 60px auto;
  gap: 6px; align-items: center;
  padding: 8px 10px;
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
}
.settings-game-row input {
  padding: 5px 6px;
  background: rgba(15,23,42,0.85);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 12px;
  min-width: 0;
}
.settings-game-row .gr-num {
  font-size: 10px; font-weight: 700;
  color: var(--accent);
  text-align: center;
}
.settings-game-row .gr-del {
  width: 26px; height: 26px;
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.4);
  color: #fca5a5;
  border-radius: var(--r-sm);
  display: inline-flex; align-items: center; justify-content: center;
}

/* ══════════════════ Narrow screens ══════════════════ */
@media (max-width: 420px) {
  .pos-box { min-width: 92px; max-width: 150px; padding: 3px 3px 4px; }
  .pitch { gap: 5px; padding: 6px; }

// ascending by mean relY; within a row roles sort ascending by relX.
function formationRows(formation) {
  const tol = 0.04;
  const sorted = formation.roles.slice().sort((a, b) => a.relY - b.relY);
  const rows = [];
  for (const r of sorted) {
    const row = rows.find(R => Math.abs(R.relY - r.relY) <= tol);
    if (row) { row.roles.push(r); row.relY = (row.relY * row.roles.length + r.relY) / (row.roles.length + 1); }
    else rows.push({ relY: r.relY, roles: [r] });
  }
  rows.forEach(R => R.roles.sort((a, b) => a.relX - b.relX));
  rows.sort((a, b) => a.relY - b.relY);
  return rows;

/* ══════════════════ Swap engine (segment-aware) ══════════════════

 *

 *   - Two field segments (same or different role): swap the two players for
 *     those exact time intervals. If the segments are at the same role, this
 *     is just a name-swap of the two players. If at different roles, we need
 *     each segment to independently take the other's player.
 *   - Field segment ↔ bench chip: bring the bench player ON for that time
 *     interval, push the field player OFF for that interval.

    game.startingXI[role] = newPlayer || '';
    // The first sub at this role keeps its outPlayer in sync (whatever was on field at that sub time).
    return;

  const subs = (game.scheduledSubs || []).filter(s => s.role === role).sort((a, b) => a.timeSec - b.timeSec);

  if (!isSrcBench && !isTgtBench) {
    const srcP = _segmentPlayer(g, srcRole, srcStart);
    const tgtP = _segmentPlayer(g, tgtRole, tgtStart);
    if (!srcP && !tgtP) return;
    _setSegmentPlayer(g, srcRole, srcStart, tgtP);
    _setSegmentPlayer(g, tgtRole, tgtStart, srcP);

  const fieldStart = isSrcBench ? tgtStart : srcStart;

  const outPlayer = playerAtRoleSec(g, role, atSec);
  // If a sub already exists at exactly atSec for this role, update in-place; else append.
  const existing = (g.scheduledSubs || []).find(s => s.role === role && s.timeSec === atSec);
  if (existing) {
    existing.outPlayer = outPlayer;
    existing.inPlayer = inPlayer || '';
  } else {
    g.scheduledSubs = g.scheduledSubs || [];
    g.scheduledSubs.push({
      id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      role, timeSec: atSec,
      outPlayer, inPlayer: inPlayer || ''
    });
  }
  // Keep subs sorted in time order for deterministic rendering.
  g.scheduledSubs.sort((a, b) => a.role.localeCompare(b.role) || a.timeSec - b.timeSec);
  saveAll(); pushHistory(); renderActiveTab();
}
function removeSub(gameIdx, subId) {
  const g = tournament.games[gameIdx];
  if (!g || !Array.isArray(g.scheduledSubs)) return;
  g.scheduledSubs = g.scheduledSubs.filter(s => s.id !== subId);
  saveAll(); pushHistory(); renderActiveTab();
}

/* ─── Plan name line (under the ribbon) ─── */
function updateVersionBadge() {
  const b = document.getElementById('plan-name');
  if (!b) return;
  if (currentVersionName) {
    const dirty = isWorkingCopyDirty();
    b.textContent = currentVersionName + (dirty ? ' • unsaved' : '');
    b.classList.add('has-version');
    b.classList.toggle('is-dirty', dirty);
  } else {
    b.textContent = '';
    b.classList.remove('has-version', 'is-dirty');

/* ─── Games tab ─── */
function renderGamesTab() {
  renderRibbon();
  renderGameDetail();
}
function renderRibbon() {
  const container = document.getElementById('ribbon');
  container.innerHTML = '';
  tournament.games.forEach((game, i) => {
    const btn = document.createElement('button');
    btn.className = 'ribbon-game' + (i === activeGame ? ' active' : '') + (included[i] ? '' : ' excluded');
    btn.dataset.game = i;
    const dotTitle = included[i] ? 'Counted in totals - tap to exclude' : 'Excluded from totals - tap to include';
    const opp = game.opponent || 'TBD';
    const time = game.time || 'TBD';
    const field = game.field || '';
    const timeText = time + (field && field !== 'TBD' ? ' · ' + field : '');
    btn.innerHTML =
      '<span class="ribbon-include' + (included[i] ? ' on' : '') + '" data-toggle role="checkbox" aria-checked="' + included[i] + '" aria-label="' + dotTitle + '" title="' + dotTitle + '"></span>' +
      '<span class="ribbon-label">' + (game.label || ('Game ' + (i+1))) + '</span>' +
      '<span class="ribbon-opp">' + escapeHtml(opp) + '</span>' +
      '<span class="ribbon-time">' + escapeHtml(timeText) + '</span>';
    btn.addEventListener('click', (e) => {
      if (e.target.closest('[data-toggle]')) {
        e.stopPropagation();
        included[i] = !included[i];
        saveAll(); pushHistory(); renderActiveTab();
        return;
      }
      if (i === activeGame) return;
      const direction = i > activeGame ? 'next' : 'prev';
      activeGame = i; tapSelected = null; renderGamesTab();
      animateGameSwitch(direction);
    });
    container.appendChild(btn);
  });
  const activeEl = container.querySelector('.ribbon-game.active');
  if (activeEl && activeEl.scrollIntoView) activeEl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
}

/* Build one segment chip. role='__BENCH__' for bench chips (no startSec semantics). */
function chipHtml(gameIdx, role, startSec, segIdx, segMin, player, extraClass) {
  const hl = isHighlighted(player) ? 'highlighted' : '';
  const dim = anyHighlightActive() && player && !isHighlighted(player) ? 'any-highlighted' : '';
  const tap = tapSelected
    && tapSelected.game === gameIdx
    && tapSelected.role === role
    && tapSelected.startSec === startSec
    && tapSelected.benchPlayer === (role === '__BENCH__' ? player : undefined)
      ? 'tap-selected' : '';
  const cls = ['slot', hl, dim, tap, extraClass || ''].filter(Boolean).join(' ');
  let barHtml = '';
  if (player) {
    const r = playerRatio(player);
    const hue = r !== null ? hueForRatio(r) : 60;
    const pct = r !== null ? Math.min(100, Math.max(0, r * 80)) : 0;
    barHtml = '<div class="chip-min-bar"><div class="chip-min-fill" style="--chip-hue:' + hue + ';--chip-ratio:' + pct + '%"></div></div>';
  }
  const flex = Math.max(1, Math.round(segMin || 0));
  const benchAttr = role === '__BENCH__' ? ' data-bench-player="' + escapeHtml(player || '') + '"' : '';
  return '<div class="' + cls + '" data-game="' + gameIdx + '" data-role="' + escapeHtml(role) + '" data-start="' + startSec + '" data-segidx="' + segIdx + '"' + benchAttr + ' style="--seg-flex:' + flex + ';" draggable="true">' +
    '<span>' + escapeHtml(player || '') + '</span>' + barHtml + '</div>';
}

function renderGameDetail() {
  const gIdx = activeGame;
  const g = tournament.games[gIdx];
  if (!g) { document.getElementById('game-detail').innerHTML = ''; return; }
  const view = document.getElementById('game-detail');
  const benchedNeverPlay = new Set(benchedBothHalves(gIdx));
  const formation = getFormation(tournament.formationId);
  const rows = formationRows(formation);
  const benchOpen = benchOpenFor === gIdx;
  const durationSec = (g.durationMin || 25) * 60;
  const halfSec = (g.halfTimeMin > 0 && g.halfTimeMin < (g.durationMin || 25)) ? g.halfTimeMin * 60 : 0;
  const htPct = halfSec > 0 ? (halfSec / durationSec * 100).toFixed(2) + '%' : '50%';

  // Header (game name + opponent + Detail button)
  const headerLine = (g.label || ('Game ' + (gIdx + 1))) + ' · ' + (g.opponent || 'TBD');

  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  let html = '';

  // Pitch card
  html += '<div class="pitch-card">';
  html +=   '<div class="pitch-card-header">';
  html +=     '<span class="pitch-card-title">' + escapeHtml(headerLine) + '</span>';
  html +=     '<button class="icon-btn pitch-detail-btn" id="open-detail" title="Open detail view" aria-label="Open detail view">' +
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>' +
              '</button>';
  html +=   '</div>';
  html +=   '<div class="pitch">';
  // Each row: roles sorted left-to-right by relX. Outfield rows first, GK row last.
  for (const row of rows) {
    html += '<div class="pitch-row">';
    for (const role of row.roles) {
      const segs = getCellSegments(g, role.name);
      const isFull = segs.length === 1;
      html += '<div class="pos-box">';
      html +=   '<div class="pos-label"><span class="pos-name">' + escapeHtml(role.name) + '</span></div>';
      html +=   '<div class="chip-row' + (isFull ? ' full-game' : '') + '" style="--ht-pct:' + htPct + ';">';
      const playsBothAtHalf = (player) => {
        // For visual emphasis: a player who appears in multiple distinct segments at this role.
        let count = 0;
        for (const s of segs) if (s.player === player) count++;
        return count > 1 ? 'plays-both' : '';
      };
      for (const seg of segs) {
        const segMin = (seg.endSec - seg.startSec) / 60;
        const extra = playsBothAtHalf(seg.player);
        html += chipHtml(gIdx, role.name, seg.startSec, seg.segIdx, segMin, seg.player, extra);
      }
      if (halfSec > 0 && !isFull) html += '<div class="ht-divider"></div>';
      html +=   '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html +=   '</div>';

  // Bench drawer (kickoff bench = roster − startingXI)
  const startingPlayers = new Set(Object.values(g.startingXI).filter(Boolean));
  const benchPlayersAtKickoff = PLAYERS.filter(p => !startingPlayers.has(p));
  html +=   '<button class="bench-drawer-toggle" id="bench-toggle" aria-expanded="' + benchOpen + '">' +
              '<span>Bench at kickoff (' + benchPlayersAtKickoff.length + ')</span><span class="chev">▼</span>' +
            '</button>';
  html +=   '<div class="bench-section' + (benchOpen ? ' open' : '') + '" id="bench-section">';
  html +=     '<div class="bench-row"><div class="chip-row">' +
                benchPlayersAtKickoff.map((pl, idx) => {
                  const extra = benchedNeverPlay.has(pl) ? 'benched-both' : '';
                  return chipHtml(gIdx, '__BENCH__', 0, idx, 1, pl, extra);
                }).join('') +
              '</div></div>';
  html +=   '</div>';

  // Tournament-totals strip (replaces the old per-game strip).
  // Shows every player as a ratio-coloured cell — red under, yellow near,
  // green over — sorted ascending by tournament minutes.
  html +=   '<div class="game-min-strip totals">';
  html +=     '<h4>Tournament totals</h4>';
  html +=     '<div class="strip-row">';
  const sortedForStrip = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });
  const anyHi = anyHighlightActive();
  html += sortedForStrip.map(pl => {
    const totMin = Math.round(playerTotalSec(pl) / 60);
    const r = playerRatio(pl);
    const c = ratioColors(r);
    const hl = isHighlighted(pl);
    const dim = anyHi && !hl;
    const cls = 'strip-cell' + (hl ? ' highlighted' : '') + (dim ? ' any-highlighted' : '');
    return '<button class="' + cls + '" ' +
      'data-player="' + pl.replace(/"/g, '&quot;') + '" ' +
      'style="--cell-bg:' + c.bg + ';--cell-fg:' + c.fg + '" ' +
      'title="' + pl + ' — ' + totMin + "'" + '">' +
      '<span class="strip-init">' + playerInitials(pl) + '</span>' +
    '</button>';
  }).join('');
  html +=     '</div>';
  html +=   '</div>';

  html += '</div>';

  // Undo / Redo — placed AFTER the game field, MatchOps-style SVG icons
  html += '<div class="game-toolbar after-pitch">';
  html +=   '<button class="icon-btn" id="btn-undo" ' + (canUndo ? '' : 'disabled') + ' title="Undo" aria-label="Undo">' +
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
                '<path d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"/>' +
              '</svg>' +
            '</button>';
  html +=   '<button class="icon-btn" id="btn-redo" ' + (canRedo ? '' : 'disabled') + ' title="Redo" aria-label="Redo">' +
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
                '<path d="m15 15 6-6m0 0-6-6m6 6H9a6 6 0 0 0 0 12h3"/>' +
              '</svg>' +
            '</button>';
  html += '</div>';

  view.innerHTML = html;

  // Handlers
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  const detailBtn = document.getElementById('open-detail');
  if (detailBtn) detailBtn.addEventListener('click', () => openDetailModal(gIdx));
  document.getElementById('bench-toggle').addEventListener('click', () => {
    benchOpenFor = benchOpen ? null : gIdx;
    renderGameDetail();
  });
  // Strip cells → highlight / open per-player sheet
  view.querySelectorAll('.game-min-strip .strip-cell').forEach(cell => {
    const p = cell.dataset.player;
    if (!p) return;
    cell.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleHighlight(p);
      renderActiveTab();
    });
  });

  // Chip handlers
  view.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('dragstart', onDragStart);
    slot.addEventListener('dragover', onDragOver);
    slot.addEventListener('dragleave', onDragLeave);
    slot.addEventListener('drop', onDrop);
    slot.addEventListener('dragend', onDragEnd);
    slot.addEventListener('click', onChipClick);
    slot.addEventListener('contextmenu', (e) => { e.preventDefault(); openChipSheet(slot); });
    // long-press for touch
    let t = null;
    slot.addEventListener('touchstart', () => { t = setTimeout(() => openChipSheet(slot), 500); });
    slot.addEventListener('touchend',   () => { if (t) { clearTimeout(t); t = null; } });
    slot.addEventListener('touchmove',  () => { if (t) { clearTimeout(t); t = null; } });
  });
}

/* ─── Minutes tab — quick-scan chip grid + multi-player focus stack ─── */
function renderMinutesTab() {
  const total = PLAYERS.length;
  const activeGames = included.filter(Boolean).length;
  document.getElementById('minutes-count').textContent = total + ' players · ' + activeGames + '/' + tournament.games.length + ' games counted';

  const list = document.getElementById('minutes-cards');
  list.className = 'pt-grid';
  const sorted = PLAYERS.slice().sort((a, b) => {
    const d = playerTotalSec(a) - playerTotalSec(b);
    if (d !== 0) return d;
    return a.localeCompare(b);
  });

  // Which players to show in the focus stack:
  //  - any currently highlighted players (comparison mode), OR
  //  - worst-off player as the default when nothing is selected.
  const highlighted = [...highlightedPlayers]
    .filter(p => PLAYERS.includes(p))
    .sort((a, b) => {
      const d = playerTotalSec(a) - playerTotalSec(b);
      if (d !== 0) return d;
      return a.localeCompare(b);
    });
  const focusPlayers = highlighted.length > 0 ? highlighted : [sorted[0]];
  const focusSet = new Set(focusPlayers);

  const anyHi = anyHighlightActive();
  list.innerHTML = sorted.map(p => {
    const totMin = Math.round(playerTotalSec(p) / 60);
    const r = playerRatio(p);
    const c = ratioColors(r);
    const isPrio = PRIORITY.has(p);
    const hl = isHighlighted(p);
    const dim = anyHi && !hl;
    const isFocused = focusSet.has(p);
    const cls = 'pt-chip' +
      (isPrio ? ' prio' : '') +
      (hl ? ' highlighted' : '') +
      (dim && !isFocused ? ' any-highlighted' : '') +
      (isFocused && !hl ? ' focused' : ''); // only decorate focus when not already highlighted
    return '<button class="' + cls + '" ' +
      'data-player="' + p.replace(/"/g, '&quot;') + '" ' +
      'style="--pt-bg:' + c.bg + ';--pt-fg:' + c.fg + '">' +
      '<span class="pt-name">' + p + '</span>' +
      '<span class="pt-total">' + totMin + "'" + '</span>' +
    '</button>';
  }).join('');

  list.querySelectorAll('.pt-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const p = chip.dataset.player;
      toggleHighlight(p);
      renderMinutesTab();
    });
  });

  renderMinutesFocus(focusPlayers, activeGames, highlighted.length > 0);
}

function renderFocusCard(focused, activeGames) {
  const totalSec = playerTotalSec(focused);
  const totalMin = Math.round(totalSec / 60);
  const r = playerRatio(focused);
  const pct = r !== null ? Math.round(r * 100) : 0;
  const barW = r !== null ? Math.min(100, Math.max(0, Math.round(r * 80))) : 0;
  const c = ratioColors(r);
  const isPrio = PRIORITY.has(focused);
  const formation = getFormation(tournament.formationId);
  const onFieldCount = formation.roles.length;
  const rosterSize = Math.max(onFieldCount, tournament.rosterSize || PLAYERS.length);
  let totalAvail = 0;
  for (let i = 0; i < tournament.games.length; i++) {
    if (!included[i]) continue;
    totalAvail += (tournament.games[i].durationMin || 25) * 60 * onFieldCount;
  }
  const expected = totalAvail / rosterSize;
  const deltaMin = expected ? Math.round((totalSec - expected) / 60) : 0;
  const deltaStr = expected
    ? (deltaMin === 0 ? 'on fair share' : (deltaMin > 0 ? '+' + deltaMin + " min vs average" : deltaMin + " min vs average"))
    : 'no games counted';

  const gamesHtml = tournament.games.map((g, i) => {
    const sec = playerMinsPerGame(focused, i);
    const posInfo = playerGamePositions(focused, i);
    const totalGameSec = (g.durationMin || 25) * 60;
    const ratio = totalGameSec > 0 ? sec / totalGameSec : 0;
    let cls = 'focus-game';
    if (!included[i]) cls += ' excluded';
    if (ratio >= 0.95) cls += ' full';
    else if (ratio >= 0.05) cls += ' half';
    else cls += ' zero';
    const mins = Math.round(sec / 60);
    const posText = posInfo.text || '\u2014';
    return '<div class="' + cls + '">' +
      '<span class="fg-label">G' + (i + 1) + '</span>' +
      '<span class="fg-pos">' + escapeHtml(posText) + '</span>' +
      '<span class="fg-mins">' + mins + "'" + '</span>' +
    '</div>';
  }).join('');

  return '<div class="focus-card" data-player="' + focused.replace(/"/g, '&quot;') + '">' +
    '<div class="focus-head">' +
      '<div class="focus-name">' + focused + (isPrio ? ' <span class="focus-star">★</span>' : '') + '</div>' +
      '<div class="focus-total">' + totalMin + "'" + '</div>' +
    '</div>' +
    '<div class="focus-bar">' +
      '<div class="focus-bar-track"><div class="focus-bar-fill" style="--bar-bg:' + c.bg + ';--bar-w:' + barW + '%"></div></div>' +
      '<div class="focus-bar-label">' + (r !== null ? pct + '% of fair share · ' + deltaStr : 'no games counted') + '</div>' +
    '</div>' +
    '<div class="focus-games">' + gamesHtml + '</div>' +
  '</div>';
}

function renderMinutesFocus(players, activeGames, hasSelection) {
  const pane = document.getElementById('minutes-focus');
  if (!pane) return;
  const cardsHtml = players.map(p => renderFocusCard(p, activeGames)).join('');
  const footerHtml = hasSelection
    ? '<div class="focus-actions"><button class="btn" id="focus-jump">View on pitch</button></div>'
    : '';
  pane.innerHTML = cardsHtml + footerHtml;

  const jump = document.getElementById('focus-jump');
  if (jump) jump.addEventListener('click', () => setTab('games'));
}

  if (bRevert) bRevert.addEventListener('click', revertToSaved);
  document.getElementById('plan-save-as').addEventListener('click', () => {
    const suggested = currentVersionName ? (currentVersionName + ' (copy)') : 'Plan ' + new Date().toLocaleString();
    const input = prompt('Save as:', suggested);
    if (!input) return;
    const n = input.trim(); if (!n) return;
    if (saveVersion(n)) { currentVersionName = n; saveAll(); renderPlans(); }
  });
  view.querySelectorAll('.version-row[data-name]').forEach(row => {
    const name = decodeURIComponent(row.dataset.name);
    row.querySelector('[data-action="load"]').addEventListener('click', (e) => { e.stopPropagation(); applyVersion(name); });
    row.querySelector('[data-action="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameVersion(name); });
    row.querySelector('[data-action="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteVersion(name); });
    // Tap the name area → load
    row.querySelector('.vname').addEventListener('click', () => applyVersion(name));
  });
  view.querySelectorAll('[data-roster-player]').forEach(row => {
    const p = decodeURIComponent(row.dataset.rosterPlayer);
    row.querySelector('[data-action="rename-player"]').addEventListener('click', (e) => {
      e.stopPropagation();
      const input = prompt('Rename player "' + p + '" to:', p);
      if (input === null) return;
      const n = input.trim();
      if (!n || n === p) return;
      renamePlayer(p, n);
    });
  });
  view.querySelectorAll('[data-unknown-player]').forEach(row => {
    const u = decodeURIComponent(row.dataset.unknownPlayer);
    row.querySelector('[data-action="resolve-unknown"]').addEventListener('click', (e) => {
      e.stopPropagation();
      const input = prompt('Replace "' + u + '" with which roster player?\n\nRoster: ' + PLAYERS.join(', '), '');
      if (input === null) return;
      const t = input.trim();
      if (!t) return;
      resolveUnknown(u, t);
    });
  });
  document.getElementById('plan-export').addEventListener('click', exportJson);
  document.getElementById('plan-import').addEventListener('click', () => document.getElementById('import-file').click());
  document.getElementById('plan-share').addEventListener('click', shareUrl);
  document.getElementById('plan-reset').addEventListener('click', resetPlan);
}

function safeFilenamePart(s) {
  return (s || '')
    .replace(/[\/\\?%*:|"<>]/g, '-')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 60);
}
function exportJson() {
  const snapshot = {
    formatVersion: 1,
    kind: 'matchops-planner-export',
    savedAt: new Date().toISOString(),
    tournament,
    included,
    currentVersionName,
    versions: loadVersions(),
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const verPart = currentVersionName ? safeFilenamePart(currentVersionName) + '_' : '';
  a.href = url;
  a.download = 'matchops-planner_' + verPart + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function _coerceImportToTournament(data) {
  // Accepts: v1 envelope { formatVersion:1, tournament, ... }
  //          v2-style export { formatVersion:2, games:[...] } → migrated
  //          legacy export { games:[...] } (no formatVersion) → migrated
  if (data && data.formatVersion === 1 && data.tournament) {
    return { t: data.tournament, included: data.included, currentVersionName: data.currentVersionName, versions: data.versions };
  }
  if (data && Array.isArray(data.games)) {
    const t = migrateV2ToV3({ games: data.games });
    if (!t) return null;
    return { t, included: data.included, currentVersionName: data.currentVersionName, versions: data.versions };
  }
  return null;
}
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const coerced = _coerceImportToTournament(data);
      if (!coerced || !hasValidShape(coerced.t)) {
        alert('Invalid file: tournament shape not recognised.');
        return;
      }
      const importUnknowns = collectUnknownPlayers(coerced.t);
      // Filter imported versions to ones that structurally validate
      const importedVersions = {};
      if (coerced.versions && typeof coerced.versions === 'object') {
        for (const name of Object.keys(coerced.versions)) {
          const v = coerced.versions[name];
          // Versions can be in v1 (with .tournament) or legacy v2 (with .games) shape
          let vt = null;
          if (v && v.tournament && hasValidShape(v.tournament)) vt = v.tournament;
          else if (v && Array.isArray(v.games)) {
            const m = migrateV2ToV3({ games: v.games });
            if (m && hasValidShape(m)) vt = m;
          }
          if (vt) importedVersions[name] = { tournament: vt, included: v.included || defaultIncluded(vt.games.length), savedAt: v.savedAt || new Date().toISOString() };
        }
      }
      const importedCount = Object.keys(importedVersions).length;
      const hasVer = importedCount > 0;
      const unknownsPart = importUnknowns.length
        ? '\n\nImported plan references unknown players: ' + importUnknowns.join(', ') + '. Resolve in Plans then Roster after loading.'
        : '';
      if (!confirm('Replace current plan' + (hasVer ? (' AND import ' + importedCount + ' version(s)?') : '?') + unknownsPart)) return;
      tournament = coerced.t;
      included = _normalizeIncluded(coerced.included, tournament.games.length);
      currentVersionName = typeof coerced.currentVersionName === 'string' ? coerced.currentVersionName : null;
      if (activeGame >= tournament.games.length) activeGame = 0;
      if (hasVer) {
        const merged = Object.assign({}, loadVersions(), importedVersions);
        saveVersionsMap(merged);
      }
      saveAll(); pushHistory(); renderActiveTab(); refreshStateBanner();
    } catch (err) { alert('Parse error: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
});
async function shareUrl() {
  const snapshot = { formatVersion: 1, kind: 'matchops-planner-share', tournament, included };
  try {
    const str = JSON.stringify(snapshot);
    const b64 = btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const url = location.origin + location.pathname + '#plan=' + b64;
    if (navigator.clipboard) await navigator.clipboard.writeText(url);
    alert('Share URL copied to clipboard (length ' + url.length + ' chars). Paste it into a message; opening that URL will offer to import the plan.');
  } catch (e) { alert('Could not create share URL: ' + e.message); }
}
function resetPlan() {
  if (!confirm('Reset all games to the original plan? This clears saved state (versions kept).')) return;
  try { localStorage.removeItem(STORAGE_KEY_V3); localStorage.removeItem(STORAGE_KEY_V2); } catch (e) {}
  location.reload();
}

/* Try importing from URL hash on load */
(function tryImportFromHash() {
  const m = location.hash.match(/#plan=([A-Za-z0-9_\-]+)/);
  if (!m) return;
  try {
    const b64 = m[1].replace(/-/g,'+').replace(/_/g,'/') + '='.repeat((4 - m[1].length % 4) % 4);
    const str = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(str);
    const coerced = _coerceImportToTournament(data);
    if (!coerced || !validateGamesShape(coerced.t)) return; // reject silently
    if (confirm('A shared plan is in the URL. Load it?')) {
      tournament = coerced.t;
      included = _normalizeIncluded(coerced.included, tournament.games.length);
      currentVersionName = null;
      if (activeGame >= tournament.games.length) activeGame = 0;
      saveAll(); pushHistory();
    }
    if (window.history && window.history.replaceState) window.history.replaceState(null, '', location.pathname);
  } catch (e) {}
})();

/* ══════════════════ Drag & tap handlers ══════════════════ */
let dragSource = null;
function onDragStart(e) {
  const s = e.currentTarget;
  dragSource = {
    game: s.dataset.game,
    role: s.dataset.role,
    startSec: parseInt(s.dataset.start, 10) || 0,
    benchPlayer: s.dataset.role === '__BENCH__' ? (s.dataset.benchPlayer || '') : undefined,
  };
  e.dataTransfer.effectAllowed = 'move';
  s.style.opacity = '0.4';
}
function onDragOver(e) {
  if (!dragSource) return;
  const s = e.currentTarget;
  if (s.dataset.game !== dragSource.game) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  s.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const t = e.currentTarget; t.classList.remove('drag-over');
  if (!dragSource) return;
  if (t.dataset.game !== dragSource.game) return;
  const tgtRole = t.dataset.role;
  const tgtStart = parseInt(t.dataset.start, 10) || 0;
  if (tgtRole === dragSource.role && tgtStart === dragSource.startSec) return;
  performSwap(parseInt(dragSource.game,10), dragSource.role, dragSource.startSec, tgtRole, tgtStart, dragSource.benchPlayer);
}
function onDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.slot.drag-over').forEach(s => s.classList.remove('drag-over'));
  dragSource = null;
}
function onChipClick(e) {
  const s = e.currentTarget;
  const gIdx = parseInt(s.dataset.game, 10);
  const role = s.dataset.role;
  const startSec = parseInt(s.dataset.start, 10) || 0;
  const benchPlayer = role === '__BENCH__' ? (s.dataset.benchPlayer || '') : undefined;
  const player = role === '__BENCH__'
    ? benchPlayer
    : _segmentPlayer(tournament.games[gIdx], role, startSec);
  if (!player && role !== '__BENCH__') return;

  const same = (a, b) => a && b && a.game === b.game && a.role === b.role && a.startSec === b.startSec
    && a.benchPlayer === b.benchPlayer;
  const cur = { game: gIdx, role, startSec, benchPlayer };
  if (!tapSelected) { tapSelected = cur; renderGameDetail(); return; }
  if (same(tapSelected, cur)) { tapSelected = null; renderGameDetail(); return; }
  if (tapSelected.game !== gIdx) { tapSelected = cur; renderGameDetail(); return; }

  const src = tapSelected;
  tapSelected = null;
  performSwap(gIdx, src.role, src.startSec, role, startSec, src.benchPlayer);
}

/* ══════════════════ Bottom sheet ══════════════════ */
function openSheet(title, sub, actions) {
  document.getElementById('sheet-title').textContent = title;
  document.getElementById('sheet-sub').textContent = sub || '';
  const actionsBox = document.getElementById('sheet-actions');
  actionsBox.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn' + (a.variant ? ' ' + a.variant : '');
    b.textContent = a.label;
    b.addEventListener('click', () => { closeSheet(); setTimeout(a.onClick, 160); });
    actionsBox.appendChild(b);
  });
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);

function openChipSheet(slot) {
  const gIdx = parseInt(slot.dataset.game, 10);
  const role = slot.dataset.role;
  const startSec = parseInt(slot.dataset.start, 10) || 0;
  const g = tournament.games[gIdx];
  if (!g) return;
  const isBench = role === '__BENCH__';
  const player = isBench ? (slot.dataset.benchPlayer || '') : _segmentPlayer(g, role, startSec);
  if (!player) return;

  const actions = [];
  actions.push({
    label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
    onClick: () => { toggleHighlight(player); renderActiveTab(); }
  });

  if (!isBench) {
    // Compute current segment end-time for "Add sub at..." default
    const segs = getCellSegments(g, role);
    const seg = segs.find(s => s.startSec === startSec) || segs[0];
    const durationMin = (g.durationMin || 25);
    const halfTimeMin = g.halfTimeMin > 0 && g.halfTimeMin < durationMin ? g.halfTimeMin : durationMin / 2;
    const segStartMin = (seg.startSec / 60);
    const segEndMin = (seg.endSec / 60);
    const defaultMin = (halfTimeMin > segStartMin && halfTimeMin < segEndMin) ? halfTimeMin : (segStartMin + (segEndMin - segStartMin) / 2);

    actions.push({
      label: 'Add sub at minute…', variant: 'primary',
      onClick: () => {
        const benchAtNow = benchAtSec(g, seg.startSec);
        const minStr = prompt('Sub at what minute? (' + Math.ceil(segStartMin + 0.01) + '–' + Math.floor(segEndMin - 0.01) + ')', String(defaultMin));
        if (minStr === null) return;
        const min = parseFloat(minStr);
        if (!isFinite(min) || min <= segStartMin || min >= segEndMin) {
          alert('Minute must be inside the current segment (' + segStartMin.toFixed(1) + '–' + segEndMin.toFixed(1) + ').');
          return;
        }
        if (benchAtNow.length === 0) { alert('No bench players available at that time.'); return; }
        const inP = prompt('Who comes on at ' + min + "'?\n\nBench: " + benchAtNow.join(', '), benchAtNow[0]);
        if (!inP) return;
        const t = inP.trim();
        if (!benchAtNow.includes(t)) { alert('"' + t + '" is not on the bench at that time. Pick from: ' + benchAtNow.join(', ')); return; }
        addSubAtMinute(gIdx, role, Math.round(min * 60), t);
      }
    });

    // If this segment starts at a sub boundary (startSec > 0), offer to remove the sub.
    if (startSec > 0) {
      const sub = (g.scheduledSubs || []).find(s => s.role === role && s.timeSec === startSec);
      if (sub) {
        actions.push({ label: 'Remove this sub', variant: 'danger', onClick: () => removeSub(gIdx, sub.id) });
      }
    }
  }

  const subLine = isBench
    ? 'Bench at kickoff'
    : ('Position: ' + role + (startSec > 0 ? (' · from ' + Math.round(startSec / 60) + "'") : ' · from kickoff'));
  openSheet(player, subLine, actions);
}
function openPlayerSheet(player) {
  const total = playerTotalSec(player);
  const r = playerRatio(player);
  const pct = r !== null ? Math.round(r*100) + '% of fair share' : '';
  const actions = [
    { label: isHighlighted(player) ? 'Stop tracking across games' : 'Track across all games',
      onClick: () => { toggleHighlight(player); renderActiveTab(); } },
    { label: 'Jump to Games tab', onClick: () => setTab('games') },
  ];
  openSheet(player, formatMin(total) + ' total · ' + pct, actions);
}
// mergeH/splitMerged were the legacy bottom-sheet actions. Replaced by
// addSubAtMinute / removeSub on the new model (see swap engine block above).
