/* ══════════════════ Settings tab ══════════════════ */
function renderSettings() {
  const view = document.getElementById('settings-view');
  if (!view) return;
  const formation = getFormation(tournament.formationId);
  const fieldSizes = ['3v3','5v5','8v8','11v11'];

  let html = '';

  // Tournament-level settings
  html += '<div class="settings-section">';
  html +=   '<h4>Tournament</h4>';
  html +=   '<div class="settings-row"><label for="set-team">Team name</label>';
  html +=     '<input type="text" id="set-team" value="' + escapeHtml(tournament.teamName || '') + '"></div>';
  html +=   '<div class="settings-row"><label for="set-formation">Formation</label>';
  html +=     '<select id="set-formation">';
  for (const fs of fieldSizes) {
    const presets = FORMATIONS.filter(f => f.fieldSize === fs);
    if (!presets.length) continue;
    html += '<optgroup label="' + fs + '">';
    for (const f of presets) {
      const sel = f.id === tournament.formationId ? ' selected' : '';
      html += '<option value="' + f.id + '"' + sel + '>' + escapeHtml(f.name) + ' · ' + f.roles.length + ' players</option>';
    }
    html += '</optgroup>';
  }
  html +=     '</select></div>';
  html +=   '<div class="settings-row"><label for="set-roster">Roster size</label>';
  html +=     '<input type="number" id="set-roster" min="' + formation.roles.length + '" max="30" value="' + (tournament.rosterSize || PLAYERS.length) + '"></div>';
  html += '</div>';

  // Per-game list
  html += '<div class="settings-section">';
  html +=   '<h4>Games (' + tournament.games.length + ')</h4>';
  tournament.games.forEach((g, i) => {
    html += '<div class="settings-game-row" data-game-row="' + i + '">';
    html +=   '<input type="text" data-f="time" placeholder="Time" value="' + escapeHtml(g.time || '') + '">';
    html +=   '<input type="text" data-f="opponent" placeholder="Opponent" value="' + escapeHtml(g.opponent || '') + '">';
    html +=   '<input type="text" data-f="field" placeholder="Field" value="' + escapeHtml(g.field || '') + '">';
    html +=   '<input type="number" data-f="durationMin" placeholder="Min" min="1" max="120" value="' + (g.durationMin || 25) + '">';
    html +=   '<input type="number" data-f="halfTimeMin" placeholder="Half" min="0" max="120" step="0.5" value="' + (g.halfTimeMin != null ? g.halfTimeMin : '') + '">';
    html +=   '<button class="gr-del" data-del-game="' + i + '" title="Delete game" aria-label="Delete game ' + (i+1) + '">×</button>';
    html += '</div>';
  });
  html +=   '<button class="btn" id="set-add-game">+ Add game</button>';
  html += '</div>';

  view.innerHTML = html;

  document.getElementById('set-team').addEventListener('change', (e) => {
    tournament.teamName = e.target.value.trim();
    saveAll(); pushHistory();
  });
  document.getElementById('set-formation').addEventListener('change', (e) => {
    const newId = e.target.value;
    const newF = getFormation(newId);
    if (!newF) return;
    if (!confirm('Switching to formation "' + newF.name + '" will reset role assignments to defaults for any role that does not exist in the new formation. Continue?')) {
      e.target.value = tournament.formationId;
      return;
    }
    const newRoleNames = new Set(newF.roles.map(r => r.name));
    for (const g of tournament.games) {
      const newXI = {};
      const usedPlayers = new Set();
      for (const rname of newRoleNames) {
        const carry = (g.startingXI[rname] && newRoleNames.has(rname)) ? g.startingXI[rname] : '';
        if (carry) { newXI[rname] = carry; usedPlayers.add(carry); }
      }
      // Fill empty roles with first available roster players (alphabetical, deterministic).
      const roster = PLAYERS.slice();
      for (const rname of newRoleNames) {
        if (!newXI[rname]) {
          const next = roster.find(p => !usedPlayers.has(p));
          if (next) { newXI[rname] = next; usedPlayers.add(next); }
          else newXI[rname] = '';
        }
      }
      g.startingXI = newXI;
      g.scheduledSubs = (g.scheduledSubs || []).filter(s => newRoleNames.has(s.role));
    }
    tournament.formationId = newId;
    saveAll(); pushHistory(); renderActiveTab();
  });
  document.getElementById('set-roster').addEventListener('change', (e) => {
    const v = parseInt(e.target.value, 10);
    if (!isFinite(v) || v < formation.roles.length) {
      alert('Roster size must be at least ' + formation.roles.length + ' (formation outfield + GK).');
      e.target.value = tournament.rosterSize || PLAYERS.length;
      return;
    }
    tournament.rosterSize = v;
    saveAll(); pushHistory();
  });
  view.querySelectorAll('.settings-game-row').forEach(row => {
    const idx = parseInt(row.dataset.gameRow, 10);
    row.querySelectorAll('input[data-f]').forEach(inp => {
      inp.addEventListener('change', () => {
        const g = tournament.games[idx];
        if (!g) return;
        const f = inp.dataset.f;
        if (f === 'durationMin' || f === 'halfTimeMin') {
          const v = parseFloat(inp.value);
          if (isFinite(v) && v >= 0) g[f] = v;
        } else {
          g[f] = inp.value.trim();
        }
        saveAll(); pushHistory(); renderActiveTab();
      });
    });
    const del = row.querySelector('[data-del-game]');
    if (del) del.addEventListener('click', () => {
      if (tournament.games.length <= 1) { alert('At least one game is required.'); return; }
      if (!confirm('Delete game ' + (idx + 1) + '?')) return;
      tournament.games.splice(idx, 1);
      included.splice(idx, 1);
      if (activeGame >= tournament.games.length) activeGame = Math.max(0, tournament.games.length - 1);
      saveAll(); pushHistory(); renderActiveTab();
    });
  });
  const addBtn = document.getElementById('set-add-game');
  if (addBtn) addBtn.addEventListener('click', () => {
    const fId = tournament.formationId;
    const f = getFormation(fId);
    const xi = {};
    const used = new Set();
    for (const r of f.roles) {
      const next = PLAYERS.find(p => !used.has(p));
      xi[r.name] = next || '';
      if (next) used.add(next);
    }
    tournament.games.push({
      id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      label: 'Game ' + (tournament.games.length + 1),
      opponent: 'TBD', time: 'TBD', field: '',
      durationMin: 25, halfTimeMin: 12.5,
      startingXI: xi, scheduledSubs: []
    });
    included.push(true);
    saveAll(); pushHistory(); renderActiveTab();
  });
}

/* ══════════════════ Detail view modal (per-game pitch + scrubber + timeline) ══════════════════ */
function openDetailModal(gIdx) {
  detailGameIdx = gIdx;
  detailScrubSec = 0;
  document.getElementById('detail-overlay').classList.add('open');
  renderDetailModal();
}
function closeDetailModal() {
  detailGameIdx = -1;
  document.getElementById('detail-overlay').classList.remove('open');
}
function renderDetailModal() {
  if (detailGameIdx < 0) return;
  const g = tournament.games[detailGameIdx];
  if (!g) { closeDetailModal(); return; }
  const formation = getFormation(tournament.formationId);
  const durationSec = (g.durationMin || 25) * 60;
  const halfSec = (g.halfTimeMin > 0 && g.halfTimeMin < (g.durationMin || 25)) ? g.halfTimeMin * 60 : 0;
  const sec = Math.max(0, Math.min(durationSec - 1, detailScrubSec || 0));

  document.getElementById('detail-title').textContent =
    (g.label || ('Game ' + (detailGameIdx + 1))) + ' · ' + (tournament.teamName || '') + ' vs ' + (g.opponent || 'TBD');
  document.getElementById('detail-sub').textContent =
    formation.name + ' · ' + (g.durationMin || 25) + " min" + (halfSec ? (' · half-time at ' + g.halfTimeMin + "'") : '');

  const body = document.getElementById('detail-body');
  let html = '';

  // Pitch with absolute-positioned discs at relX/relY
  const field = fieldAtSec(g, sec);
  html += '<div class="detail-pitch-wrap" id="dt-pitch">';
  for (const role of formation.roles) {
    const player = field[role.name] || '';
    const left = (role.relX * 100).toFixed(2) + '%';
    const top = (role.relY * 100).toFixed(2) + '%';
    html += '<div class="detail-disc" style="left:' + left + ';top:' + top + ';">' +
              '<span class="dd-role">' + escapeHtml(role.name) + '</span>' +
              '<span class="dd-name">' + escapeHtml(player) + '</span>' +
            '</div>';
  }
  html += '</div>';

  // Scrubber
  const tMin = Math.floor(sec / 60), tSec = Math.floor(sec % 60);
  const tStr = tMin + ':' + String(tSec).padStart(2, '0');
  html += '<div class="detail-scrubber">';
  html +=   '<input type="range" id="dt-scrub" min="0" max="' + (durationSec - 1) + '" step="1" value="' + sec + '">';
  html +=   '<span class="dt-time">' + tStr + '</span>';
  html += '</div>';

  // Timeline strip — one row per role
  html += '<div class="detail-timeline">';
  html +=   '<h4>Timeline</h4>';
  for (const role of formation.roles) {
    const segs = getCellSegments(g, role.name);
    html += '<div class="dt-track-row"><span class="dt-track-label">' + escapeHtml(role.name) + '</span><div class="dt-track">';
    for (const seg of segs) {
      const left = (seg.startSec / durationSec * 100).toFixed(2) + '%';
      const w = ((seg.endSec - seg.startSec) / durationSec * 100).toFixed(2) + '%';
      const sub = seg.segIdx > 0 ? ' data-seg="sub"' : '';
      html += '<div class="dt-seg" style="left:' + left + ';width:' + w + ';"' + sub + '>' + escapeHtml(seg.player || '') + '</div>';
    }
    if (halfSec > 0) {
      const hLeft = (halfSec / durationSec * 100).toFixed(2) + '%';
      html += '<div class="dt-half" style="left:' + hLeft + ';"></div>';
    }
    const pinLeft = (sec / durationSec * 100).toFixed(2) + '%';
    html += '<div class="dt-pin" style="left:' + pinLeft + ';"></div>';
    html += '</div></div>';
  }
  html += '</div>';

  body.innerHTML = html;

  const scrub = document.getElementById('dt-scrub');
  if (scrub) {
    scrub.addEventListener('input', (e) => {
      detailScrubSec = parseInt(e.target.value, 10) || 0;
      renderDetailModal();
    });
  }
}
document.getElementById('detail-close').addEventListener('click', closeDetailModal);


(function installPrompt() {
  const INSTALL_DISMISSED_KEY = 'matchops-planner-install-dismissed';
  let deferred = null;

  function isIos() {
    const ua = navigator.userAgent || '';
    return /iPad|iPhone|iPod/.test(ua) || (ua.includes('Mac') && 'ontouchend' in document);
  }
  function isStandalone() {
    return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
      || navigator.standalone === true;
  }
  function dismissed() {
    return localStorage.getItem(INSTALL_DISMISSED_KEY) === '1';
  }
  function show(text, actionLabel, onAction) {
    const banner = document.getElementById('install-banner');
    if (!banner) return;
    banner.querySelector('.install-text').textContent = text;
    const btn = banner.querySelector('.install-action');
    btn.textContent = actionLabel;
    btn.onclick = onAction;
    banner.hidden = false;
  }
  function hide() {
    const banner = document.getElementById('install-banner');
    if (banner) banner.hidden = true;
  }

  document.getElementById('install-dismiss').addEventListener('click', () => {
    localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
    hide();
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    if (isStandalone() || dismissed()) return;
    show('Install this planner as an app', 'Install', async () => {
      if (!deferred) return;
      deferred.prompt();
      try { await deferred.userChoice; } catch (_) {}
      deferred = null;
      hide();
    });
  });
  window.addEventListener('appinstalled', () => {
    deferred = null;
    hide();
  });

  // iOS fallback: no beforeinstallprompt exists; show a one-shot hint
  window.addEventListener('load', () => {
    if (isStandalone() || dismissed() || !isIos()) return;
    show('Add to Home Screen: Share \u2192 Add to Home Screen', 'Got it', () => {
      localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
      hide();
    });
  });
})();

/* ══════════════════ Game carousel — slide animation + swipe ══════════════════ */
function animateGameSwitch(direction) {
  // direction: 'next' → content slides in from the right;
  //            'prev' → content slides in from the left
  const el = document.getElementById('game-detail');
  if (!el) return;
  el.classList.remove('slide-from-right', 'slide-from-left');
  // force reflow so re-adding the same class restarts the animation
  void el.offsetWidth;
  el.classList.add(direction === 'next' ? 'slide-from-right' : 'slide-from-left');
}

(function attachSwipeCarousel() {
  const host = document.getElementById('game-detail');
  if (!host) return;
  let startX = 0, startY = 0, startT = 0, tracking = false;
  host.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    tracking = true;
  }, { passive: true });
  host.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4 && dt < 700) {
      if (dx < 0 && activeGame < tournament.games.length - 1) {
        activeGame++; tapSelected = null; renderGamesTab(); animateGameSwitch('next');
      } else if (dx > 0 && activeGame > 0) {
        activeGame--; tapSelected = null; renderGamesTab(); animateGameSwitch('prev');
      }
    }
  }, { passive: true });
})();

/* ══════════════════ Service worker ══════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      const update = () => reg.update().catch(() => {});
      document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') update(); });
      window.addEventListener('focus', update);
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        if (!w) return;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) w.postMessage({ type: 'SKIP_WAITING' });
        });
      });
    }).catch(() => {});
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => { if (!reloaded) { reloaded = true; location.reload(); } });
  });
}

/* ══════════════════ State-recovery banner ══════════════════ */
function showStateBanner(text, actionLabel, onAction) {
  const banner = document.getElementById('state-banner');
  if (!banner) return;
  banner.querySelector('.install-text').textContent = text;
  const btn = document.getElementById('state-banner-action');
  if (actionLabel && onAction) {
    btn.textContent = actionLabel;
    btn.onclick = onAction;
    btn.hidden = false;
  } else {
    btn.hidden = true;
  }
  banner.hidden = false;
}
function hideStateBanner() {
  const banner = document.getElementById('state-banner');
  if (banner) banner.hidden = true;
}
function refreshStateBanner() {
  const unknowns = collectUnknownPlayers(state);
  if (unknowns.length) {
    showStateBanner(
      'Plan references unknown players: ' + unknowns.join(', ') + '. Open Plans → Roster to resolve.',
      'Open Roster',
      () => setTab('plans')
    );
    return;
  }
  if (loadWarning) {
    showStateBanner(loadWarning.message, null, null);
    loadWarning = null;
    return;
  }
  hideStateBanner();
}
document.getElementById('state-banner-dismiss').addEventListener('click', () => {
  loadWarning = null;
  hideStateBanner();
});

/* ══════════════════ Init ══════════════════ */
renderActiveTab();
refreshStateBanner();
</script>
